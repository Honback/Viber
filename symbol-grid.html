<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; }
  .grid { display: grid; grid-template-columns: repeat(3, 280px); gap: 20px; }
  .cell {
    width: 280px; height: 280px;
    background: #111;
    border: 1px solid #222;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .cell .num {
    position: absolute;
    top: 12px;
    left: 16px;
    font-family: sans-serif;
    font-size: 14px;
    color: #555;
    font-weight: 600;
  }
  .accent { color: #d76542; }
  svg { overflow: visible; }
</style>
</head>
<body>
<div class="grid">

  <!-- 1: Flowing V wave -->
  <div class="cell">
    <span class="num">1</span>
    <svg width="100" height="100" viewBox="0 0 100 100">
      <path d="M15 30 Q25 15 35 30 Q45 45 50 50 Q55 45 65 30 Q75 15 85 30"
            stroke="#d76542" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M25 50 Q35 35 45 50 Q50 55 55 50 Q65 35 75 50"
            stroke="#d76542" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M35 68 Q42 58 50 68 Q58 58 65 68"
            stroke="#d76542" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
    </svg>
  </div>

  <!-- 2: Script V monogram -->
  <div class="cell">
    <span class="num">2</span>
    <svg width="100" height="100" viewBox="0 0 100 100">
      <text x="50" y="75" text-anchor="middle" font-family="Sacramento, cursive" font-size="90" fill="#d76542">V</text>
      <circle cx="50" cy="50" r="46" stroke="#d76542" stroke-width="2" fill="none" opacity="0.3"/>
    </svg>
  </div>

  <!-- 3: Abstract vibe pulse -->
  <div class="cell">
    <span class="num">3</span>
    <svg width="120" height="80" viewBox="0 0 120 80">
      <path d="M10 40 L30 40 L38 15 L50 65 L62 15 L74 65 L82 40 L110 40"
            stroke="#d76542" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- 4: Flowing ribbon V -->
  <div class="cell">
    <span class="num">4</span>
    <svg width="100" height="100" viewBox="0 0 100 100">
      <path d="M20 25 Q30 25 40 40 Q48 52 50 58 Q52 52 60 40 Q70 25 80 25"
            stroke="#d76542" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M50 58 Q50 65 50 75"
            stroke="#d76542" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="80" r="3" fill="#d76542"/>
    </svg>
  </div>

  <!-- 5: Double wave vibe -->
  <div class="cell">
    <span class="num">5</span>
    <svg width="110" height="80" viewBox="0 0 110 80">
      <path d="M10 35 Q30 10 55 35 Q80 60 100 35"
            stroke="#d76542" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M10 50 Q30 25 55 50 Q80 75 100 50"
            stroke="#d76542" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    </svg>
  </div>

  <!-- 6: Hexagon V -->
  <div class="cell">
    <span class="num">6</span>
    <svg width="100" height="100" viewBox="0 0 100 100">
      <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5"
               stroke="#d76542" stroke-width="2.5" fill="none" opacity="0.4"/>
      <text x="50" y="68" text-anchor="middle" font-family="Sacramento, cursive" font-size="60" fill="#d76542">V</text>
    </svg>
  </div>

  <!-- 7: Signal/broadcast -->
  <div class="cell">
    <span class="num">7</span>
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="55" r="8" fill="#d76542"/>
      <path d="M30 40 Q30 20 50 20 Q70 20 70 40" stroke="#d76542" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M20 35 Q20 8 50 8 Q80 8 80 35" stroke="#d76542" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
      <path d="M50 63 L50 85" stroke="#d76542" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- 8: Infinity/vibe loop -->
  <div class="cell">
    <span class="num">8</span>
    <svg width="120" height="80" viewBox="0 0 120 80">
      <path d="M60 40 Q60 15 38 15 Q15 15 15 40 Q15 65 38 65 Q60 65 60 40 Q60 15 82 15 Q105 15 105 40 Q105 65 82 65 Q60 65 60 40"
            stroke="#d76542" stroke-width="4" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- 9: Minimal V drop -->
  <div class="cell">
    <span class="num">9</span>
    <svg width="80" height="100" viewBox="0 0 80 100">
      <path d="M15 20 L40 70 L65 20" stroke="#d76542" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="82" r="5" fill="#d76542" opacity="0.6"/>
    </svg>
  </div>

</div>
</body>
</html>
