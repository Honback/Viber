<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#111111"/>
  <rect x="0" y="52" width="1200" height="1" fill="#333"/>
  <text x="30" y="33" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">QuizMaker</text>
  <!-- Tabs -->
  <rect x="200" y="12" width="80" height="30" rx="6" fill="#d76542"/>
  <text x="240" y="32" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Create</text>
  <rect x="290" y="12" width="80" height="30" rx="6" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="330" y="32" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="middle">Play</text>

  <!-- Main create form -->
  <rect x="60" y="80" width="1080" height="600" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Question input -->
  <text x="90" y="120" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Question</text>
  <rect x="90" y="135" width="1020" height="44" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="110" y="163" font-family="sans-serif" font-size="15" fill="#e0e0e0">&#xB300;&#xD55C;&#xBBFC;&#xAD6D;&#xC758; &#xC218;&#xB3C4;&#xB294;?</text>

  <!-- Answer inputs -->
  <text x="90" y="210" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Answers</text>

  <!-- Answer 1 -->
  <rect x="90" y="225" width="1020" height="44" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <circle cx="120" cy="247" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="120" cy="247" r="5" fill="#22c55e"/>
  <text x="145" y="253" font-family="sans-serif" font-size="14" fill="#e0e0e0">&#xC11C;&#xC6B8;</text>
  <rect x="1040" y="237" width="50" height="20" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="1065" y="251" font-family="sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Correct</text>

  <!-- Answer 2 -->
  <rect x="90" y="280" width="1020" height="44" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <circle cx="120" cy="302" r="10" fill="none" stroke="#555" stroke-width="2"/>
  <text x="145" y="308" font-family="sans-serif" font-size="14" fill="#e0e0e0">&#xBD80;&#xC0B0;</text>

  <!-- Answer 3 -->
  <rect x="90" y="335" width="1020" height="44" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <circle cx="120" cy="357" r="10" fill="none" stroke="#555" stroke-width="2"/>
  <text x="145" y="363" font-family="sans-serif" font-size="14" fill="#e0e0e0">&#xB300;&#xC804;</text>

  <!-- Answer 4 -->
  <rect x="90" y="390" width="1020" height="44" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <circle cx="120" cy="412" r="10" fill="none" stroke="#555" stroke-width="2"/>
  <text x="145" y="418" font-family="sans-serif" font-size="14" fill="#e0e0e0">&#xC778;&#xCC9C;</text>

  <!-- Add Question button -->
  <rect x="90" y="460" width="160" height="40" rx="8" fill="#d76542"/>
  <text x="170" y="485" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">+ Add Question</text>

  <!-- Existing questions list -->
  <line x1="90" y1="520" x2="1110" y2="520" stroke="#333" stroke-width="1"/>
  <text x="90" y="550" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Questions (2)</text>

  <!-- Question 1 -->
  <rect x="90" y="565" width="1020" height="44" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="110" y="580" font-family="sans-serif" font-size="11" fill="#d76542">Q1</text>
  <text x="140" y="593" font-family="sans-serif" font-size="13" fill="#e0e0e0">HTML&#xC5D0;&#xC11C; &#xC81C;&#xBAA9;&#xC744; &#xB098;&#xD0C0;&#xB0B4;&#xB294; &#xD0DC;&#xADF8;&#xB294;?</text>
  <text x="1070" y="593" font-family="sans-serif" font-size="11" fill="#555" text-anchor="end">4 answers</text>

  <!-- Question 2 -->
  <rect x="90" y="620" width="1020" height="44" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="110" y="635" font-family="sans-serif" font-size="11" fill="#d76542">Q2</text>
  <text x="140" y="648" font-family="sans-serif" font-size="13" fill="#e0e0e0">CSS&#xC5D0;&#xC11C; &#xD14D;&#xC2A4;&#xD2B8; &#xC0C9;&#xC0C1;&#xC744; &#xBCC0;&#xACBD;&#xD558;&#xB294; &#xC18D;&#xC131;&#xC740;?</text>
  <text x="1070" y="648" font-family="sans-serif" font-size="11" fill="#555" text-anchor="end">4 answers</text>
</svg>