<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Game border -->
  <rect x="100" y="20" width="1000" height="720" rx="4" fill="#050510" stroke="#333" stroke-width="1"/>
  <!-- Stars background -->
  <circle cx="200" cy="80" r="1" fill="#555"/>
  <circle cx="350" cy="120" r="1.5" fill="#444"/>
  <circle cx="500" cy="60" r="1" fill="#555"/>
  <circle cx="700" cy="100" r="1.5" fill="#444"/>
  <circle cx="850" cy="50" r="1" fill="#666"/>
  <circle cx="950" cy="130" r="1" fill="#555"/>
  <circle cx="300" cy="200" r="1" fill="#444"/>
  <circle cx="600" cy="180" r="1.5" fill="#555"/>
  <circle cx="800" cy="220" r="1" fill="#444"/>
  <circle cx="450" cy="250" r="1" fill="#555"/>
  <circle cx="150" cy="300" r="1.5" fill="#444"/>
  <circle cx="1050" cy="280" r="1" fill="#555"/>
  <!-- PLAYING indicator -->
  <rect x="120" y="40" width="100" height="28" rx="6" fill="#10B981" opacity="0.2"/>
  <circle cx="140" cy="54" r="4" fill="#10B981"/>
  <text x="152" y="58" fill="#10B981" font-family="sans-serif" font-size="12" font-weight="600">PLAYING</text>
  <!-- Score -->
  <text x="1070" y="58" fill="white" font-family="monospace" font-size="18" font-weight="bold" text-anchor="end">Score: 42</text>
  <!-- Lives -->
  <text x="560" y="55" fill="#a3a3a3" font-family="sans-serif" font-size="12" text-anchor="middle">Lives:</text>
  <text x="605" y="55" fill="#EF4444" font-family="sans-serif" font-size="14">&#9829; &#9829; &#9829;</text>
  <!-- Falling red obstacles -->
  <rect x="250" y="100" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="480" y="160" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="700" y="80" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="350" y="250" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="820" y="200" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="600" y="320" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="180" y="380" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="900" y="350" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="450" y="420" width="30" height="30" rx="4" fill="#EF4444" opacity="0.9"/>
  <rect x="750" y="450" width="30" height="30" rx="4" fill="#EF4444" opacity="0.8"/>
  <rect x="300" y="500" width="30" height="30" rx="4" fill="#EF4444" opacity="0.8"/>
  <rect x="550" y="520" width="30" height="30" rx="4" fill="#EF4444" opacity="0.7"/>
  <!-- Collectible items (yellow) -->
  <circle cx="400" cy="300" r="10" fill="#FBBF24"/>
  <circle cx="650" cy="450" r="10" fill="#FBBF24"/>
  <!-- Player (green square) at bottom center -->
  <rect x="575" y="650" width="50" height="50" rx="6" fill="#10B981"/>
  <rect x="582" y="657" width="10" height="10" rx="2" fill="#34D399"/>
  <rect x="607" y="657" width="10" height="10" rx="2" fill="#34D399"/>
  <rect x="590" y="680" width="20" height="4" rx="2" fill="#34D399"/>
  <!-- Ground line -->
  <line x1="100" y1="720" x2="1100" y2="720" stroke="#333" stroke-width="1"/>
  <!-- Bottom HUD -->
  <rect x="100" y="740" width="1000" height="40" fill="#111111"/>
  <text x="120" y="765" fill="#a3a3a3" font-family="sans-serif" font-size="12">Level: 3</text>
  <text x="550" y="765" fill="#a3a3a3" font-family="sans-serif" font-size="12" text-anchor="middle">High Score: 89</text>
  <text x="1080" y="765" fill="#666" font-family="sans-serif" font-size="11" text-anchor="end">Arrow Keys to move</text>
</svg>