<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#111111"/>
  <rect x="0" y="52" width="1200" height="1" fill="#333"/>
  <text x="30" y="33" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">TinyAnalytics</text>
  <text x="200" y="33" font-family="sans-serif" font-size="13" fill="#a3a3a3">Traffic Sources</text>

  <!-- Main content card -->
  <rect x="30" y="75" width="1140" height="680" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="115" font-family="sans-serif" font-size="20" fill="white" font-weight="bold">Referrer Breakdown</text>
  <text x="60" y="140" font-family="sans-serif" font-size="13" fill="#a3a3a3">Where your visitors are coming from</text>

  <!-- Bar chart -->
  <!-- Direct 45% -->
  <text x="60" y="195" font-family="sans-serif" font-size="14" fill="#e0e0e0">Direct</text>
  <text x="1100" y="195" font-family="sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">45%</text>
  <rect x="160" y="180" width="900" height="24" rx="4" fill="#1f1f1f"/>
  <rect x="160" y="180" width="405" height="24" rx="4" fill="#d76542"/>
  <text x="370" y="197" font-family="sans-serif" font-size="11" fill="white">5,580 visits</text>

  <!-- Google 28% -->
  <text x="60" y="255" font-family="sans-serif" font-size="14" fill="#e0e0e0">Google</text>
  <text x="1100" y="255" font-family="sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">28%</text>
  <rect x="160" y="240" width="900" height="24" rx="4" fill="#1f1f1f"/>
  <rect x="160" y="240" width="252" height="24" rx="4" fill="#e8956a"/>
  <text x="290" y="257" font-family="sans-serif" font-size="11" fill="white">3,472 visits</text>

  <!-- Twitter 15% -->
  <text x="60" y="315" font-family="sans-serif" font-size="14" fill="#e0e0e0">Twitter</text>
  <text x="1100" y="315" font-family="sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">15%</text>
  <rect x="160" y="300" width="900" height="24" rx="4" fill="#1f1f1f"/>
  <rect x="160" y="300" width="135" height="24" rx="4" fill="#f0b090"/>
  <text x="230" y="317" font-family="sans-serif" font-size="11" fill="#333">1,860 visits</text>

  <!-- GitHub 8% -->
  <text x="60" y="375" font-family="sans-serif" font-size="14" fill="#e0e0e0">GitHub</text>
  <text x="1100" y="375" font-family="sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">8%</text>
  <rect x="160" y="360" width="900" height="24" rx="4" fill="#1f1f1f"/>
  <rect x="160" y="360" width="72" height="24" rx="4" fill="#c49a7a"/>
  <text x="245" y="377" font-family="sans-serif" font-size="11" fill="#a3a3a3">992 visits</text>

  <!-- Other 4% -->
  <text x="60" y="435" font-family="sans-serif" font-size="14" fill="#e0e0e0">Other</text>
  <text x="1100" y="435" font-family="sans-serif" font-size="14" fill="white" text-anchor="end" font-weight="bold">4%</text>
  <rect x="160" y="420" width="900" height="24" rx="4" fill="#1f1f1f"/>
  <rect x="160" y="420" width="36" height="24" rx="4" fill="#8a7060"/>
  <text x="210" y="437" font-family="sans-serif" font-size="11" fill="#a3a3a3">496 visits</text>

  <!-- Summary stats -->
  <line x1="60" y1="480" x2="1140" y2="480" stroke="#333" stroke-width="1"/>
  <text x="60" y="515" font-family="sans-serif" font-size="13" fill="#a3a3a3">Total Visits</text>
  <text x="60" y="540" font-family="sans-serif" font-size="24" fill="white" font-weight="bold">12,400</text>
  <text x="300" y="515" font-family="sans-serif" font-size="13" fill="#a3a3a3">Unique Referrers</text>
  <text x="300" y="540" font-family="sans-serif" font-size="24" fill="white" font-weight="bold">47</text>
  <text x="540" y="515" font-family="sans-serif" font-size="13" fill="#a3a3a3">New vs Returning</text>
  <text x="540" y="540" font-family="sans-serif" font-size="24" fill="white" font-weight="bold">62% / 38%</text>
</svg>