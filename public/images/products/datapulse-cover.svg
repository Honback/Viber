<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">DataPulse</text>
  <circle cx="1140" cy="24" r="5" fill="#10B981"/>
  <text x="1152" y="28" fill="#10B981" font-family="sans-serif" font-size="11" font-weight="600">LIVE</text>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <!-- KPI Cards -->
  <rect x="40" y="70" width="360" height="100" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="12">Active Users</text>
  <text x="60" y="135" fill="white" font-family="sans-serif" font-size="32" font-weight="bold">1,247</text>
  <text x="60" y="155" fill="#10B981" font-family="sans-serif" font-size="12">+12.3%</text>
  <!-- Mini sparkline -->
  <polyline points="280,130 295,120 310,125 325,110 340,115 355,100 370,105 385,95" fill="none" stroke="#10B981" stroke-width="2"/>

  <rect x="420" y="70" width="360" height="100" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="12">Revenue</text>
  <text x="440" y="135" fill="white" font-family="sans-serif" font-size="32" font-weight="bold">$12.4K</text>
  <text x="440" y="155" fill="#10B981" font-family="sans-serif" font-size="12">+8.7%</text>
  <polyline points="660,130 675,125 690,120 705,115 720,110 735,108 750,105 765,100" fill="none" stroke="#10B981" stroke-width="2"/>

  <rect x="800" y="70" width="360" height="100" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="820" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="12">Error Rate</text>
  <text x="820" y="135" fill="white" font-family="sans-serif" font-size="32" font-weight="bold">0.3%</text>
  <text x="820" y="155" fill="#10B981" font-family="sans-serif" font-size="12">-2.1%</text>
  <polyline points="1040,100 1055,105 1070,110 1085,108 1100,115 1115,120 1130,118 1145,125" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.5"/>

  <!-- Line Chart -->
  <rect x="40" y="190" width="740" height="380" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="220" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Traffic Overview</text>
  <text x="750" y="220" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="end">Last 24h</text>
  <!-- Y axis labels -->
  <text x="60" y="260" fill="#555" font-family="sans-serif" font-size="10">2000</text>
  <text x="60" y="310" fill="#555" font-family="sans-serif" font-size="10">1500</text>
  <text x="60" y="360" fill="#555" font-family="sans-serif" font-size="10">1000</text>
  <text x="60" y="410" fill="#555" font-family="sans-serif" font-size="10">500</text>
  <text x="60" y="460" fill="#555" font-family="sans-serif" font-size="10">0</text>
  <!-- Grid lines -->
  <line x1="95" y1="255" x2="760" y2="255" stroke="#222" stroke-width="1"/>
  <line x1="95" y1="305" x2="760" y2="305" stroke="#222" stroke-width="1"/>
  <line x1="95" y1="355" x2="760" y2="355" stroke="#222" stroke-width="1"/>
  <line x1="95" y1="405" x2="760" y2="405" stroke="#222" stroke-width="1"/>
  <line x1="95" y1="455" x2="760" y2="455" stroke="#222" stroke-width="1"/>
  <!-- Gradient fill under curve -->
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d76542" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d76542" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M95,420 L145,390 L195,400 L245,350 L295,330 L345,310 L395,280 L445,290 L495,260 L545,270 L595,250 L645,265 L695,255 L745,260 L745,455 L95,455 Z" fill="url(#chartGrad)"/>
  <polyline points="95,420 145,390 195,400 245,350 295,330 345,310 395,280 445,290 495,260 545,270 595,250 645,265 695,255 745,260" fill="none" stroke="#d76542" stroke-width="2.5"/>
  <!-- Data point dots -->
  <circle cx="595" cy="250" r="4" fill="#d76542"/>
  <circle cx="695" cy="255" r="4" fill="#d76542"/>
  <circle cx="745" cy="260" r="4" fill="#d76542"/>
  <!-- X axis labels -->
  <text x="95" y="475" fill="#555" font-family="sans-serif" font-size="10">00:00</text>
  <text x="195" y="475" fill="#555" font-family="sans-serif" font-size="10">04:00</text>
  <text x="345" y="475" fill="#555" font-family="sans-serif" font-size="10">08:00</text>
  <text x="495" y="475" fill="#555" font-family="sans-serif" font-size="10">12:00</text>
  <text x="645" y="475" fill="#555" font-family="sans-serif" font-size="10">16:00</text>
  <text x="725" y="475" fill="#555" font-family="sans-serif" font-size="10">20:00</text>

  <!-- Bar Chart -->
  <rect x="800" y="190" width="360" height="380" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="820" y="220" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Weekly Sessions</text>
  <!-- Bars (Mon-Sun) -->
  <rect x="830" y="310" width="30" height="230" rx="4" fill="#d76542" opacity="0.6"/>
  <rect x="870" y="280" width="30" height="260" rx="4" fill="#d76542" opacity="0.7"/>
  <rect x="910" y="260" width="30" height="280" rx="4" fill="#d76542" opacity="0.8"/>
  <rect x="950" y="300" width="30" height="240" rx="4" fill="#d76542" opacity="0.7"/>
  <rect x="990" y="250" width="30" height="290" rx="4" fill="#d76542"/>
  <rect x="1030" y="340" width="30" height="200" rx="4" fill="#d76542" opacity="0.5"/>
  <rect x="1070" y="360" width="30" height="180" rx="4" fill="#d76542" opacity="0.4"/>
  <!-- Bar labels -->
  <text x="840" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Mon</text>
  <text x="880" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Tue</text>
  <text x="920" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Wed</text>
  <text x="960" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Thu</text>
  <text x="1000" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Fri</text>
  <text x="1040" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Sat</text>
  <text x="1080" y="555" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Sun</text>

  <!-- Bottom status bar -->
  <rect x="40" y="590" width="1120" height="180" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="620" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Recent Events</text>
  <text x="60" y="650" fill="#a3a3a3" font-family="sans-serif" font-size="12">20:14:32</text>
  <text x="160" y="650" fill="white" font-family="sans-serif" font-size="12">User login from Seoul, KR</text>
  <circle cx="1120" cy="645" r="4" fill="#10B981"/>
  <text x="60" y="675" fill="#a3a3a3" font-family="sans-serif" font-size="12">20:14:28</text>
  <text x="160" y="675" fill="white" font-family="sans-serif" font-size="12">API request /api/v1/products - 200 OK (42ms)</text>
  <circle cx="1120" cy="670" r="4" fill="#10B981"/>
  <text x="60" y="700" fill="#a3a3a3" font-family="sans-serif" font-size="12">20:14:25</text>
  <text x="160" y="700" fill="white" font-family="sans-serif" font-size="12">Payment processed - $49.99</text>
  <circle cx="1120" cy="695" r="4" fill="#3B82F6"/>
  <text x="60" y="725" fill="#a3a3a3" font-family="sans-serif" font-size="12">20:14:20</text>
  <text x="160" y="725" fill="white" font-family="sans-serif" font-size="12">Database query timeout - retrying...</text>
  <circle cx="1120" cy="720" r="4" fill="#F59E0B"/>
  <text x="60" y="750" fill="#a3a3a3" font-family="sans-serif" font-size="12">20:14:15</text>
  <text x="160" y="750" fill="white" font-family="sans-serif" font-size="12">New user registration: user@example.com</text>
  <circle cx="1120" cy="745" r="4" fill="#10B981"/>
</svg>