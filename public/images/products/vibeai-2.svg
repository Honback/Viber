  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="600" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">VibeAI - Multi-Language</text>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <!-- Language tabs -->
  <rect x="40" y="70" width="1120" height="44" rx="8" fill="#1a1a1a"/>
  <rect x="44" y="74" width="120" height="36" rx="6" fill="#d76542"/>
  <text x="104" y="97" fill="white" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">React</text>
  <rect x="168" y="74" width="120" height="36" rx="6" fill="transparent"/>
  <text x="228" y="97" fill="#a3a3a3" font-family="sans-serif" font-size="13" text-anchor="middle">Python</text>
  <rect x="292" y="74" width="120" height="36" rx="6" fill="transparent"/>
  <text x="352" y="97" fill="#a3a3a3" font-family="sans-serif" font-size="13" text-anchor="middle">TypeScript</text>
  <rect x="416" y="74" width="120" height="36" rx="6" fill="transparent"/>
  <text x="476" y="97" fill="#a3a3a3" font-family="sans-serif" font-size="13" text-anchor="middle">Go</text>
  <rect x="540" y="74" width="120" height="36" rx="6" fill="transparent"/>
  <text x="600" y="97" fill="#a3a3a3" font-family="sans-serif" font-size="13" text-anchor="middle">Rust</text>
  <!-- Prompt area -->
  <rect x="40" y="130" width="1120" height="60" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="150" fill="#666" font-family="sans-serif" font-size="11">프롬프트</text>
  <text x="60" y="172" fill="white" font-family="sans-serif" font-size="14">"사용자 인증 미들웨어를 작성해줘. JWT 토큰 검증 포함"</text>
  <!-- Code output area -->
  <rect x="40" y="210" width="1120" height="520" rx="8" fill="#1a1a1a"/>
  <!-- Code header -->
  <rect x="40" y="210" width="1120" height="36" rx="8" fill="#252525"/>
  <rect x="40" y="236" width="1120" height="10" fill="#252525"/>
  <text x="60" y="234" fill="#a3a3a3" font-family="sans-serif" font-size="12">authMiddleware.tsx</text>
  <text x="900" y="234" fill="#60A5FA" font-family="sans-serif" font-size="11">React / TypeScript</text>
  <!-- Copy button -->
  <rect x="1090" y="216" width="56" height="24" rx="4" fill="#d76542"/>
  <text x="1118" y="233" fill="white" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Copy</text>
  <!-- Code content -->
  <text x="60" y="270" fill="#C084FC" font-family="monospace" font-size="12">import</text><text x="105" y="270" fill="white" font-family="monospace" font-size="12"> jwt </text><text x="140" y="270" fill="#C084FC" font-family="monospace" font-size="12">from</text><text x="175" y="270" fill="#86EFAC" font-family="monospace" font-size="12"> 'jsonwebtoken'</text><text x="310" y="270" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="60" y="290" fill="#C084FC" font-family="monospace" font-size="12">import</text><text x="105" y="290" fill="white" font-family="monospace" font-size="12"> { Request, Response, NextFunction } </text><text x="415" y="290" fill="#C084FC" font-family="monospace" font-size="12">from</text><text x="450" y="290" fill="#86EFAC" font-family="monospace" font-size="12"> 'express'</text><text x="530" y="290" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="60" y="320" fill="#C084FC" font-family="monospace" font-size="12">interface</text><text x="130" y="320" fill="#FBBF24" font-family="monospace" font-size="12"> JwtPayload</text><text x="225" y="320" fill="white" font-family="monospace" font-size="12"> {</text>
  <text x="80" y="340" fill="#60A5FA" font-family="monospace" font-size="12">userId</text><text x="130" y="340" fill="white" font-family="monospace" font-size="12">: </text><text x="142" y="340" fill="#FBBF24" font-family="monospace" font-size="12">string</text><text x="185" y="340" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="80" y="358" fill="#60A5FA" font-family="monospace" font-size="12">role</text><text x="115" y="358" fill="white" font-family="monospace" font-size="12">: </text><text x="127" y="358" fill="#86EFAC" font-family="monospace" font-size="12">'admin'</text><text x="185" y="358" fill="white" font-family="monospace" font-size="12"> | </text><text x="200" y="358" fill="#86EFAC" font-family="monospace" font-size="12">'user'</text><text x="245" y="358" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="80" y="376" fill="#60A5FA" font-family="monospace" font-size="12">exp</text><text x="105" y="376" fill="white" font-family="monospace" font-size="12">: </text><text x="117" y="376" fill="#FBBF24" font-family="monospace" font-size="12">number</text><text x="165" y="376" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="60" y="394" fill="white" font-family="monospace" font-size="12">}</text>
  <text x="60" y="424" fill="#C084FC" font-family="monospace" font-size="12">export const</text><text x="155" y="424" fill="#60A5FA" font-family="monospace" font-size="12"> authMiddleware</text><text x="295" y="424" fill="white" font-family="monospace" font-size="12"> = (</text>
  <text x="80" y="442" fill="white" font-family="monospace" font-size="12">req: </text><text x="115" y="442" fill="#FBBF24" font-family="monospace" font-size="12">Request</text><text x="165" y="442" fill="white" font-family="monospace" font-size="12">,</text>
  <text x="80" y="460" fill="white" font-family="monospace" font-size="12">res: </text><text x="115" y="460" fill="#FBBF24" font-family="monospace" font-size="12">Response</text><text x="172" y="460" fill="white" font-family="monospace" font-size="12">,</text>
  <text x="80" y="478" fill="white" font-family="monospace" font-size="12">next: </text><text x="125" y="478" fill="#FBBF24" font-family="monospace" font-size="12">NextFunction</text>
  <text x="60" y="496" fill="white" font-family="monospace" font-size="12">) =&gt; {</text>
  <text x="80" y="516" fill="#C084FC" font-family="monospace" font-size="12">const</text><text x="123" y="516" fill="white" font-family="monospace" font-size="12"> token = req.headers.authorization?.</text><text x="405" y="516" fill="#60A5FA" font-family="monospace" font-size="12">split</text><text x="440" y="516" fill="white" font-family="monospace" font-size="12">(</text><text x="448" y="516" fill="#86EFAC" font-family="monospace" font-size="12">' '</text><text x="465" y="516" fill="white" font-family="monospace" font-size="12">)[</text><text x="478" y="516" fill="#F97316" font-family="monospace" font-size="12">1</text><text x="486" y="516" fill="white" font-family="monospace" font-size="12">];</text>
  <text x="80" y="546" fill="#C084FC" font-family="monospace" font-size="12">if</text><text x="97" y="546" fill="white" font-family="monospace" font-size="12"> (!token) {</text>
  <text x="100" y="564" fill="#C084FC" font-family="monospace" font-size="12">return</text><text x="147" y="564" fill="white" font-family="monospace" font-size="12"> res.status(</text><text x="235" y="564" fill="#F97316" font-family="monospace" font-size="12">401</text><text x="260" y="564" fill="white" font-family="monospace" font-size="12">).json({</text>
  <text x="120" y="582" fill="#60A5FA" font-family="monospace" font-size="12">message</text><text x="175" y="582" fill="white" font-family="monospace" font-size="12">: </text><text x="185" y="582" fill="#86EFAC" font-family="monospace" font-size="12">'인증 토큰이 필요합니다'</text>
  <text x="100" y="600" fill="white" font-family="monospace" font-size="12">});</text>
  <text x="80" y="618" fill="white" font-family="monospace" font-size="12">}</text>
  <text x="80" y="648" fill="#C084FC" font-family="monospace" font-size="12">try</text><text x="105" y="648" fill="white" font-family="monospace" font-size="12"> {</text>
  <text x="100" y="666" fill="#C084FC" font-family="monospace" font-size="12">const</text><text x="143" y="666" fill="white" font-family="monospace" font-size="12"> decoded = jwt.verify(token, </text><text x="395" y="666" fill="#86EFAC" font-family="monospace" font-size="12">process.env.JWT_SECRET!</text><text x="570" y="666" fill="white" font-family="monospace" font-size="12">);</text>
  <text x="100" y="684" fill="white" font-family="monospace" font-size="12">req.user = decoded </text><text x="285" y="684" fill="#C084FC" font-family="monospace" font-size="12">as</text><text x="305" y="684" fill="#FBBF24" font-family="monospace" font-size="12"> JwtPayload</text><text x="395" y="684" fill="white" font-family="monospace" font-size="12">;</text>
  <text x="100" y="702" fill="white" font-family="monospace" font-size="12">next();</text>
  <!-- Bottom status -->
  <rect x="40" y="740" width="1120" height="40" rx="0" fill="#111111"/>
  <rect x="40" y="740" width="1120" height="1" fill="#333"/>
  <circle cx="60" cy="760" r="4" fill="#10B981"/>
  <text x="72" y="764" fill="#a3a3a3" font-family="sans-serif" font-size="12">생성 완료</text>
  <text x="1100" y="764" fill="#666" font-family="sans-serif" font-size="11" text-anchor="end">42 lines | UTF-8</text>
</svg>