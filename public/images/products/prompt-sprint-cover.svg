  <rect x="600" y="70" width="560" height="700" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Tabs -->
  <rect x="620" y="85" width="65" height="26" rx="4" fill="#d76542"/>
  <text x="652" y="102" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle">Run 1</text>
  <rect x="695" y="85" width="65" height="26" rx="4" fill="#2a2a2a"/>
  <text x="727" y="102" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Run 2</text>
  <rect x="770" y="85" width="65" height="26" rx="4" fill="#2a2a2a"/>
  <text x="802" y="102" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Run 3</text>
  <rect x="860" y="85" width="65" height="26" rx="4" fill="#2a2a2a" stroke="#d76542" stroke-width="1"/>
  <text x="892" y="102" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="middle">Diff</text>

  <text x="620" y="138" fill="white" font-family="sans-serif" font-size="13" font-weight="600">Output - Run 1</text>
  <text x="1130" y="138" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="end">847 tokens - 1.2s</text>

  <!-- JSON output -->
  <rect x="620" y="150" width="520" height="420" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="635" y="172" fill="#d76542" font-family="monospace" font-size="11">{</text>
  <text x="645" y="192" fill="#3B82F6" font-family="monospace" font-size="11">"vulnerabilities"</text>
  <text x="785" y="192" fill="white" font-family="monospace" font-size="11">: [</text>
  <text x="655" y="212" fill="white" font-family="monospace" font-size="11">{</text>
  <text x="665" y="232" fill="#3B82F6" font-family="monospace" font-size="11">"type"</text>
  <text x="715" y="232" fill="white" font-family="monospace" font-size="11">: </text>
  <text x="725" y="232" fill="#10B981" font-family="monospace" font-size="11">"SQL Injection"</text>
  <text x="850" y="232" fill="white" font-family="monospace" font-size="11">,</text>
  <text x="665" y="252" fill="#3B82F6" font-family="monospace" font-size="11">"severity"</text>
  <text x="745" y="252" fill="white" font-family="monospace" font-size="11">: </text>
  <text x="755" y="252" fill="#EF4444" font-family="monospace" font-size="11">"High"</text>
  <text x="795" y="252" fill="white" font-family="monospace" font-size="11">,</text>
  <text x="665" y="272" fill="#3B82F6" font-family="monospace" font-size="11">"line"</text>
  <text x="710" y="272" fill="white" font-family="monospace" font-size="11">: </text>
  <text x="720" y="272" fill="#F59E0B" font-family="monospace" font-size="11">2</text>
  <text x="730" y="272" fill="white" font-family="monospace" font-size="11">,</text>
  <text x="665" y="292" fill="#3B82F6" font-family="monospace" font-size="11">"description"</text>
  <text x="775" y="292" fill="white" font-family="monospace" font-size="11">:</text>

  <!-- Highlighted diff line -->
  <rect x="620" y="298" width="520" height="20" fill="#d76542" opacity="0.1"/>
  <text x="675" y="312" fill="#10B981" font-family="monospace" font-size="11">"f-string in SQL query allows</text>
  <text x="675" y="332" fill="#10B981" font-family="monospace" font-size="11"> injection attacks"</text>

  <text x="665" y="355" fill="#3B82F6" font-family="monospace" font-size="11">"fix"</text>
  <text x="695" y="355" fill="white" font-family="monospace" font-size="11">:</text>
  <text x="675" y="375" fill="#10B981" font-family="monospace" font-size="11">"Use parameterized queries"</text>
  <text x="655" y="395" fill="white" font-family="monospace" font-size="11">},</text>
  <text x="655" y="415" fill="white" font-family="monospace" font-size="11">{</text>
  <text x="665" y="435" fill="#3B82F6" font-family="monospace" font-size="11">"type"</text>
  <text x="715" y="435" fill="white" font-family="monospace" font-size="11">: </text>
  <text x="725" y="435" fill="#10B981" font-family="monospace" font-size="11">"No input validation"</text>
  <text x="880" y="435" fill="white" font-family="monospace" font-size="11">,</text>
  <text x="665" y="455" fill="#3B82F6" font-family="monospace" font-size="11">"severity"</text>
  <text x="745" y="455" fill="white" font-family="monospace" font-size="11">: </text>
  <text x="755" y="455" fill="#F59E0B" font-family="monospace" font-size="11">"Medium"</text>
  <text x="635" y="545" fill="#a3a3a3" font-family="monospace" font-size="11">...</text>

  <!-- Consistency analysis -->
  <rect x="620" y="580" width="520" height="80" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="640" y="605" fill="white" font-family="sans-serif" font-size="12" font-weight="500">Consistency Analysis</text>
  <text x="640" y="625" fill="#10B981" font-family="sans-serif" font-size="11">All 3 runs identified SQL injection (100%)</text>
  <text x="640" y="645" fill="#F59E0B" font-family="sans-serif" font-size="11">2/3 runs flagged input validation (67%)</text>

  <!-- Action buttons -->
  <rect x="620" y="675" width="120" height="30" rx="6" fill="#d76542"/>
  <text x="680" y="694" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle">Save Prompt</text>
  <rect x="750" y="675" width="120" height="30" rx="6" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <text x="810" y="694" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Export JSON</text>
  <rect x="880" y="675" width="120" height="30" rx="6" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <text x="940" y="694" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Share</text>
</svg>