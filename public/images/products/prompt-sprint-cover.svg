  <text x="125" y="134" fill="#a3a3a3" font-family="sans-serif" font-size="11">You are a helpful code reviewer...</text>

  <!-- User prompt -->
  <rect x="60" y="155" width="500" height="180" rx="8" fill="#0A0A0A" stroke="#d76542" stroke-width="1"/>
  <text x="75" y="178" fill="#d76542" font-family="sans-serif" font-size="11" font-weight="500">User Prompt</text>
  <text x="75" y="200" fill="white" font-family="monospace" font-size="11">Review the following Python code for:</text>
  <text x="75" y="218" fill="white" font-family="monospace" font-size="11">1. Security vulnerabilities</text>
  <text x="75" y="236" fill="white" font-family="monospace" font-size="11">2. Performance issues</text>
  <text x="75" y="254" fill="white" font-family="monospace" font-size="11">3. Best practice violations</text>
  <text x="75" y="278" fill="#a3a3a3" font-family="monospace" font-size="11">```python</text>
  <text x="75" y="296" fill="#a3a3a3" font-family="monospace" font-size="11">def get_user(id):</text>
  <text x="75" y="314" fill="#a3a3a3" font-family="monospace" font-size="11">    query = f"SELECT * FROM users</text>
  <text x="75" y="326" fill="#a3a3a3" font-family="monospace" font-size="11">    WHERE id={id}"</text>

  <!-- Variables section -->
  <rect x="60" y="350" width="500" height="100" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="75" y="373" fill="#8B5CF6" font-family="sans-serif" font-size="11" font-weight="500">Variables</text>
  <text x="75" y="395" fill="#a3a3a3" font-family="sans-serif" font-size="11">{{language}} = </text>
  <text x="185" y="395" fill="white" font-family="sans-serif" font-size="11">Python</text>
  <text x="75" y="415" fill="#a3a3a3" font-family="sans-serif" font-size="11">{{severity}} = </text>
  <text x="185" y="415" fill="white" font-family="sans-serif" font-size="11">High, Medium, Low</text>
  <text x="75" y="435" fill="#a3a3a3" font-family="sans-serif" font-size="11">{{format}} = </text>
  <text x="185" y="435" fill="white" font-family="sans-serif" font-size="11">JSON</text>

  <!-- Model config -->
  <rect x="60" y="465" width="500" height="80" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="75" y="488" fill="#a3a3a3" font-family="sans-serif" font-size="11" font-weight="500">Configuration</text>
  <text x="75" y="510" fill="#555" font-family="sans-serif" font-size="10">Temperature:</text>
  <rect x="155" y="500" width="120" height="8" rx="4" fill="#2a2a2a"/>
  <rect x="155" y="500" width="30" height="8" rx="4" fill="#d76542"/>
  <text x="285" y="510" fill="white" font-family="sans-serif" font-size="10">0.2</text>
  <text x="75" y="530" fill="#555" font-family="sans-serif" font-size="10">Max tokens:</text>
  <text x="155" y="530" fill="white" font-family="sans-serif" font-size="10">2048</text>
  <text x="250" y="530" fill="#555" font-family="sans-serif" font-size="10">Top P:</text>
  <text x="290" y="530" fill="white" font-family="sans-serif" font-size="10">0.95</text>

  <!-- Execute button -->
  <rect x="60" y="560" width="500" height="40" rx="8" fill="#d76542"/>
