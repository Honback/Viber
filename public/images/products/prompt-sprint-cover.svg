<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <circle cx="20" cy="24" r="6" fill="#d76542"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">Prompt Sprint</text>
  <text x="1060" y="30" fill="#10B981" font-family="sans-serif" font-size="11">3 runs complete</text>
  <circle cx="1170" cy="24" r="5" fill="#10B981"/>

  <!-- Left pane - Prompt input -->
  <rect x="40" y="70" width="540" height="700" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="100" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Prompt Editor</text>
  <rect x="270" y="85" width="60" height="20" rx="4" fill="#2a2a2a"/>
  <text x="300" y="99" fill="#a3a3a3" font-family="sans-serif" font-size="9" text-anchor="middle">v1.3</text>
  <text x="550" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="end">GPT-4o</text>

  <!-- System prompt -->
  <rect x="60" y="115" width="500" height="30" rx="4" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
