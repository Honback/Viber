  <rect x="60" y="640" width="160" height="30" rx="4" fill="#0A0A0A" stroke="#10B981" stroke-width="1"/>
  <text x="140" y="660" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="middle">Run 1 - 1.2s - 847 tok</text>
  <rect x="230" y="640" width="160" height="30" rx="4" fill="#0A0A0A" stroke="#10B981" stroke-width="1"/>
  <text x="310" y="660" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="middle">Run 2 - 1.4s - 912 tok</text>
  <rect x="400" y="640" width="160" height="30" rx="4" fill="#0A0A0A" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="660" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="middle">Run 3 - 1.1s - 803 tok</text>

  <!-- Cost -->
  <text x="60" y="705" fill="#a3a3a3" font-family="sans-serif" font-size="11">Total cost: $0.0042</text>
  <text x="60" y="725" fill="#a3a3a3" font-family="sans-serif" font-size="11">Avg latency: 1.23s</text>
  <text x="60" y="745" fill="#a3a3a3" font-family="sans-serif" font-size="11">Consistency score: 87%</text>

