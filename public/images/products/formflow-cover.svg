<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">FormFlow</text>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <!-- Preview toggle -->
  <rect x="1040" y="10" width="140" height="28" rx="14" fill="#252525"/>
  <rect x="1040" y="10" width="70" height="28" rx="14" fill="#d76542"/>
  <text x="1075" y="29" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle">Edit</text>
  <text x="1145" y="29" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Preview</text>
  <!-- Left sidebar - Field types -->
  <rect x="0" y="49" width="260" height="751" fill="#111111"/>
  <rect x="260" y="49" width="1" height="751" fill="#333"/>
  <text x="20" y="80" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Components</text>
  <text x="20" y="100" fill="#666" font-family="sans-serif" font-size="11">Drag to add fields</text>
  <!-- Text field component -->
  <rect x="15" y="115" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="30" y="130" width="20" height="3" rx="1" fill="#d76542"/>
  <rect x="30" y="136" width="14" height="3" rx="1" fill="#d76542"/>
  <rect x="30" y="142" width="18" height="3" rx="1" fill="#d76542"/>
  <text x="60" y="135" fill="white" font-family="sans-serif" font-size="13">Text Input</text>
  <text x="60" y="152" fill="#666" font-family="sans-serif" font-size="10">Single line text</text>
  <!-- Email field component -->
  <rect x="15" y="175" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="35" y="200" fill="#d76542" font-family="sans-serif" font-size="14">@</text>
  <text x="60" y="195" fill="white" font-family="sans-serif" font-size="13">Email</text>
  <text x="60" y="212" fill="#666" font-family="sans-serif" font-size="10">Email address field</text>
  <!-- Textarea component -->
  <rect x="15" y="235" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="30" y="250" width="20" height="14" rx="2" fill="none" stroke="#d76542" stroke-width="1.5"/>
  <line x1="33" y1="254" x2="47" y2="254" stroke="#d76542" stroke-width="1"/>
  <line x1="33" y1="258" x2="44" y2="258" stroke="#d76542" stroke-width="1"/>
  <text x="60" y="255" fill="white" font-family="sans-serif" font-size="13">Textarea</text>
  <text x="60" y="272" fill="#666" font-family="sans-serif" font-size="10">Multi-line text</text>
  <!-- Select component -->
  <rect x="15" y="295" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="30" y="310" width="20" height="14" rx="2" fill="none" stroke="#d76542" stroke-width="1.5"/>
  <path d="M35 316 L40 320 L45 316" stroke="#d76542" stroke-width="1.5" fill="none"/>
  <text x="60" y="315" fill="white" font-family="sans-serif" font-size="13">Select</text>
  <text x="60" y="332" fill="#666" font-family="sans-serif" font-size="10">Dropdown menu</text>
  <!-- Checkbox component -->
  <rect x="15" y="355" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="30" y="370" width="14" height="14" rx="3" fill="none" stroke="#d76542" stroke-width="1.5"/>
  <path d="M33 377 L36 380 L41 374" stroke="#d76542" stroke-width="1.5" fill="none"/>
  <text x="60" y="375" fill="white" font-family="sans-serif" font-size="13">Checkbox</text>
  <text x="60" y="392" fill="#666" font-family="sans-serif" font-size="10">Boolean toggle</text>
  <!-- Number component -->
  <rect x="15" y="415" width="230" height="52" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="37" y="443" fill="#d76542" font-family="monospace" font-size="16" text-anchor="middle">#</text>
  <text x="60" y="435" fill="white" font-family="sans-serif" font-size="13">Number</text>
  <text x="60" y="452" fill="#666" font-family="sans-serif" font-size="10">Numeric input</text>
  <!-- Main form builder area -->
  <rect x="290" y="70" width="880" height="700" rx="8" fill="#111111"/>
  <text x="730" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="13" text-anchor="middle">Contact Form</text>
  <!-- Form card -->
  <rect x="420" y="120" width="620" height="580" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="460" y="160" fill="white" font-family="sans-serif" font-size="20" font-weight="600">Contact Us</text>
  <text x="460" y="182" fill="#666" font-family="sans-serif" font-size="12">Fill out the form below and we'll get back to you</text>
  <!-- Name field -->
  <text x="460" y="220" fill="#a3a3a3" font-family="sans-serif" font-size="13">Name</text>
  <text x="1000" y="220" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">Required</text>
  <rect x="460" y="230" width="540" height="44" rx="8" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="480" y="257" fill="#555" font-family="sans-serif" font-size="13">Enter your name</text>
  <!-- Email field -->
  <text x="460" y="305" fill="#a3a3a3" font-family="sans-serif" font-size="13">Email</text>
  <text x="1000" y="305" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">Required</text>
  <rect x="460" y="315" width="540" height="44" rx="8" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="480" y="342" fill="#555" font-family="sans-serif" font-size="13">your@email.com</text>
  <!-- Message textarea -->
  <text x="460" y="390" fill="#a3a3a3" font-family="sans-serif" font-size="13">Message</text>
  <rect x="460" y="400" width="540" height="140" rx="8" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="480" y="430" fill="#555" font-family="sans-serif" font-size="13">Write your message here...</text>
  <!-- Submit button -->
  <rect x="460" y="570" width="540" height="48" rx="8" fill="#d76542"/>
  <text x="730" y="600" fill="white" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle">Submit</text>
  <!-- Drag handle indicators on fields -->
  <rect x="440" y="228" width="12" height="4" rx="2" fill="#444"/>
  <rect x="440" y="235" width="12" height="4" rx="2" fill="#444"/>
  <rect x="440" y="313" width="12" height="4" rx="2" fill="#444"/>
  <rect x="440" y="320" width="12" height="4" rx="2" fill="#444"/>
  <rect x="440" y="398" width="12" height="4" rx="2" fill="#444"/>
  <rect x="440" y="405" width="12" height="4" rx="2" fill="#444"/>
</svg>