  <text x="670" y="331" fill="#a3a3a3" font-family="sans-serif" font-size="11">dashboard (#138)</text>
  <text x="660" y="355" fill="#a3a3a3" font-family="sans-serif" font-size="11">- **Embeddable Widget**: Drop-in changelog</text>
