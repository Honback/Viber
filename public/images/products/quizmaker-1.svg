<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#111111"/>
  <rect x="0" y="52" width="1200" height="1" fill="#333"/>
  <text x="30" y="33" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">QuizMaker</text>
  <rect x="200" y="12" width="80" height="30" rx="6" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="240" y="32" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="middle">Create</text>
  <rect x="290" y="12" width="80" height="30" rx="6" fill="#d76542"/>
  <text x="330" y="32" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Play</text>

  <!-- Progress bar -->
  <rect x="60" y="75" width="1080" height="6" rx="3" fill="#1f1f1f"/>
  <rect x="60" y="75" width="432" height="6" rx="3" fill="#d76542"/>
  <text x="600" y="105" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="middle">2 / 5</text>

  <!-- Score indicator -->
  <rect x="1020" y="85" width="120" height="32" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="1080" y="106" font-family="sans-serif" font-size="13" fill="#d76542" text-anchor="middle">Score: 1/1</text>

  <!-- Question card -->
  <rect x="100" y="130" width="1000" height="550" rx="16" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="130" y="160" font-family="sans-serif" font-size="12" fill="#d76542">Question 2 of 5</text>

  <!-- Question text -->
  <text x="130" y="220" font-family="sans-serif" font-size="24" fill="white" font-weight="bold">JavaScript&#xC5D0;&#xC11C; &#xBCC0;&#xC218;&#xB97C;</text>
  <text x="130" y="255" font-family="sans-serif" font-size="24" fill="white" font-weight="bold">&#xC120;&#xC5B8;&#xD558;&#xB294; &#xD0A4;&#xC6CC;&#xB4DC;&#xB294;?</text>

  <!-- Answer buttons -->
  <!-- Answer A -->
  <rect x="130" y="300" width="940" height="56" rx="10" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="160" y="334" font-family="sans-serif" font-size="14" fill="#a3a3a3">A</text>
  <text x="190" y="334" font-family="sans-serif" font-size="16" fill="#e0e0e0">let</text>

  <!-- Answer B -->
  <rect x="130" y="370" width="940" height="56" rx="10" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="160" y="404" font-family="sans-serif" font-size="14" fill="#a3a3a3">B</text>
  <text x="190" y="404" font-family="sans-serif" font-size="16" fill="#e0e0e0">var</text>

  <!-- Answer C -->
  <rect x="130" y="440" width="940" height="56" rx="10" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="160" y="474" font-family="sans-serif" font-size="14" fill="#a3a3a3">C</text>
  <text x="190" y="474" font-family="sans-serif" font-size="16" fill="#e0e0e0">const</text>

  <!-- Answer D - Selected -->
  <rect x="130" y="510" width="940" height="56" rx="10" fill="#d76542" fill-opacity="0.15" stroke="#d76542" stroke-width="2"/>
  <text x="160" y="544" font-family="sans-serif" font-size="14" fill="#d76542">D</text>
  <text x="190" y="544" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">&#xC704;&#xC758; &#xBAA8;&#xB450;</text>
  <!-- Check indicator -->
  <circle cx="1040" cy="538" r="12" fill="#d76542"/>
  <path d="M1033,538 L1038,543 L1048,533" stroke="white" stroke-width="2" fill="none"/>

  <!-- Next button -->
  <rect x="130" y="600" width="940" height="48" rx="10" fill="#d76542"/>
  <text x="600" y="630" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Next Question</text>
</svg>