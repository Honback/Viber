<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="520" y="30" font-family="sans-serif" font-size="13" fill="#555">Editor</text>
  <text x="620" y="30" font-family="sans-serif" font-size="13" fill="#d76542" font-weight="bold">Preview</text>
  <rect x="610" y="40" width="60" height="2" fill="#d76542"/>
  <text x="1100" y="30" font-family="sans-serif" font-size="12" fill="#555" text-anchor="end">MarkdownPro</text>

  <!-- Preview content area -->
  <rect x="0" y="49" width="1200" height="721" fill="#111111"/>

  <!-- Rendered heading -->
  <text x="80" y="110" font-family="sans-serif" font-size="36" fill="white" font-weight="bold">API Reference Guide</text>
  <rect x="80" y="122" width="200" height="3" fill="#d76542" rx="1"/>

  <!-- Paragraph -->
  <text x="80" y="165" font-family="sans-serif" font-size="16" fill="#c0c0c0">This section documents every endpoint available in the</text>
  <text x="80" y="187" font-family="sans-serif" font-size="16" fill="#c0c0c0">application. All requests return JSON responses.</text>

  <!-- Subheading -->
  <text x="80" y="240" font-family="sans-serif" font-size="26" fill="white" font-weight="bold">Authentication</text>
  <rect x="80" y="250" width="120" height="2" fill="#d76542" rx="1"/>

  <text x="80" y="280" font-family="sans-serif" font-size="16" fill="#c0c0c0">All API calls require a valid bearer token in the header.</text>

  <!-- Code block -->
  <rect x="80" y="300" width="1040" height="80" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="100" y="325" font-family="monospace" font-size="13" fill="#888">// Example request</text>
  <text x="100" y="345" font-family="monospace" font-size="13" fill="#7ec8e3">fetch('/api/data', {</text>
  <text x="100" y="365" font-family="monospace" font-size="13" fill="#7ec8e3">  headers: { 'Authorization': 'Bearer &lt;token&gt;' }</text>

  <!-- Subheading -->
  <text x="80" y="420" font-family="sans-serif" font-size="26" fill="white" font-weight="bold">Endpoints</text>
  <rect x="80" y="430" width="90" height="2" fill="#d76542" rx="1"/>

  <!-- Bullet list -->
  <circle cx="95" cy="462" r="3" fill="#d76542"/>
  <text x="108" y="467" font-family="sans-serif" font-size="16" fill="#d76542">GET /api/users</text>
  <text x="250" y="467" font-family="sans-serif" font-size="16" fill="#a3a3a3"> - Retrieve all users</text>

  <circle cx="95" cy="492" r="3" fill="#d76542"/>
  <text x="108" y="497" font-family="sans-serif" font-size="16" fill="#d76542">POST /api/users</text>
  <text x="262" y="497" font-family="sans-serif" font-size="16" fill="#a3a3a3"> - Create a new user</text>

  <circle cx="95" cy="522" r="3" fill="#d76542"/>
  <text x="108" y="527" font-family="sans-serif" font-size="16" fill="#d76542">GET /api/posts</text>
  <text x="250" y="527" font-family="sans-serif" font-size="16" fill="#a3a3a3"> - List all posts</text>

  <circle cx="95" cy="552" r="3" fill="#d76542"/>
  <text x="108" y="557" font-family="sans-serif" font-size="16" fill="#d76542">PUT /api/posts/:id</text>
  <text x="286" y="557" font-family="sans-serif" font-size="16" fill="#a3a3a3"> - Update a post</text>

  <circle cx="95" cy="582" r="3" fill="#d76542"/>
  <text x="108" y="587" font-family="sans-serif" font-size="16" fill="#d76542">DELETE /api/posts/:id</text>
  <text x="310" y="587" font-family="sans-serif" font-size="16" fill="#a3a3a3"> - Delete a post</text>

  <!-- Blockquote -->
  <rect x="80" y="615" width="4" height="50" fill="#d76542" rx="2"/>
  <text x="100" y="635" font-family="sans-serif" font-size="15" fill="#a3a3a3" font-style="italic">Note: Rate limiting is enforced at 100 requests</text>
  <text x="100" y="655" font-family="sans-serif" font-size="15" fill="#a3a3a3" font-style="italic">per minute per API key.</text>

  <!-- Bottom status bar -->
  <rect x="0" y="770" width="1200" height="30" fill="#111111"/>
  <rect x="0" y="770" width="1200" height="1" fill="#333"/>
  <text x="16" y="790" font-family="monospace" font-size="12" fill="#666">Preview Mode</text>
  <text x="1180" y="790" font-family="monospace" font-size="12" fill="#444" text-anchor="end">Markdown</text>
</svg>