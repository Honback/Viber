<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#111111"/>
  <rect x="0" y="56" width="1200" height="1" fill="#333"/>
  <text x="30" y="35" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">PaletteAI</text>

  <!-- Search input with sunset -->
  <rect x="300" y="12" width="400" height="32" rx="8" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="320" y="33" font-family="sans-serif" font-size="14" fill="#e0e0e0">sunset</text>
  <rect x="660" y="14" width="60" height="28" rx="6" fill="#d76542"/>
  <text x="690" y="33" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Go</text>

  <!-- Harmony mode tabs - Triadic selected -->
  <rect x="800" y="14" width="110" height="28" rx="6" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="855" y="33" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Complementary</text>
  <rect x="918" y="14" width="80" height="28" rx="6" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="958" y="33" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Analogous</text>
  <rect x="1006" y="14" width="65" height="28" rx="6" fill="#d76542"/>
  <text x="1038" y="33" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Triadic</text>

  <!-- 5 warm sunset swatches -->
  <!-- Swatch 1 - Deep red -->
  <rect x="40" y="80" width="216" height="530" rx="12" fill="#9B2226"/>
  <rect x="40" y="620" width="216" height="80" fill="#0A0A0A" fill-opacity="0.7"/>
  <text x="148" y="650" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">#9B2226</text>
  <text x="148" y="675" font-family="sans-serif" font-size="12" fill="#a3a3a3" text-anchor="middle">Crimson</text>

  <!-- Swatch 2 - Burnt orange -->
  <rect x="276" y="80" width="216" height="530" rx="12" fill="#E76F51"/>
  <rect x="276" y="620" width="216" height="80" fill="#0A0A0A" fill-opacity="0.7"/>
  <text x="384" y="650" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">#E76F51</text>
  <text x="384" y="675" font-family="sans-serif" font-size="12" fill="#a3a3a3" text-anchor="middle">Burnt Sienna</text>

  <!-- Swatch 3 - Gold -->
  <rect x="512" y="80" width="216" height="530" rx="12" fill="#F4A261"/>
  <rect x="512" y="620" width="216" height="80" fill="#0A0A0A" fill-opacity="0.7"/>
  <text x="620" y="650" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">#F4A261</text>
  <text x="620" y="675" font-family="sans-serif" font-size="12" fill="#a3a3a3" text-anchor="middle">Sandy Brown</text>

  <!-- Swatch 4 - Coral -->
  <rect x="748" y="80" width="216" height="530" rx="12" fill="#E9C46A"/>
  <rect x="748" y="620" width="216" height="80" fill="#0A0A0A" fill-opacity="0.7"/>
  <text x="856" y="650" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">#E9C46A</text>
  <text x="856" y="675" font-family="sans-serif" font-size="12" fill="#a3a3a3" text-anchor="middle">Saffron</text>

  <!-- Swatch 5 - Purple twilight -->
  <rect x="984" y="80" width="216" height="530" rx="12" fill="#7B2D8E"/>
  <rect x="984" y="620" width="216" height="80" fill="#0A0A0A" fill-opacity="0.7"/>
  <text x="1092" y="650" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">#7B2D8E</text>
  <text x="1092" y="675" font-family="sans-serif" font-size="12" fill="#a3a3a3" text-anchor="middle">Twilight</text>

  <!-- Toast notification -->
  <rect x="880" y="720" width="280" height="50" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="1"/>
  <circle cx="910" cy="745" r="10" fill="#22c55e" fill-opacity="0.15"/>
  <path d="M905,745 L908,748 L916,740" stroke="#22c55e" stroke-width="2" fill="none"/>
  <text x="930" y="741" font-family="sans-serif" font-size="13" fill="white">Copied </text>
  <text x="985" y="741" font-family="monospace" font-size="13" fill="#d76542">#E76F51</text>
  <text x="930" y="758" font-family="sans-serif" font-size="10" fill="#555">to clipboard</text>
</svg>