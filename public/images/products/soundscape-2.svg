  <rect x="425" y="355" width="350" height="260" rx="12" fill="#1a1a1a" stroke="#d76542" stroke-width="1"/>
  <circle cx="465" cy="400" r="20" fill="#1f1f1f" stroke="#d76542" stroke-width="1"/>
  <text x="465" y="405" font-family="sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">&#x223C;</text>
  <text x="500" y="395" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">Waves</text>
  <text x="500" y="413" font-family="sans-serif" font-size="11" fill="#a3a3a3">Ocean waves</text>
  <rect x="728" y="390" width="36" height="20" rx="10" fill="#22c55e"/>
  <circle cx="752" cy="400" r="7" fill="white"/>
  <rect x="445" y="445" width="260" height="6" rx="3" fill="#1f1f1f"/>
  <rect x="445" y="445" width="234" height="6" rx="3" fill="#d76542"/>
  <circle cx="679" cy="448" r="7" fill="#d76542"/>
