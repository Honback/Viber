  <rect x="445" y="480" width="6" height="40" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="457" y="490" width="6" height="30" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="469" y="475" width="6" height="45" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="481" y="485" width="6" height="35" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="493" y="495" width="6" height="25" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="505" y="478" width="6" height="42" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="517" y="488" width="6" height="32" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="529" y="482" width="6" height="38" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="541" y="492" width="6" height="28" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="553" y="483" width="6" height="37" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="565" y="497" width="6" height="23" rx="2" fill="#d76542" opacity="0.7"/>
  <rect x="577" y="479" width="6" height="41" rx="2" fill="#d76542" opacity="0.7"/>

  <!-- Forest - ON, Active -->
  <rect x="800" y="355" width="350" height="260" rx="12" fill="#1a1a1a" stroke="#d76542" stroke-width="1"/>
  <circle cx="840" cy="400" r="20" fill="#1f1f1f" stroke="#d76542" stroke-width="1"/>
  <text x="840" y="405" font-family="sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">&#x2663;</text>
  <text x="875" y="395" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">Forest</text>
  <text x="875" y="413" font-family="sans-serif" font-size="11" fill="#a3a3a3">Birds and trees</text>
