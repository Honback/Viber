  <circle cx="1122" cy="400" r="7" fill="white"/>
  <rect x="820" y="445" width="260" height="6" rx="3" fill="#1f1f1f"/>
  <rect x="820" y="445" width="182" height="6" rx="3" fill="#d76542"/>
  <circle cx="1002" cy="448" r="7" fill="#d76542"/>
  <text x="1040" y="452" font-family="monospace" font-size="12" fill="white">70%</text>
  <!-- Waveform -->
  <rect x="820" y="480" width="6" height="30" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="832" y="488" width="6" height="22" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="844" y="476" width="6" height="34" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="856" y="484" width="6" height="26" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="868" y="492" width="6" height="18" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="880" y="479" width="6" height="31" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="892" y="486" width="6" height="24" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="904" y="481" width="6" height="29" rx="2" fill="#d76542" opacity="0.6"/>
  <rect x="916" y="490" width="6" height="20" rx="2" fill="#d76542" opacity="0.6"/>

  <!-- Preset buttons - Relax active -->
  <rect x="0" y="740" width="1200" height="60" fill="#111111"/>
  <rect x="0" y="740" width="1200" height="1" fill="#333"/>
  <rect x="380" y="752" width="120" height="36" rx="8" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="440" y="775" font-family="sans-serif" font-size="14" fill="#a3a3a3" text-anchor="middle">Focus</text>
  <rect x="520" y="752" width="120" height="36" rx="8" fill="#d76542"/>
  <text x="580" y="775" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Relax</text>
  <rect x="660" y="752" width="120" height="36" rx="8" fill="#1f1f1f" stroke="#333" stroke-width="1"/>
  <text x="720" y="775" font-family="sans-serif" font-size="14" fill="#a3a3a3" text-anchor="middle">Sleep</text>
