<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <circle cx="20" cy="24" r="6" fill="#d76542"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">Shipyard Notes</text>
  <text x="180" y="30" fill="#a3a3a3" font-family="sans-serif" font-size="12">/ Public Changelog</text>

  <!-- Public changelog page preview -->
  <rect x="40" y="70" width="1120" height="700" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Hero section -->
  <rect x="60" y="90" width="1080" height="120" rx="8" fill="#0A0A0A"/>
  <text x="600" y="135" fill="white" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle">Changelog</text>
  <text x="600" y="165" fill="#a3a3a3" font-family="sans-serif" font-size="14" text-anchor="middle">See what's new and what's changed in our product</text>
  <rect x="500" y="178" width="90" height="24" rx="6" fill="#d76542"/>
  <text x="545" y="194" fill="white" font-family="sans-serif" font-size="10" text-anchor="middle">Subscribe</text>
  <rect x="600" y="178" width="90" height="24" rx="6" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <text x="645" y="194" fill="#a3a3a3" font-family="sans-serif" font-size="10" text-anchor="middle">RSS Feed</text>

  <!-- Filter bar -->
  <rect x="60" y="225" width="1080" height="36" rx="6" fill="#0A0A0A"/>
  <rect x="70" y="231" width="50" height="24" rx="4" fill="#d76542" opacity="0.2"/>
  <text x="95" y="247" fill="#d76542" font-family="sans-serif" font-size="10" text-anchor="middle">All</text>
  <rect x="128" y="231" width="65" height="24" rx="4" fill="#2a2a2a"/>
  <text x="160" y="247" fill="#a3a3a3" font-family="sans-serif" font-size="10" text-anchor="middle">Features</text>
  <rect x="201" y="231" width="50" height="24" rx="4" fill="#2a2a2a"/>
  <text x="226" y="247" fill="#a3a3a3" font-family="sans-serif" font-size="10" text-anchor="middle">Fixes</text>
  <rect x="259" y="231" width="70" height="24" rx="4" fill="#2a2a2a"/>
  <text x="294" y="247" fill="#a3a3a3" font-family="sans-serif" font-size="10" text-anchor="middle">Breaking</text>

  <!-- Release 1 - v2.4.0 -->
  <rect x="60" y="280" width="1080" height="200" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <!-- Timeline dot -->
  <circle cx="100" cy="310" r="8" fill="#d76542"/>
  <line x1="100" y1="318" x2="100" y2="480" stroke="#333" stroke-width="1"/>
  <text x="120" y="305" fill="#d76542" font-family="sans-serif" font-size="11">April 8, 2026</text>
  <text x="120" y="330" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">v2.4.0</text>
  <rect x="210" y="315" width="55" height="18" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="237" y="328" fill="#10B981" font-family="sans-serif" font-size="9" text-anchor="middle">3 features</text>
  <rect x="273" y="315" width="45" height="18" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="295" y="328" fill="#3B82F6" font-family="sans-serif" font-size="9" text-anchor="middle">2 fixes</text>

  <text x="120" y="360" fill="white" font-family="sans-serif" font-size="12">AI-powered release note generation from git commits</text>
  <text x="120" y="380" fill="white" font-family="sans-serif" font-size="12">Multi-project changelog support</text>
  <text x="120" y="400" fill="white" font-family="sans-serif" font-size="12">Embeddable changelog widget</text>
  <text x="120" y="425" fill="#3B82F6" font-family="sans-serif" font-size="11">Fixed markdown rendering and timezone issues</text>
  <text x="120" y="455" fill="#555" font-family="sans-serif" font-size="10">Read full release notes ></text>

  <!-- Release 2 - v2.3.1 -->
  <rect x="60" y="495" width="1080" height="130" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="525" r="6" fill="#a3a3a3"/>
  <line x1="100" y1="531" x2="100" y2="625" stroke="#333" stroke-width="1"/>
  <text x="120" y="520" fill="#a3a3a3" font-family="sans-serif" font-size="11">April 3, 2026</text>
  <text x="120" y="545" fill="white" font-family="sans-serif" font-size="16" font-weight="600">v2.3.1</text>
  <rect x="200" y="532" width="45" height="18" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="222" y="545" fill="#3B82F6" font-family="sans-serif" font-size="9" text-anchor="middle">2 fixes</text>

  <text x="120" y="575" fill="white" font-family="sans-serif" font-size="12">Fixed RSS feed generation for non-ASCII characters</text>
  <text x="120" y="595" fill="white" font-family="sans-serif" font-size="12">Corrected pagination in version list API</text>

  <!-- Release 3 - v2.3.0 -->
  <rect x="60" y="640" width="1080" height="115" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="670" r="6" fill="#a3a3a3"/>
  <text x="120" y="665" fill="#a3a3a3" font-family="sans-serif" font-size="11">March 28, 2026</text>
  <text x="120" y="690" fill="white" font-family="sans-serif" font-size="16" font-weight="600">v2.3.0</text>
  <rect x="200" y="677" width="60" height="18" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="230" y="690" fill="#10B981" font-family="sans-serif" font-size="9" text-anchor="middle">5 features</text>
  <rect x="268" y="677" width="45" height="18" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="290" y="690" fill="#3B82F6" font-family="sans-serif" font-size="9" text-anchor="middle">3 fixes</text>

  <text x="120" y="720" fill="white" font-family="sans-serif" font-size="12">Custom branding for public changelog pages</text>
  <text x="120" y="740" fill="white" font-family="sans-serif" font-size="12">Slack integration for release notifications</text>
</svg>