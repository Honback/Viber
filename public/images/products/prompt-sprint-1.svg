<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <circle cx="20" cy="24" r="6" fill="#d76542"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">Prompt Sprint</text>
  <text x="180" y="30" fill="#a3a3a3" font-family="sans-serif" font-size="12">/ Diff View</text>

  <!-- Diff comparison view -->
  <text x="40" y="90" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Run Comparison</text>

  <!-- Run 1 vs Run 2 header -->
  <rect x="40" y="105" width="560" height="30" rx="4" fill="#1a1a1a"/>
  <text x="320" y="124" fill="#d76542" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle">Run 1 (847 tokens)</text>
  <rect x="610" y="105" width="550" height="30" rx="4" fill="#1a1a1a"/>
  <text x="885" y="124" fill="#3B82F6" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle">Run 2 (912 tokens)</text>

  <!-- Side by side diff -->
  <rect x="40" y="140" width="560" height="500" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <rect x="610" y="140" width="550" height="500" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>

  <!-- Line numbers + content left -->
  <text x="55" y="165" fill="#555" font-family="monospace" font-size="10">1</text>
  <text x="80" y="165" fill="white" font-family="monospace" font-size="11">{ "vulnerabilities": [</text>
  <text x="55" y="185" fill="#555" font-family="monospace" font-size="10">2</text>
  <text x="80" y="185" fill="white" font-family="monospace" font-size="11">  {</text>
  <text x="55" y="205" fill="#555" font-family="monospace" font-size="10">3</text>
  <text x="80" y="205" fill="white" font-family="monospace" font-size="11">    "type": "SQL Injection",</text>
  <text x="55" y="225" fill="#555" font-family="monospace" font-size="10">4</text>
  <text x="80" y="225" fill="white" font-family="monospace" font-size="11">    "severity": "High",</text>

  <!-- Diff highlight left -->
  <rect x="40" y="232" width="560" height="20" fill="#10B981" opacity="0.1"/>
  <text x="55" y="247" fill="#555" font-family="monospace" font-size="10">5</text>
  <text x="80" y="247" fill="#10B981" font-family="monospace" font-size="11">    "description": "f-string SQL</text>

  <rect x="40" y="252" width="560" height="20" fill="#10B981" opacity="0.1"/>
  <text x="55" y="267" fill="#555" font-family="monospace" font-size="10">6</text>
  <text x="80" y="267" fill="#10B981" font-family="monospace" font-size="11">     injection vulnerability",</text>

  <text x="55" y="290" fill="#555" font-family="monospace" font-size="10">7</text>
  <text x="80" y="290" fill="white" font-family="monospace" font-size="11">    "fix": "Use parameterized</text>
  <text x="55" y="310" fill="#555" font-family="monospace" font-size="10">8</text>
  <text x="80" y="310" fill="white" font-family="monospace" font-size="11">     queries with placeholders"</text>

  <text x="55" y="340" fill="#555" font-family="monospace" font-size="10">9</text>
  <text x="80" y="340" fill="white" font-family="monospace" font-size="11">  },</text>
  <text x="55" y="360" fill="#555" font-family="monospace" font-size="10">10</text>
  <text x="80" y="360" fill="white" font-family="monospace" font-size="11">  {</text>
  <text x="55" y="380" fill="#555" font-family="monospace" font-size="10">11</text>
  <text x="80" y="380" fill="white" font-family="monospace" font-size="11">    "type": "No input validation"</text>

  <!-- Missing in Run 1 -->
  <rect x="40" y="392" width="560" height="40" fill="#EF4444" opacity="0.05"/>
  <text x="55" y="407" fill="#555" font-family="monospace" font-size="10">--</text>
  <text x="80" y="407" fill="#555" font-family="monospace" font-size="11" font-style="italic">(not present in Run 1)</text>

  <!-- Line numbers + content right -->
  <text x="625" y="165" fill="#555" font-family="monospace" font-size="10">1</text>
  <text x="650" y="165" fill="white" font-family="monospace" font-size="11">{ "vulnerabilities": [</text>
  <text x="625" y="185" fill="#555" font-family="monospace" font-size="10">2</text>
  <text x="650" y="185" fill="white" font-family="monospace" font-size="11">  {</text>
  <text x="625" y="205" fill="#555" font-family="monospace" font-size="10">3</text>
  <text x="650" y="205" fill="white" font-family="monospace" font-size="11">    "type": "SQL Injection",</text>
  <text x="625" y="225" fill="#555" font-family="monospace" font-size="10">4</text>
  <text x="650" y="225" fill="white" font-family="monospace" font-size="11">    "severity": "Critical",</text>

  <!-- Diff highlight right -->
  <rect x="610" y="232" width="550" height="20" fill="#F59E0B" opacity="0.1"/>
  <text x="625" y="247" fill="#555" font-family="monospace" font-size="10">5</text>
  <text x="650" y="247" fill="#F59E0B" font-family="monospace" font-size="11">    "description": "Direct string</text>

  <rect x="610" y="252" width="550" height="20" fill="#F59E0B" opacity="0.1"/>
  <text x="625" y="267" fill="#555" font-family="monospace" font-size="10">6</text>
  <text x="650" y="267" fill="#F59E0B" font-family="monospace" font-size="11">     interpolation in SQL query",</text>

  <text x="625" y="290" fill="#555" font-family="monospace" font-size="10">7</text>
  <text x="650" y="290" fill="white" font-family="monospace" font-size="11">    "fix": "Use parameterized</text>
  <text x="625" y="310" fill="#555" font-family="monospace" font-size="10">8</text>
  <text x="650" y="310" fill="white" font-family="monospace" font-size="11">     queries with placeholders"</text>
  <text x="625" y="340" fill="#555" font-family="monospace" font-size="10">9</text>
  <text x="650" y="340" fill="white" font-family="monospace" font-size="11">  },</text>
  <text x="625" y="360" fill="#555" font-family="monospace" font-size="10">10</text>
  <text x="650" y="360" fill="white" font-family="monospace" font-size="11">  {</text>
  <text x="625" y="380" fill="#555" font-family="monospace" font-size="10">11</text>
  <text x="650" y="380" fill="white" font-family="monospace" font-size="11">    "type": "No input validation"</text>

  <!-- Extra in Run 2 -->
  <rect x="610" y="392" width="550" height="40" fill="#10B981" opacity="0.1"/>
  <text x="625" y="407" fill="#555" font-family="monospace" font-size="10">12</text>
  <text x="650" y="407" fill="#10B981" font-family="monospace" font-size="11">    "type": "No error handling",</text>
  <text x="625" y="422" fill="#555" font-family="monospace" font-size="10">13</text>
  <text x="650" y="422" fill="#10B981" font-family="monospace" font-size="11">    "severity": "Low"</text>

  <!-- Diff summary -->
  <rect x="40" y="660" width="1120" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="690" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Diff Summary</text>
  <rect x="60" y="705" width="160" height="22" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="140" y="720" fill="#10B981" font-family="sans-serif" font-size="11" text-anchor="middle">Matching: 85%</text>
  <rect x="230" y="705" width="180" height="22" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="320" y="720" fill="#F59E0B" font-family="sans-serif" font-size="11" text-anchor="middle">Wording changes: 3</text>
  <rect x="420" y="705" width="180" height="22" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="510" y="720" fill="#3B82F6" font-family="sans-serif" font-size="11" text-anchor="middle">Semantic similar: 2</text>
  <rect x="610" y="705" width="180" height="22" rx="4" fill="#EF4444" opacity="0.15"/>
  <text x="700" y="720" fill="#EF4444" font-family="sans-serif" font-size="11" text-anchor="middle">Unique to Run 2: 1</text>

  <text x="60" y="750" fill="#a3a3a3" font-family="sans-serif" font-size="11">Key variance: Run 2 uses "Critical" instead of "High" for SQL injection severity, and includes an additional "No error handling" finding.</text>
</svg>