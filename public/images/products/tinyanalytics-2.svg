<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#111111"/>
  <rect x="0" y="52" width="1200" height="1" fill="#333"/>
  <text x="30" y="33" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">TinyAnalytics</text>
  <text x="200" y="33" font-family="sans-serif" font-size="13" fill="#a3a3a3">Real-time</text>
  <!-- Live indicator -->
  <circle cx="1155" cy="26" r="5" fill="#22c55e"/>
  <circle cx="1155" cy="26" r="8" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="1140" y="31" font-family="sans-serif" font-size="12" fill="#22c55e" text-anchor="end">LIVE</text>

  <!-- Large number hero -->
  <rect x="30" y="75" width="1140" height="200" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="155" r="6" fill="#22c55e"/>
  <circle cx="200" cy="155" r="10" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <text x="220" y="140" font-family="sans-serif" font-size="13" fill="#a3a3a3">Active visitors right now</text>
  <text x="220" y="190" font-family="sans-serif" font-size="64" fill="white" font-weight="bold">47</text>
  <!-- Mini sparkline -->
  <polyline points="700,170 720,150 740,155 760,130 780,140 800,125 820,135 840,120 860,130 880,110 900,120 920,115 940,105 960,110 980,100 1000,108 1020,95 1040,100 1060,90 1080,95 1100,88" fill="none" stroke="#d76542" stroke-width="2"/>
  <text x="700" y="200" font-family="sans-serif" font-size="11" fill="#555">Last 60 seconds</text>

  <!-- Active pages list -->
  <rect x="30" y="295" width="750" height="480" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="330" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">Active Pages</text>
  <text x="60" y="350" font-family="sans-serif" font-size="12" fill="#555">Pages being viewed right now</text>
  <!-- Table header -->
  <text x="60" y="385" font-family="sans-serif" font-size="11" fill="#555">Page</text>
  <text x="550" y="385" font-family="sans-serif" font-size="11" fill="#555">Visitors</text>
  <text x="680" y="385" font-family="sans-serif" font-size="11" fill="#555">Duration</text>
  <line x1="60" y1="395" x2="760" y2="395" stroke="#222" stroke-width="1"/>
  <!-- Row 1 -->
  <circle cx="70" cy="420" r="4" fill="#22c55e"/>
  <text x="85" y="425" font-family="monospace" font-size="13" fill="#e0e0e0">/</text>
  <text x="550" y="425" font-family="sans-serif" font-size="13" fill="white">18</text>
  <text x="680" y="425" font-family="sans-serif" font-size="13" fill="#a3a3a3">avg 1m 23s</text>
  <line x1="60" y1="440" x2="760" y2="440" stroke="#1f1f1f" stroke-width="1"/>
  <!-- Row 2 -->
  <circle cx="70" cy="460" r="4" fill="#22c55e"/>
  <text x="85" y="465" font-family="monospace" font-size="13" fill="#e0e0e0">/pricing</text>
  <text x="550" y="465" font-family="sans-serif" font-size="13" fill="white">12</text>
  <text x="680" y="465" font-family="sans-serif" font-size="13" fill="#a3a3a3">avg 2m 45s</text>
  <line x1="60" y1="480" x2="760" y2="480" stroke="#1f1f1f" stroke-width="1"/>
  <!-- Row 3 -->
  <circle cx="70" cy="500" r="4" fill="#22c55e"/>
  <text x="85" y="505" font-family="monospace" font-size="13" fill="#e0e0e0">/blog/getting-started</text>
  <text x="550" y="505" font-family="sans-serif" font-size="13" fill="white">8</text>
  <text x="680" y="505" font-family="sans-serif" font-size="13" fill="#a3a3a3">avg 4m 12s</text>
  <line x1="60" y1="520" x2="760" y2="520" stroke="#1f1f1f" stroke-width="1"/>
  <!-- Row 4 -->
  <circle cx="70" cy="540" r="4" fill="#22c55e"/>
  <text x="85" y="545" font-family="monospace" font-size="13" fill="#e0e0e0">/docs/api</text>
  <text x="550" y="545" font-family="sans-serif" font-size="13" fill="white">5</text>
  <text x="680" y="545" font-family="sans-serif" font-size="13" fill="#a3a3a3">avg 6m 01s</text>
  <line x1="60" y1="560" x2="760" y2="560" stroke="#1f1f1f" stroke-width="1"/>
  <!-- Row 5 -->
  <circle cx="70" cy="580" r="4" fill="#22c55e"/>
  <text x="85" y="585" font-family="monospace" font-size="13" fill="#e0e0e0">/about</text>
  <text x="550" y="585" font-family="sans-serif" font-size="13" fill="white">4</text>
  <text x="680" y="585" font-family="sans-serif" font-size="13" fill="#a3a3a3">avg 0m 48s</text>

  <!-- Right side stats -->
  <rect x="800" y="295" width="370" height="225" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="830" y="330" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Real-time Stats</text>
  <text x="830" y="370" font-family="sans-serif" font-size="12" fill="#555">Pages/min</text>
  <text x="830" y="395" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">124</text>
  <text x="830" y="430" font-family="sans-serif" font-size="12" fill="#555">Avg. Time on Page</text>
  <text x="830" y="455" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">3m 12s</text>
  <text x="830" y="490" font-family="sans-serif" font-size="12" fill="#555">New Visitors (today)</text>
  <text x="830" y="510" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">892</text>

  <rect x="800" y="540" width="370" height="235" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="830" y="575" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Top Countries</text>
  <text x="830" y="610" font-family="sans-serif" font-size="13" fill="#e0e0e0">US</text>
  <text x="1100" y="610" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="end">42%</text>
  <text x="830" y="640" font-family="sans-serif" font-size="13" fill="#e0e0e0">UK</text>
  <text x="1100" y="640" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="end">18%</text>
  <text x="830" y="670" font-family="sans-serif" font-size="13" fill="#e0e0e0">Germany</text>
  <text x="1100" y="670" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="end">12%</text>
  <text x="830" y="700" font-family="sans-serif" font-size="13" fill="#e0e0e0">Japan</text>
  <text x="1100" y="700" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="end">9%</text>
  <text x="830" y="730" font-family="sans-serif" font-size="13" fill="#e0e0e0">Korea</text>
  <text x="1100" y="730" font-family="sans-serif" font-size="13" fill="#a3a3a3" text-anchor="end">7%</text>
</svg>