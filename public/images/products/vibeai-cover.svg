<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="600" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">VibeAI</text>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <!-- Sidebar -->
  <rect x="0" y="49" width="260" height="751" fill="#111111"/>
  <rect x="260" y="49" width="1" height="751" fill="#333"/>
  <!-- Sidebar header -->
  <text x="20" y="80" fill="#a3a3a3" font-family="sans-serif" font-size="12" font-weight="bold">대화 목록</text>
  <!-- Conversation items -->
  <rect x="12" y="94" width="236" height="44" rx="8" fill="#d76542" opacity="0.15"/>
  <rect x="12" y="94" width="3" height="44" rx="2" fill="#d76542"/>
  <text x="24" y="112" fill="white" font-family="sans-serif" font-size="13" font-weight="600">React 컴포넌트 생성</text>
  <text x="24" y="128" fill="#666" font-family="sans-serif" font-size="11">방금 전</text>
  <rect x="12" y="146" width="236" height="44" rx="8" fill="transparent"/>
  <text x="24" y="164" fill="#a3a3a3" font-family="sans-serif" font-size="13">Python API 서버 설계</text>
  <text x="24" y="180" fill="#666" font-family="sans-serif" font-size="11">2시간 전</text>
  <rect x="12" y="198" width="236" height="44" rx="8" fill="transparent"/>
  <text x="24" y="216" fill="#a3a3a3" font-family="sans-serif" font-size="13">TypeScript 타입 정의</text>
  <text x="24" y="232" fill="#666" font-family="sans-serif" font-size="11">어제</text>
  <rect x="12" y="250" width="236" height="44" rx="8" fill="transparent"/>
  <text x="24" y="268" fill="#a3a3a3" font-family="sans-serif" font-size="13">데이터베이스 스키마</text>
  <text x="24" y="284" fill="#666" font-family="sans-serif" font-size="11">3일 전</text>
  <rect x="12" y="302" width="236" height="44" rx="8" fill="transparent"/>
  <text x="24" y="320" fill="#a3a3a3" font-family="sans-serif" font-size="13">CSS 애니메이션 구현</text>
  <text x="24" y="336" fill="#666" font-family="sans-serif" font-size="11">1주일 전</text>
  <!-- New chat button -->
  <rect x="12" y="720" width="236" height="40" rx="8" fill="#d76542"/>
  <text x="130" y="745" fill="white" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">+ 새 대화</text>
  <!-- Main chat area -->
  <!-- User message -->
  <rect x="580" y="80" width="580" height="50" rx="12" fill="#d76542"/>
  <text x="600" y="100" fill="white" font-family="sans-serif" font-size="14">React에서 다크 테마 토글 버튼 컴포넌트 만들어줘.</text>
  <text x="600" y="118" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="11">코드로 작성해줘</text>
  <!-- AI response -->
  <rect x="290" y="150" width="580" height="30" rx="0" fill="transparent"/>
  <circle cx="310" cy="165" r="12" fill="#d76542"/>
  <text x="310" y="170" fill="white" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">AI</text>
  <text x="330" y="170" fill="#a3a3a3" font-family="sans-serif" font-size="13">네, 다크 테마 토글 버튼을 만들어 드릴게요!</text>
  <!-- Code block -->
  <rect x="290" y="190" width="580" height="340" rx="8" fill="#1a1a1a"/>
  <rect x="290" y="190" width="580" height="32" rx="8" fill="#252525"/>
  <rect x="290" y="210" width="580" height="12" fill="#252525"/>
  <text x="305" y="210" fill="#a3a3a3" font-family="sans-serif" font-size="12">ThemeToggle.tsx</text>
  <rect x="820" y="198" width="40" height="20" rx="4" fill="#333"/>
  <text x="840" y="212" fill="#a3a3a3" font-family="monospace" font-size="10" text-anchor="middle">Copy</text>
  <!-- Code lines -->
  <text x="305" y="245" fill="#C084FC" font-family="monospace" font-size="12">import</text>
  <text x="352" y="245" fill="white" font-family="monospace" font-size="12"> React, { useState } </text>
  <text x="540" y="245" fill="#C084FC" font-family="monospace" font-size="12">from</text>
  <text x="575" y="245" fill="#86EFAC" font-family="monospace" font-size="12"> 'react';</text>
  <text x="305" y="265" fill="white" font-family="monospace" font-size="12"></text>
  <text x="305" y="285" fill="#C084FC" font-family="monospace" font-size="12">export const</text>
  <text x="400" y="285" fill="#60A5FA" font-family="monospace" font-size="12"> ThemeToggle</text>
  <text x="510" y="285" fill="white" font-family="monospace" font-size="12"> = () =&gt; {</text>
  <text x="325" y="305" fill="#C084FC" font-family="monospace" font-size="12">const</text>
  <text x="368" y="305" fill="white" font-family="monospace" font-size="12"> [dark, setDark] = </text>
  <text x="530" y="305" fill="#60A5FA" font-family="monospace" font-size="12">useState</text>
  <text x="600" y="305" fill="white" font-family="monospace" font-size="12">(</text>
  <text x="608" y="305" fill="#F97316" font-family="monospace" font-size="12">false</text>
  <text x="648" y="305" fill="white" font-family="monospace" font-size="12">);</text>
  <text x="325" y="345" fill="#C084FC" font-family="monospace" font-size="12">return</text>
  <text x="370" y="345" fill="white" font-family="monospace" font-size="12"> (</text>
  <text x="345" y="365" fill="#7DD3FC" font-family="monospace" font-size="12">&lt;button</text>
  <text x="365" y="385" fill="#F9A8D4" font-family="monospace" font-size="12">onClick</text>
  <text x="425" y="385" fill="white" font-family="monospace" font-size="12">={() =&gt; setDark(!dark)}</text>
  <text x="365" y="405" fill="#F9A8D4" font-family="monospace" font-size="12">className</text>
  <text x="440" y="405" fill="white" font-family="monospace" font-size="12">=</text>
  <text x="450" y="405" fill="#86EFAC" font-family="monospace" font-size="12">"toggle-btn"</text>
  <text x="345" y="425" fill="#7DD3FC" font-family="monospace" font-size="12">&gt;</text>
  <text x="365" y="445" fill="white" font-family="monospace" font-size="12">{dark ? '🌙' : '☀️'}</text>
  <text x="345" y="465" fill="#7DD3FC" font-family="monospace" font-size="12">&lt;/button&gt;</text>
  <text x="325" y="485" fill="white" font-family="monospace" font-size="12">);</text>
  <text x="305" y="505" fill="white" font-family="monospace" font-size="12">};</text>
  <!-- AI follow-up text -->
  <text x="290" y="560" fill="#a3a3a3" font-family="sans-serif" font-size="13">이 컴포넌트는 useState를 사용하여 다크/라이트 모드를 전환합니다.</text>
  <text x="290" y="580" fill="#a3a3a3" font-family="sans-serif" font-size="13">CSS 스타일도 함께 추가하시겠어요?</text>
  <!-- Input bar -->
  <rect x="261" y="740" width="939" height="60" fill="#111111"/>
  <rect x="261" y="740" width="939" height="1" fill="#333"/>
  <rect x="285" y="752" width="870" height="40" rx="20" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="310" y="777" fill="#666" font-family="sans-serif" font-size="14">메시지를 입력하세요...</text>
  <circle cx="1130" cy="772" r="16" fill="#d76542"/>
  <path d="M1124 772 L1130 766 L1136 772 M1130 766 L1130 780" stroke="white" stroke-width="2" fill="none"/>
</svg>