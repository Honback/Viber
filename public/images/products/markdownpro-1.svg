  <!-- Editor content -->
  <text x="60" y="80" font-family="monospace" font-size="13" fill="#d76542"># Project Documentation</text>
  <text x="60" y="120" font-family="monospace" font-size="13" fill="#e0e0e0">This document covers the **architecture**</text>
  <text x="60" y="140" font-family="monospace" font-size="13" fill="#e0e0e0">and **design decisions** for the project.</text>
  <text x="60" y="180" font-family="monospace" font-size="13" fill="#d76542">## Table of Contents</text>
  <text x="60" y="200" font-family="monospace" font-size="13" fill="#e0e0e0">1. Introduction</text>
  <text x="60" y="220" font-family="monospace" font-size="13" fill="#e0e0e0">2. Architecture Overview</text>
  <text x="60" y="240" font-family="monospace" font-size="13" fill="#e0e0e0">3. API Reference</text>
  <text x="60" y="260" font-family="monospace" font-size="13" fill="#e0e0e0">4. Deployment Guide</text>
  <text x="60" y="300" font-family="monospace" font-size="13" fill="#d76542">## Introduction</text>
  <text x="60" y="340" font-family="monospace" font-size="13" fill="#e0e0e0">The application is built with a</text>
  <text x="60" y="360" font-family="monospace" font-size="13" fill="#e0e0e0">*microservice* architecture using:</text>
  <text x="60" y="400" font-family="monospace" font-size="13" fill="#e0e0e0">- **Node.js** for the backend</text>
  <text x="60" y="420" font-family="monospace" font-size="13" fill="#e0e0e0">- **React** for the frontend</text>
  <text x="60" y="440" font-family="monospace" font-size="13" fill="#e0e0e0">- **PostgreSQL** for data storage</text>
  <text x="60" y="460" font-family="monospace" font-size="13" fill="#e0e0e0">- **Redis** for caching</text>
  <text x="60" y="500" font-family="monospace" font-size="13" fill="#888">```bash</text>
  <text x="60" y="520" font-family="monospace" font-size="13" fill="#7ec8e3">npm install</text>
  <text x="60" y="540" font-family="monospace" font-size="13" fill="#7ec8e3">npm run dev</text>
  <text x="60" y="560" font-family="monospace" font-size="13" fill="#888">```</text>
  <text x="60" y="600" font-family="monospace" font-size="13" fill="#e0e0e0">&gt; **Note**: Ensure Docker is running</text>
  <text x="60" y="620" font-family="monospace" font-size="13" fill="#e0e0e0">&gt; before starting the dev server.</text>

