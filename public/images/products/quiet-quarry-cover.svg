  <rect x="1040" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
  <rect x="1040" y="160" width="20" height="60" rx="4" fill="#10B981"/>
  <rect x="1070" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
  <rect x="1070" y="168" width="20" height="52" rx="4" fill="#10B981"/>
  <rect x="1100" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
  <rect x="1100" y="172" width="20" height="48" rx="4" fill="#10B981"/>

