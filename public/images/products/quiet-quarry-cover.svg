  <!-- Large circular timer -->
  <circle cx="400" cy="310" r="150" fill="none" stroke="#2a2a2a" stroke-width="8"/>
  <circle cx="400" cy="310" r="150" fill="none" stroke="#d76542" stroke-width="8" stroke-dasharray="565" stroke-dashoffset="141" stroke-linecap="round" transform="rotate(-90 400 310)"/>
  <circle cx="400" cy="310" r="130" fill="#0A0A0A" opacity="0.5"/>

  <text x="400" y="285" fill="white" font-family="sans-serif" font-size="56" font-weight="bold" text-anchor="middle">18:42</text>
  <text x="400" y="315" fill="#a3a3a3" font-family="sans-serif" font-size="14" text-anchor="middle">remaining</text>
  <text x="400" y="345" fill="#d76542" font-family="sans-serif" font-size="12" text-anchor="middle">Session 3 of 4</text>

