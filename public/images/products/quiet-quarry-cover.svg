  <text x="80" y="678" fill="#a3a3a3" font-family="sans-serif" font-size="10">9:00 - 9:25 AM | 25 min | 35 dB avg</text>
  <text x="280" y="660" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="end">Complete</text>

  <rect x="310" y="640" width="80" height="50" rx="6" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>
  <text x="350" y="660" fill="#3B82F6" font-family="sans-serif" font-size="10" text-anchor="middle">Break</text>
  <text x="350" y="678" fill="#555" font-family="sans-serif" font-size="9" text-anchor="middle">5 min</text>

  <rect x="400" y="640" width="240" height="50" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="420" y="660" fill="white" font-family="sans-serif" font-size="11" font-weight="500">Session 2 - Focus</text>
  <text x="420" y="678" fill="#a3a3a3" font-family="sans-serif" font-size="10">9:30 - 9:55 AM | 25 min | 40 dB avg</text>
  <text x="620" y="660" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="end">Complete</text>

  <rect x="650" y="640" width="80" height="50" rx="6" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>
  <text x="690" y="660" fill="#3B82F6" font-family="sans-serif" font-size="10" text-anchor="middle">Break</text>
  <text x="690" y="678" fill="#555" font-family="sans-serif" font-size="9" text-anchor="middle">5 min</text>

  <rect x="740" y="640" width="240" height="50" rx="6" fill="#d76542" opacity="0.15" stroke="#d76542" stroke-width="1.5"/>
  <text x="760" y="660" fill="white" font-family="sans-serif" font-size="11" font-weight="500">Session 3 - Focus</text>
  <text x="760" y="678" fill="#a3a3a3" font-family="sans-serif" font-size="10">10:05 AM | 18:42 remaining</text>
  <text x="960" y="660" fill="#d76542" font-family="sans-serif" font-size="10" text-anchor="end">Active</text>

  <!-- Noise timeline -->
  <text x="60" y="720" fill="#a3a3a3" font-family="sans-serif" font-size="10">Noise timeline:</text>
  <polyline points="160,720 250,718 340,715 430,720 520,722 610,719 700,725 790,735 820,730 850,720 900,718 950,715 1000,720 1050,718 1100,722 1130,720" fill="none" stroke="#d76542" stroke-width="1.5" opacity="0.5"/>
  <circle cx="790" cy="735" r="3" fill="#d76542"/>
  <text x="790" y="750" fill="#555" font-family="sans-serif" font-size="8" text-anchor="middle">67dB peak</text>
</svg>