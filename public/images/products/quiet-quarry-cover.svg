  <rect x="920" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
  <rect x="920" y="155" width="20" height="65" rx="4" fill="#F59E0B"/>
  <rect x="950" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
  <rect x="950" y="140" width="20" height="80" rx="4" fill="#F59E0B"/>
  <rect x="980" y="120" width="20" height="100" rx="4" fill="#2a2a2a"/>
