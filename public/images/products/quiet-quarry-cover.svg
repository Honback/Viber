  <text x="1000" y="425" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">3/4</text>
  <text x="1000" y="442" fill="#a3a3a3" font-family="sans-serif" font-size="10">1 remaining</text>

  <rect x="800" y="460" width="165" height="80" rx="8" fill="#0A0A0A"/>
