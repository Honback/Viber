  <circle cx="380" cy="465" r="6" fill="#10B981"/>
  <circle cx="405" cy="465" r="6" fill="#d76542" stroke="#d76542" stroke-width="2"/>
  <circle cx="430" cy="465" r="6" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Right panel - Noise meter -->
  <rect x="780" y="70" width="380" height="240" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
