  <text x="340" y="512" fill="#a3a3a3" font-family="sans-serif" font-size="12" text-anchor="middle">Reset</text>
  <rect x="390" y="490" width="80" height="36" rx="8" fill="#d76542"/>
  <text x="430" y="512" fill="white" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle">Pause</text>
  <rect x="480" y="490" width="80" height="36" rx="8" fill="#2a2a2a" stroke="#333" stroke-width="1"/>
  <text x="520" y="512" fill="#a3a3a3" font-family="sans-serif" font-size="12" text-anchor="middle">Skip</text>

