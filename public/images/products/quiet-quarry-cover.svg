  <text x="820" y="515" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">38 dB</text>
  <text x="820" y="532" fill="#10B981" font-family="sans-serif" font-size="10">Quiet environment</text>

  <rect x="980" y="460" width="165" height="80" rx="8" fill="#0A0A0A"/>
  <text x="1000" y="485" fill="#a3a3a3" font-family="sans-serif" font-size="10">Distractions</text>
  <text x="1000" y="515" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">2</text>
