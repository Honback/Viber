<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#111111"/>
  <rect x="0" y="56" width="1200" height="1" fill="#333"/>
  <text x="30" y="35" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">PaletteAI</text>
  <rect x="300" y="12" width="400" height="32" rx="8" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="320" y="33" font-family="sans-serif" font-size="14" fill="#e0e0e0">ocean</text>

  <!-- 5 color swatches with expanded info -->
  <!-- Color 1 -->
  <rect x="40" y="80" width="216" height="120" rx="12" fill="#1B4965"/>
  <rect x="40" y="210" width="216" height="160" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="240" font-family="monospace" font-size="16" fill="white" font-weight="bold">#1B4965</text>
  <text x="60" y="265" font-family="monospace" font-size="11" fill="#a3a3a3">RGB: 27, 73, 101</text>
  <text x="60" y="285" font-family="monospace" font-size="11" fill="#a3a3a3">HSL: 203, 58%, 25%</text>
  <!-- Copy button -->
  <rect x="200" y="225" width="40" height="28" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="220" y="244" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Copy</text>
  <!-- Contrast indicator -->
  <text x="60" y="320" font-family="sans-serif" font-size="10" fill="#555">Contrast with #5FA8D3</text>
  <rect x="60" y="330" width="60" height="18" rx="4" fill="#22c55e" fill-opacity="0.15"/>
  <text x="90" y="343" font-family="sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">4.5:1 AA</text>

  <!-- Color 2 -->
  <rect x="276" y="80" width="216" height="120" rx="12" fill="#5FA8D3"/>
  <rect x="276" y="210" width="216" height="160" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="296" y="240" font-family="monospace" font-size="16" fill="white" font-weight="bold">#5FA8D3</text>
  <text x="296" y="265" font-family="monospace" font-size="11" fill="#a3a3a3">RGB: 95, 168, 211</text>
  <text x="296" y="285" font-family="monospace" font-size="11" fill="#a3a3a3">HSL: 202, 55%, 60%</text>
  <rect x="436" y="225" width="40" height="28" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="456" y="244" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Copy</text>
  <text x="296" y="320" font-family="sans-serif" font-size="10" fill="#555">Contrast with #62B6CB</text>
  <rect x="296" y="330" width="60" height="18" rx="4" fill="#eab308" fill-opacity="0.15"/>
  <text x="326" y="343" font-family="sans-serif" font-size="10" fill="#eab308" text-anchor="middle">1.2:1</text>

  <!-- Color 3 - LOCKED -->
  <rect x="512" y="80" width="216" height="120" rx="12" fill="#62B6CB"/>
  <rect x="512" y="210" width="216" height="160" rx="12" fill="#1a1a1a" stroke="#d76542" stroke-width="2"/>
  <text x="532" y="240" font-family="monospace" font-size="16" fill="white" font-weight="bold">#62B6CB</text>
  <text x="532" y="265" font-family="monospace" font-size="11" fill="#a3a3a3">RGB: 98, 182, 203</text>
  <text x="532" y="285" font-family="monospace" font-size="11" fill="#a3a3a3">HSL: 192, 48%, 59%</text>
  <rect x="672" y="225" width="40" height="28" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="692" y="244" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Copy</text>
  <!-- Lock icon indicator -->
  <rect x="532" y="330" width="55" height="22" rx="4" fill="#d76542" fill-opacity="0.15"/>
  <text x="560" y="345" font-family="sans-serif" font-size="10" fill="#d76542" text-anchor="middle">Locked</text>

  <!-- Color 4 -->
  <rect x="748" y="80" width="216" height="120" rx="12" fill="#BEE9E8"/>
  <rect x="748" y="210" width="216" height="160" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="768" y="240" font-family="monospace" font-size="16" fill="white" font-weight="bold">#BEE9E8</text>
  <text x="768" y="265" font-family="monospace" font-size="11" fill="#a3a3a3">RGB: 190, 233, 232</text>
  <text x="768" y="285" font-family="monospace" font-size="11" fill="#a3a3a3">HSL: 179, 46%, 83%</text>
  <rect x="908" y="225" width="40" height="28" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="928" y="244" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Copy</text>
  <text x="768" y="320" font-family="sans-serif" font-size="10" fill="#555">Contrast with #CAE9FF</text>
  <rect x="768" y="330" width="60" height="18" rx="4" fill="#eab308" fill-opacity="0.15"/>
  <text x="798" y="343" font-family="sans-serif" font-size="10" fill="#eab308" text-anchor="middle">1.1:1</text>

  <!-- Color 5 -->
  <rect x="984" y="80" width="216" height="120" rx="12" fill="#CAE9FF"/>
  <rect x="984" y="210" width="216" height="160" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="1004" y="240" font-family="monospace" font-size="16" fill="white" font-weight="bold">#CAE9FF</text>
  <text x="1004" y="265" font-family="monospace" font-size="11" fill="#a3a3a3">RGB: 202, 233, 255</text>
  <text x="1004" y="285" font-family="monospace" font-size="11" fill="#a3a3a3">HSL: 205, 100%, 90%</text>
  <rect x="1144" y="225" width="40" height="28" rx="6" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="1164" y="244" font-family="sans-serif" font-size="11" fill="#a3a3a3" text-anchor="middle">Copy</text>

  <!-- Palette overview at bottom -->
  <rect x="40" y="420" width="1160" height="350" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="70" y="455" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">Palette Preview</text>

  <!-- Preview cards using the palette -->
  <rect x="70" y="475" width="260" height="140" rx="8" fill="#1B4965"/>
  <text x="90" y="510" font-family="sans-serif" font-size="14" fill="#CAE9FF" font-weight="bold">Header Text</text>
  <text x="90" y="535" font-family="sans-serif" font-size="12" fill="#BEE9E8">Body text example</text>
  <rect x="90" y="560" width="80" height="30" rx="6" fill="#5FA8D3"/>
  <text x="130" y="580" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">Button</text>

  <rect x="350" y="475" width="260" height="140" rx="8" fill="#5FA8D3"/>
  <text x="370" y="510" font-family="sans-serif" font-size="14" fill="#1B4965" font-weight="bold">Card Title</text>
  <text x="370" y="535" font-family="sans-serif" font-size="12" fill="#1B4965">Description text</text>
  <rect x="370" y="560" width="80" height="30" rx="6" fill="#1B4965"/>
  <text x="410" y="580" font-family="sans-serif" font-size="11" fill="#CAE9FF" text-anchor="middle">Action</text>

  <!-- Accessibility score -->
  <rect x="700" y="475" width="480" height="140" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="730" y="505" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Accessibility Score</text>
  <text x="730" y="535" font-family="sans-serif" font-size="12" fill="#a3a3a3">3 of 10 pairs pass WCAG AA</text>
  <text x="730" y="560" font-family="sans-serif" font-size="12" fill="#a3a3a3">2 of 10 pairs pass WCAG AAA</text>
  <rect x="730" y="575" width="200" height="6" rx="3" fill="#1f1f1f"/>
  <rect x="730" y="575" width="60" height="6" rx="3" fill="#d76542"/>
</svg>