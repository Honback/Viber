<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top toolbar -->
  <rect x="0" y="0" width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <!-- Toolbar buttons -->
  <rect x="16" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="30" y="30" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">B</text>
  <rect x="52" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="66" y="30" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-style="italic">I</text>
  <rect x="88" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="102" y="30" font-family="monospace" font-size="13" fill="white" text-anchor="middle">H</text>
  <rect x="124" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="138" y="28" font-family="monospace" font-size="10" fill="#a3a3a3" text-anchor="middle">Link</text>
  <rect x="160" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="174" y="30" font-family="monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">&lt;/&gt;</text>
  <rect x="196" y="10" width="28" height="28" rx="4" fill="#1f1f1f" stroke="#444" stroke-width="1"/>
  <text x="210" y="30" font-family="monospace" font-size="15" fill="#a3a3a3" text-anchor="middle">&#x2261;</text>
  <text x="1100" y="30" font-family="sans-serif" font-size="12" fill="#555" text-anchor="end">MarkdownPro</text>

  <!-- Divider -->
  <rect x="599" y="48" width="2" height="722" fill="#333"/>

  <!-- Left pane: Editor -->
  <rect x="0" y="49" width="599" height="721" fill="#0A0A0A"/>
  <!-- Line numbers gutter -->
  <rect x="0" y="49" width="40" height="721" fill="#111111"/>
  <text x="30" y="80" font-family="monospace" font-size="12" fill="#444" text-anchor="end">1</text>
  <text x="30" y="100" font-family="monospace" font-size="12" fill="#444" text-anchor="end">2</text>
  <text x="30" y="120" font-family="monospace" font-size="12" fill="#444" text-anchor="end">3</text>
  <text x="30" y="140" font-family="monospace" font-size="12" fill="#444" text-anchor="end">4</text>
  <text x="30" y="160" font-family="monospace" font-size="12" fill="#444" text-anchor="end">5</text>
  <text x="30" y="180" font-family="monospace" font-size="12" fill="#444" text-anchor="end">6</text>
  <text x="30" y="200" font-family="monospace" font-size="12" fill="#444" text-anchor="end">7</text>
  <text x="30" y="220" font-family="monospace" font-size="12" fill="#444" text-anchor="end">8</text>
  <text x="30" y="240" font-family="monospace" font-size="12" fill="#444" text-anchor="end">9</text>
  <text x="30" y="260" font-family="monospace" font-size="12" fill="#444" text-anchor="end">10</text>
  <text x="30" y="280" font-family="monospace" font-size="12" fill="#444" text-anchor="end">11</text>
  <text x="30" y="300" font-family="monospace" font-size="12" fill="#444" text-anchor="end">12</text>
  <text x="30" y="320" font-family="monospace" font-size="12" fill="#444" text-anchor="end">13</text>
  <text x="30" y="340" font-family="monospace" font-size="12" fill="#444" text-anchor="end">14</text>
  <text x="30" y="360" font-family="monospace" font-size="12" fill="#444" text-anchor="end">15</text>
  <text x="30" y="380" font-family="monospace" font-size="12" fill="#444" text-anchor="end">16</text>
  <text x="30" y="400" font-family="monospace" font-size="12" fill="#444" text-anchor="end">17</text>

  <!-- Markdown source -->
  <text x="50" y="80" font-family="monospace" font-size="13" fill="#d76542"># Getting Started</text>
  <text x="50" y="120" font-family="monospace" font-size="13" fill="#e0e0e0">Welcome to **MarkdownPro**, a modern</text>
  <text x="50" y="140" font-family="monospace" font-size="13" fill="#e0e0e0">editor with **live preview**.</text>
  <text x="50" y="180" font-family="monospace" font-size="13" fill="#d76542">## Features</text>
  <text x="50" y="220" font-family="monospace" font-size="13" fill="#e0e0e0">- Syntax highlighting</text>
  <text x="50" y="240" font-family="monospace" font-size="13" fill="#e0e0e0">- Split pane editing</text>
  <text x="50" y="260" font-family="monospace" font-size="13" fill="#e0e0e0">- Export to HTML &amp; PDF</text>
  <text x="50" y="280" font-family="monospace" font-size="13" fill="#e0e0e0">- Custom themes</text>
  <text x="50" y="320" font-family="monospace" font-size="13" fill="#d76542">## Code Example</text>
  <text x="50" y="360" font-family="monospace" font-size="13" fill="#888">```javascript</text>
  <text x="50" y="380" font-family="monospace" font-size="13" fill="#7ec8e3">const editor = new MarkdownPro();</text>
  <text x="50" y="400" font-family="monospace" font-size="13" fill="#888">```</text>

  <!-- Right pane: Preview -->
  <rect x="601" y="49" width="599" height="721" fill="#111111"/>
  <text x="630" y="88" font-family="sans-serif" font-size="28" fill="white" font-weight="bold">Getting Started</text>
  <rect x="630" y="98" width="120" height="3" fill="#d76542" rx="1"/>
  <text x="630" y="132" font-family="sans-serif" font-size="15" fill="#c0c0c0">Welcome to </text>
  <text x="726" y="132" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">MarkdownPro</text>
  <text x="842" y="132" font-family="sans-serif" font-size="15" fill="#c0c0c0">, a modern</text>
  <text x="630" y="152" font-family="sans-serif" font-size="15" fill="#c0c0c0">editor with </text>
  <text x="726" y="152" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">live preview</text>
  <text x="822" y="152" font-family="sans-serif" font-size="15" fill="#c0c0c0">.</text>

  <text x="630" y="200" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">Features</text>
  <rect x="630" y="208" width="80" height="2" fill="#d76542" rx="1"/>

  <circle cx="645" cy="235" r="3" fill="#d76542"/>
  <text x="658" y="240" font-family="sans-serif" font-size="15" fill="#c0c0c0">Syntax highlighting</text>
  <circle cx="645" cy="260" r="3" fill="#d76542"/>
  <text x="658" y="265" font-family="sans-serif" font-size="15" fill="#c0c0c0">Split pane editing</text>
  <circle cx="645" cy="285" r="3" fill="#d76542"/>
  <text x="658" y="290" font-family="sans-serif" font-size="15" fill="#c0c0c0">Export to HTML &amp; PDF</text>
  <circle cx="645" cy="310" r="3" fill="#d76542"/>
  <text x="658" y="315" font-family="sans-serif" font-size="15" fill="#c0c0c0">Custom themes</text>

  <text x="630" y="362" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">Code Example</text>
  <rect x="630" y="370" width="100" height="2" fill="#d76542" rx="1"/>

  <rect x="630" y="387" width="530" height="40" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="650" y="412" font-family="monospace" font-size="13" fill="#7ec8e3">const editor = new MarkdownPro();</text>

  <!-- Bottom status bar -->
  <rect x="0" y="770" width="1200" height="30" fill="#111111"/>
  <rect x="0" y="770" width="1200" height="1" fill="#333"/>
  <text x="16" y="790" font-family="monospace" font-size="12" fill="#666">Words: 156</text>
  <text x="130" y="790" font-family="monospace" font-size="12" fill="#666">Chars: 892</text>
  <text x="250" y="790" font-family="monospace" font-size="12" fill="#666">Lines: 24</text>
  <text x="1180" y="790" font-family="monospace" font-size="12" fill="#444" text-anchor="end">Markdown</text>
</svg>