<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <circle cx="20" cy="24" r="6" fill="#d76542"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">Lesson Loop</text>
  <text x="180" y="30" fill="#a3a3a3" font-family="sans-serif" font-size="12">/ Feedback Board</text>

  <!-- Student view - feedback form -->
  <rect x="40" y="70" width="560" height="700" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="100" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Exit Ticket</text>
  <text x="570" y="100" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">Period 3 - Science</text>

  <!-- Understanding check -->
  <text x="60" y="135" fill="white" font-family="sans-serif" font-size="13" font-weight="500">How well did you understand today's lesson?</text>
  <rect x="60" y="150" width="90" height="36" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="105" y="172" fill="#a3a3a3" font-family="sans-serif" font-size="20" text-anchor="middle">1</text>
  <rect x="158" y="150" width="90" height="36" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="203" y="172" fill="#a3a3a3" font-family="sans-serif" font-size="20" text-anchor="middle">2</text>
  <rect x="256" y="150" width="90" height="36" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="301" y="172" fill="#a3a3a3" font-family="sans-serif" font-size="20" text-anchor="middle">3</text>
  <rect x="354" y="150" width="90" height="36" rx="6" fill="#d76542" opacity="0.3" stroke="#d76542" stroke-width="1.5"/>
  <text x="399" y="172" fill="#d76542" font-family="sans-serif" font-size="20" text-anchor="middle">4</text>
  <rect x="452" y="150" width="90" height="36" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="497" y="172" fill="#a3a3a3" font-family="sans-serif" font-size="20" text-anchor="middle">5</text>
  <text x="60" y="205" fill="#555" font-family="sans-serif" font-size="10">Not at all</text>
  <text x="497" y="205" fill="#555" font-family="sans-serif" font-size="10" text-anchor="end">Perfectly</text>

  <!-- What did you learn -->
  <text x="60" y="240" fill="white" font-family="sans-serif" font-size="13" font-weight="500">What was the most important thing you learned?</text>
  <rect x="60" y="255" width="520" height="80" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="75" y="280" fill="white" font-family="sans-serif" font-size="11">I learned that chemical equations need to have</text>
  <text x="75" y="298" fill="white" font-family="sans-serif" font-size="11">the same number of atoms on both sides. The</text>
  <text x="75" y="316" fill="white" font-family="sans-serif" font-size="11">coefficients help balance without changing the|</text>

  <!-- Confused about -->
  <text x="60" y="360" fill="white" font-family="sans-serif" font-size="13" font-weight="500">What are you still confused about?</text>
  <rect x="60" y="375" width="520" height="60" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="75" y="400" fill="white" font-family="sans-serif" font-size="11">I'm not sure when to use coefficients vs</text>
  <text x="75" y="418" fill="white" font-family="sans-serif" font-size="11">subscripts. What's the difference?</text>

  <!-- Pace -->
  <text x="60" y="460" fill="white" font-family="sans-serif" font-size="13" font-weight="500">How was the pace of today's lesson?</text>
  <rect x="60" y="475" width="130" height="30" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="125" y="494" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Too slow</text>
  <rect x="200" y="475" width="130" height="30" rx="6" fill="#d76542" opacity="0.2" stroke="#d76542" stroke-width="1"/>
  <text x="265" y="494" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="middle">Just right</text>
  <rect x="340" y="475" width="130" height="30" rx="6" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="405" y="494" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Too fast</text>

  <!-- Submit -->
  <rect x="60" y="530" width="520" height="40" rx="8" fill="#d76542"/>
  <text x="320" y="555" fill="white" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle">Submit Feedback</text>
  <text x="320" y="590" fill="#555" font-family="sans-serif" font-size="10" text-anchor="middle">Anonymous - your teacher won't see your name</text>

  <!-- Previous feedback summary -->
  <rect x="60" y="615" width="520" height="140" rx="8" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  <text x="80" y="640" fill="white" font-family="sans-serif" font-size="12" font-weight="500">Your Feedback History</text>
  <text x="80" y="665" fill="#a3a3a3" font-family="sans-serif" font-size="11">Apr 7: Understanding 5/5 - "Great hands-on activity!"</text>
  <text x="80" y="685" fill="#a3a3a3" font-family="sans-serif" font-size="11">Apr 4: Understanding 3/5 - "Went too fast on graphing"</text>
  <text x="80" y="705" fill="#a3a3a3" font-family="sans-serif" font-size="11">Apr 3: Understanding 4/5 - "Liked the group work"</text>
  <text x="80" y="730" fill="#555" font-family="sans-serif" font-size="10">Your avg understanding: 4.0/5</text>

  <!-- Right - Teacher's aggregated view -->
  <rect x="620" y="70" width="540" height="350" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="640" y="100" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Feedback Summary (Teacher View)</text>
  <text x="1130" y="100" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="end">24/32 submitted</text>

  <!-- Understanding distribution -->
  <text x="640" y="135" fill="#a3a3a3" font-family="sans-serif" font-size="12">Understanding Distribution</text>
  <rect x="640" y="145" width="40" height="24" rx="4" fill="#0A0A0A"/>
  <text x="660" y="161" fill="#EF4444" font-family="sans-serif" font-size="10" text-anchor="middle">1</text>
  <rect x="688" y="155" width="10" height="14" rx="2" fill="#EF4444" opacity="0.5"/>
  <text x="710" y="165" fill="#555" font-family="sans-serif" font-size="9">1</text>

  <rect x="730" y="145" width="40" height="24" rx="4" fill="#0A0A0A"/>
  <text x="750" y="161" fill="#F59E0B" font-family="sans-serif" font-size="10" text-anchor="middle">2</text>
  <rect x="778" y="148" width="20" height="21" rx="2" fill="#F59E0B" opacity="0.5"/>
  <text x="806" y="165" fill="#555" font-family="sans-serif" font-size="9">3</text>

  <rect x="820" y="145" width="40" height="24" rx="4" fill="#0A0A0A"/>
  <text x="840" y="161" fill="#a3a3a3" font-family="sans-serif" font-size="10" text-anchor="middle">3</text>
  <rect x="868" y="140" width="35" height="29" rx="2" fill="#a3a3a3" opacity="0.3"/>
  <text x="910" y="165" fill="#555" font-family="sans-serif" font-size="9">5</text>

  <rect x="920" y="145" width="40" height="24" rx="4" fill="#d76542" opacity="0.3" stroke="#d76542" stroke-width="1"/>
  <text x="940" y="161" fill="#d76542" font-family="sans-serif" font-size="10" text-anchor="middle">4</text>
  <rect x="968" y="130" width="50" height="39" rx="2" fill="#d76542" opacity="0.4"/>
  <text x="1025" y="165" fill="#555" font-family="sans-serif" font-size="9">9</text>

  <rect x="1040" y="145" width="40" height="24" rx="4" fill="#0A0A0A"/>
  <text x="1060" y="161" fill="#10B981" font-family="sans-serif" font-size="10" text-anchor="middle">5</text>
  <rect x="1088" y="135" width="42" height="34" rx="2" fill="#10B981" opacity="0.4"/>
  <text x="1138" y="165" fill="#555" font-family="sans-serif" font-size="9">6</text>

  <text x="640" y="195" fill="white" font-family="sans-serif" font-size="12">Average: <tspan fill="#d76542" font-weight="bold">3.8 / 5</tspan></text>

  <!-- Pace results -->
  <text x="640" y="225" fill="#a3a3a3" font-family="sans-serif" font-size="12">Pace Feedback</text>
  <rect x="640" y="235" width="140" height="8" rx="4" fill="#3B82F6" opacity="0.4"/>
  <text x="640" y="260" fill="#555" font-family="sans-serif" font-size="10">Too slow: 3</text>
  <rect x="790" y="235" width="220" height="8" rx="4" fill="#10B981" opacity="0.4"/>
  <text x="790" y="260" fill="#555" font-family="sans-serif" font-size="10">Just right: 16</text>
  <rect x="1020" y="235" width="110" height="8" rx="4" fill="#F59E0B" opacity="0.4"/>
  <text x="1020" y="260" fill="#555" font-family="sans-serif" font-size="10">Too fast: 5</text>

  <!-- Common confusion points -->
  <text x="640" y="295" fill="white" font-family="sans-serif" font-size="12" font-weight="500">Common Confusion Points (AI Clustered)</text>
  <rect x="640" y="305" width="500" height="30" rx="4" fill="#0A0A0A"/>
  <text x="655" y="324" fill="#d76542" font-family="sans-serif" font-size="11">1. Coefficients vs subscripts (8 mentions)</text>
  <rect x="640" y="340" width="500" height="30" rx="4" fill="#0A0A0A"/>
  <text x="655" y="359" fill="#F59E0B" font-family="sans-serif" font-size="11">2. When to know equation is balanced (5 mentions)</text>
  <rect x="640" y="375" width="500" height="30" rx="4" fill="#0A0A0A"/>
  <text x="655" y="394" fill="#a3a3a3" font-family="sans-serif" font-size="11">3. Real-world applications (3 mentions)</text>

  <!-- Word cloud -->
  <rect x="620" y="430" width="540" height="340" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="640" y="460" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Key Themes from Responses</text>
  <!-- Word cloud simulation -->
  <text x="700" y="520" fill="#d76542" font-family="sans-serif" font-size="28" font-weight="bold">balancing</text>
  <text x="920" y="510" fill="white" font-family="sans-serif" font-size="20">equations</text>
  <text x="660" y="560" fill="#a3a3a3" font-family="sans-serif" font-size="16">coefficients</text>
  <text x="870" y="555" fill="#d76542" font-family="sans-serif" font-size="22" font-weight="500">atoms</text>
  <text x="1000" y="540" fill="#555" font-family="sans-serif" font-size="14">subscripts</text>
  <text x="720" y="595" fill="white" font-family="sans-serif" font-size="18">practice</text>
  <text x="880" y="590" fill="#a3a3a3" font-family="sans-serif" font-size="13">helpful</text>
  <text x="980" y="585" fill="#555" font-family="sans-serif" font-size="11">confusing</text>
  <text x="660" y="625" fill="#a3a3a3" font-family="sans-serif" font-size="15">reactions</text>
  <text x="810" y="630" fill="#555" font-family="sans-serif" font-size="12">products</text>
  <text x="920" y="620" fill="white" font-family="sans-serif" font-size="16">chemistry</text>
  <text x="1070" y="615" fill="#a3a3a3" font-family="sans-serif" font-size="11">elements</text>
  <text x="690" y="660" fill="#555" font-family="sans-serif" font-size="14">worksheet</text>
  <text x="850" y="665" fill="#a3a3a3" font-family="sans-serif" font-size="10">partners</text>
  <text x="940" y="655" fill="#d76542" font-family="sans-serif" font-size="17">understand</text>
  <text x="700" y="695" fill="#a3a3a3" font-family="sans-serif" font-size="12">activity</text>
  <text x="830" y="700" fill="#555" font-family="sans-serif" font-size="11">examples</text>
  <text x="950" y="690" fill="#a3a3a3" font-family="sans-serif" font-size="13">review</text>
</svg>