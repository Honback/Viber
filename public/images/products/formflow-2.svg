<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <!-- Top bar -->
  <rect width="1200" height="48" fill="#111111"/>
  <rect x="0" y="48" width="1200" height="1" fill="#333"/>
  <text x="40" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">FormFlow</text>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <!-- Preview toggle - Preview active -->
  <rect x="1040" y="10" width="140" height="28" rx="14" fill="#252525"/>
  <rect x="1110" y="10" width="70" height="28" rx="14" fill="#d76542"/>
  <text x="1075" y="29" fill="#a3a3a3" font-family="sans-serif" font-size="11" text-anchor="middle">Edit</text>
  <text x="1145" y="29" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle">Preview</text>
  <!-- Preview badge -->
  <rect x="540" y="10" width="120" height="28" rx="14" fill="#10B981" opacity="0.15"/>
  <circle cx="560" cy="24" r="4" fill="#10B981"/>
  <text x="575" y="28" fill="#10B981" font-family="sans-serif" font-size="11">Preview Mode</text>
  <!-- Clean form preview - centered -->
  <rect x="250" y="80" width="700" height="660" rx="16" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Form header -->
  <text x="600" y="130" fill="white" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Contact Us</text>
  <text x="600" y="155" fill="#666" font-family="sans-serif" font-size="13" text-anchor="middle">We'd love to hear from you. Fill out the form below.</text>
  <rect x="300" y="175" width="600" height="1" fill="#333"/>
  <!-- Name field - filled -->
  <text x="320" y="215" fill="#a3a3a3" font-family="sans-serif" font-size="14">Name</text>
  <text x="880" y="215" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">*</text>
  <rect x="320" y="225" width="560" height="48" rx="8" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="340" y="255" fill="white" font-family="sans-serif" font-size="14">Kim Minjun</text>
  <!-- Check icon -->
  <circle cx="855" cy="249" r="10" fill="#10B981" opacity="0.2"/>
  <path d="M850 249 L854 253 L861 246" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <!-- Email field - filled -->
  <text x="320" y="305" fill="#a3a3a3" font-family="sans-serif" font-size="14">Email</text>
  <text x="880" y="305" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">*</text>
  <rect x="320" y="315" width="560" height="48" rx="8" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="340" y="345" fill="white" font-family="sans-serif" font-size="14">minjun@example.com</text>
  <circle cx="855" cy="339" r="10" fill="#10B981" opacity="0.2"/>
  <path d="M850 339 L854 343 L861 336" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <!-- Phone field - filled -->
  <text x="320" y="395" fill="#a3a3a3" font-family="sans-serif" font-size="14">Phone</text>
  <rect x="320" y="405" width="560" height="48" rx="8" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="340" y="435" fill="white" font-family="sans-serif" font-size="14">010-1234-5678</text>
  <!-- Message textarea - filled -->
  <text x="320" y="485" fill="#a3a3a3" font-family="sans-serif" font-size="14">Message</text>
  <text x="880" y="485" fill="#d76542" font-family="sans-serif" font-size="11" text-anchor="end">*</text>
  <rect x="320" y="495" width="560" height="120" rx="8" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="340" y="525" fill="white" font-family="sans-serif" font-size="14">안녕하세요, 제품에 대해 문의드립니다.</text>
  <text x="340" y="548" fill="white" font-family="sans-serif" font-size="14">Enterprise 플랜의 가격과 기능에 대해</text>
  <text x="340" y="571" fill="white" font-family="sans-serif" font-size="14">자세히 알고 싶습니다.</text>
  <!-- Character count -->
  <text x="855" y="605" fill="#666" font-family="sans-serif" font-size="10" text-anchor="end">78 / 500</text>
  <!-- Terms checkbox -->
  <rect x="320" y="635" width="18" height="18" rx="4" fill="#d76542"/>
  <path d="M325 644 L329 648 L335 640" stroke="white" stroke-width="2" fill="none"/>
  <text x="345" y="650" fill="#a3a3a3" font-family="sans-serif" font-size="13">I agree to the Terms of Service and Privacy Policy</text>
  <!-- Submit button -->
  <rect x="320" y="675" width="560" height="50" rx="10" fill="#d76542"/>
  <text x="600" y="706" fill="white" font-family="sans-serif" font-size="17" font-weight="bold" text-anchor="middle">Submit</text>
</svg>