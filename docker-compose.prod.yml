services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeollio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibe_showcase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - vibeollio_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_showcase"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build: .
    container_name: vibeollio-db-init
    command: >
      sh -c "
        cd /app &&
        node_modules/.bin/tsx scripts/migrate.ts &&
        node_modules/.bin/tsx scripts/seed.ts
      "
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/vibe_showcase
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - init

  app:
    build: .
    container_name: vibeollio-app
    restart: unless-stopped
    ports:
      - "5434:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vibeollio_postgres:
