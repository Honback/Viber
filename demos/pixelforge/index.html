<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #06b6d4;
      --blue: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(6,182,212,.35);
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header span.sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: 4px;
      -webkit-text-fill-color: var(--text-muted);
    }

    /* ── Main layout ── */
    .workspace {
      width: 100%;
      max-width: 780px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── Canvas panel ── */
    .canvas-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #canvas-wrapper {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      position: relative;
    }
    #pixelCanvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: crosshair;
      image-rendering: pixelated;
      /* size set by JS */
    }
    .grid-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 200px;
      flex: 1;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Color palette ── */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .12s, border-color .12s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active {
      border-color: white;
      box-shadow: 0 0 0 2px var(--cyan);
      transform: scale(1.12);
    }

    /* ── Current color display ── */
    .color-display {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .color-preview {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .color-info {
      flex: 1;
    }
    .color-info label { font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 2px; }
    .color-info input[type="color"] {
      width: 100%;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      cursor: pointer;
      padding: 2px;
    }

    /* ── Tools ── */
    .tools-row {
      display: flex;
      gap: 8px;
    }
    .tool-btn {
      flex: 1;
      padding: 9px 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .tool-btn .icon { font-size: 1.2rem; line-height: 1; }
    .tool-btn:hover { background: var(--border); }
    .tool-btn.active {
      background: linear-gradient(135deg, rgba(6,182,212,.25), rgba(37,99,235,.25));
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(6,182,212,.2);
    }

    /* ── Action buttons ── */
    .action-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: 0.3px;
    }
    .action-btn:active { transform: scale(.97); }
    .btn-clear {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }
    .btn-export {
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      color: white;
      margin-top: 6px;
    }
    .action-btn:hover { opacity: 0.88; }

    /* ── Grid toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
    }
    .toggle {
      position: relative;
      width: 38px; height: 21px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 21px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: var(--cyan); }
    .toggle input:checked + .slider::before { transform: translateX(17px); }

    /* ── Status bar ── */
    .status-bar {
      width: 100%;
      max-width: 780px;
      margin-top: 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.74rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }
    #status-text { flex: 1; }

    @media (max-width: 560px) {
      .workspace { flex-direction: column; align-items: center; }
      .sidebar { width: 100%; max-width: 360px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎨</div>
  <div>
    <h1>PixelForge <span class="sub">픽셀 아트 에디터</span></h1>
  </div>
</header>

<div class="workspace">

  <!-- Canvas -->
  <div class="canvas-panel">
    <div id="canvas-wrapper">
      <canvas id="pixelCanvas"></canvas>
    </div>
    <div class="grid-label">16 × 16 픽셀 캔버스</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Tools -->
    <div class="panel">
      <div class="panel-title">도구</div>
      <div class="tools-row">
        <button class="tool-btn active" id="btn-draw" onclick="setTool('draw')">
          <span class="icon">✏️</span>
          <span>그리기</span>
        </button>
        <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">
          <span class="icon">🧹</span>
          <span>지우개</span>
        </button>
        <button class="tool-btn" id="btn-fill" onclick="setTool('fill')">
          <span class="icon">🪣</span>
          <span>채우기</span>
        </button>
      </div>
    </div>

    <!-- Palette -->
    <div class="panel">
      <div class="panel-title">색상 팔레트</div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="color-display">
        <div class="color-preview" id="colorPreview"></div>
        <div class="color-info">
          <label>직접 선택</label>
          <input type="color" id="customColor" value="#06b6d4" oninput="pickCustomColor(this.value)" />
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="panel">
      <div class="panel-title">옵션</div>
      <div class="toggle-row" style="margin-bottom: 12px;">
        <span>격자 표시</span>
        <label class="toggle">
          <input type="checkbox" id="gridToggle" checked onchange="toggleGrid()" />
          <span class="slider"></span>
        </label>
      </div>
      <button class="action-btn btn-clear" onclick="clearCanvas()">🗑️ 전체 지우기</button>
      <button class="action-btn btn-export" onclick="exportPNG()">⬇️ PNG 저장</button>
    </div>

  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">준비 완료 — 클릭하거나 드래그해서 그려보세요!</span>
  <span id="coord-display">—</span>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const GRID = 16;
const CELL = 28; // px per pixel cell
const COLORS = [
  '#1a1a2e','#16213e','#0f3460','#e94560',
  '#f5a623','#f7dc6f','#a8e063','#56ab2f',
  '#06b6d4','#2563eb','#7c3aed','#ec4899',
  '#ffffff','#d1d5db','#6b7280','#374151',
];

// ── State ────────────────────────────────────────────────────────────────────
let pixels = Array.from({ length: GRID }, () => Array(GRID).fill(null));
let currentColor = COLORS[9];  // default blue
let currentTool  = 'draw';
let isPainting   = false;
let showGrid     = true;

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('pixelCanvas');
const ctx    = canvas.getContext('2d');

canvas.width  = GRID * CELL;
canvas.height = GRID * CELL;
canvas.style.width  = canvas.width  + 'px';
canvas.style.height = canvas.height + 'px';

// ── Palette ──────────────────────────────────────────────────────────────────
function buildPalette() {
  const grid = document.getElementById('paletteGrid');
  grid.innerHTML = '';
  COLORS.forEach((c, i) => {
    const sw = document.createElement('button');
    sw.className = 'color-swatch' + (c === currentColor ? ' active' : '');
    sw.style.background = c;
    sw.title = c;
    sw.addEventListener('click', () => selectColor(c));
    grid.appendChild(sw);
  });
}

function selectColor(c) {
  currentColor = c;
  document.getElementById('colorPreview').style.background = c;
  document.getElementById('customColor').value = c;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.style.background === hexToRgb(c) || s.title === c);
  });
  if (currentTool === 'eraser') setTool('draw');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function pickCustomColor(v) {
  currentColor = v;
  document.getElementById('colorPreview').style.background = v;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
}

// ── Tool selection ────────────────────────────────────────────────────────────
function setTool(t) {
  currentTool = t;
  ['draw','eraser','fill'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id === t);
  });
  canvas.style.cursor = t === 'fill' ? 'cell' : 'crosshair';
  setStatus(t === 'draw' ? '그리기 모드' : t === 'eraser' ? '지우개 모드' : '채우기 모드');
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top)  * scaleY;
  return {
    col: Math.floor(cx / CELL),
    row: Math.floor(cy / CELL),
  };
}

function paintCell(col, row) {
  if (col < 0 || col >= GRID || row < 0 || row >= GRID) return;
  if (currentTool === 'eraser') {
    pixels[row][col] = null;
  } else {
    pixels[row][col] = currentColor;
  }
  drawCell(col, row);
}

function drawCell(col, row) {
  const x = col * CELL, y = row * CELL;
  const color = pixels[row][col];
  ctx.clearRect(x, y, CELL, CELL);
  if (color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, CELL, CELL);
  } else {
    // checkerboard for transparent
    ctx.fillStyle = '#2d3748';
    ctx.fillRect(x, y, CELL, CELL);
    ctx.fillStyle = '#374151';
    if ((col + row) % 2 === 0) {
      ctx.fillRect(x, y, CELL/2, CELL/2);
      ctx.fillRect(x+CELL/2, y+CELL/2, CELL/2, CELL/2);
    }
  }
  if (showGrid) {
    ctx.strokeStyle = 'rgba(51,65,85,0.6)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 0.25, y + 0.25, CELL - 0.5, CELL - 0.5);
  }
}

function redraw() {
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      drawCell(c, r);
}

// ── Flood fill ────────────────────────────────────────────────────────────────
function floodFill(col, row) {
  const target = pixels[row][col];
  if (target === currentColor) return;
  const stack = [[col, row]];
  while (stack.length) {
    const [c, r] = stack.pop();
    if (c < 0 || c >= GRID || r < 0 || r >= GRID) continue;
    if (pixels[r][c] !== target) continue;
    pixels[r][c] = currentColor;
    stack.push([c+1,r],[c-1,r],[c,r+1],[c,r-1]);
  }
  redraw();
}

// ── Events ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isPainting = true;
  const { col, row } = cellAt(e);
  if (currentTool === 'fill') {
    floodFill(col, row);
    setStatus(`채우기 완료 (${col}, ${row})`);
  } else {
    paintCell(col, row);
    updateCoord(col, row);
  }
});

canvas.addEventListener('mousemove', e => {
  const { col, row } = cellAt(e);
  if (col >= 0 && col < GRID && row >= 0 && row < GRID) {
    document.getElementById('coord-display').textContent = `(${col+1}, ${row+1})`;
  }
  if (!isPainting || currentTool === 'fill') return;
  paintCell(col, row);
});

canvas.addEventListener('mouseup',    () => { isPainting = false; });
canvas.addEventListener('mouseleave', () => {
  isPainting = false;
  document.getElementById('coord-display').textContent = '—';
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  isPainting = true;
  const t = e.touches[0];
  const { col, row } = cellAt(t);
  if (currentTool === 'fill') floodFill(col, row);
  else paintCell(col, row);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isPainting) return;
  const t = e.touches[0];
  const { col, row } = cellAt(t);
  if (currentTool !== 'fill') paintCell(col, row);
}, { passive: false });

canvas.addEventListener('touchend', () => { isPainting = false; });

// ── Actions ───────────────────────────────────────────────────────────────────
function clearCanvas() {
  pixels = Array.from({ length: GRID }, () => Array(GRID).fill(null));
  redraw();
  setStatus('캔버스를 지웠습니다.');
}

function toggleGrid() {
  showGrid = document.getElementById('gridToggle').checked;
  redraw();
}

function exportPNG() {
  // render without grid lines for clean export
  const offCanvas = document.createElement('canvas');
  offCanvas.width  = GRID * CELL;
  offCanvas.height = GRID * CELL;
  const offCtx = offCanvas.getContext('2d');
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const color = pixels[r][c];
      if (color) {
        offCtx.fillStyle = color;
        offCtx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
    }
  }
  const a = document.createElement('a');
  a.download = 'pixelforge_art.png';
  a.href = offCanvas.toDataURL('image/png');
  a.click();
  setStatus('PNG 파일을 저장했습니다!');
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

function updateCoord(col, row) {
  document.getElementById('coord-display').textContent = `(${col+1}, ${row+1})`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildPalette();
selectColor(currentColor);
redraw();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (k === 'p' || k === 'b') setTool('draw');
  if (k === 'e')               setTool('eraser');
  if (k === 'f' || k === 'g')  setTool('fill');
  if (k === 'delete' || k === 'c') clearCanvas();
});
</script>
</body>
</html>
