<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkdownPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-from: #eab308;
      --accent-to: #d97706;
      --accent-mid: #f59e0b;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --surface3: #2e2e2e;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --text-dim: #555;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #000;
    }

    .logo span.accent {
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all .15s ease;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: #444; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: #000;
      font-weight: 600;
    }
    .btn-primary:hover { filter: brightness(1.1); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .tool-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      transition: all .12s ease;
      min-width: 32px;
    }
    .tool-btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .tool-btn:active {
      background: var(--surface3);
      color: var(--accent-mid);
    }
    .tool-btn.active {
      background: rgba(234,179,8,0.1);
      color: var(--accent-mid);
      border-color: rgba(234,179,8,0.25);
    }

    /* ── Main layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane + .pane {
      border-left: 1px solid var(--border);
    }

    .pane-label {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Editor ── */
    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 20px;
      overflow-y: auto;
      caret-color: var(--accent-mid);
    }

    #editor::selection { background: rgba(234,179,8,0.25); }

    #editor::-webkit-scrollbar { width: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* ── Preview ── */
    #preview {
      flex: 1;
      padding: 20px 28px;
      overflow-y: auto;
      background: var(--bg);
      line-height: 1.75;
    }

    #preview::-webkit-scrollbar { width: 6px; }
    #preview::-webkit-scrollbar-track { background: transparent; }
    #preview::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* preview typography */
    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      font-weight: 700;
      margin: 1.4em 0 0.5em;
      line-height: 1.3;
    }
    #preview h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 2px solid var(--border); }
    #preview h2 { font-size: 1.5em; padding-bottom: 0.2em; border-bottom: 1px solid var(--border); }
    #preview h3 { font-size: 1.2em; }
    #preview h4 { font-size: 1.05em; }

    #preview h1 { background: linear-gradient(90deg, var(--accent-from), var(--accent-to)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    #preview p { margin: 0.8em 0; }

    #preview a {
      color: var(--accent-mid);
      text-decoration: underline;
      text-decoration-color: rgba(234,179,8,0.4);
      transition: text-decoration-color .15s;
    }
    #preview a:hover { text-decoration-color: var(--accent-mid); }

    #preview strong { font-weight: 700; color: #fff; }
    #preview em { font-style: italic; color: #ddd; }

    #preview code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.87em;
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent-mid);
      border: 1px solid var(--border);
    }

    #preview pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 1.2em 0;
      position: relative;
    }
    #preview pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #e0e0e0;
    }
    #preview pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px;
      right: 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #preview ul, #preview ol {
      padding-left: 1.6em;
      margin: 0.8em 0;
    }
    #preview li { margin: 0.3em 0; }
    #preview li::marker { color: var(--accent-mid); }

    #preview blockquote {
      border-left: 3px solid var(--accent-mid);
      padding: 8px 16px;
      margin: 1em 0;
      background: rgba(234,179,8,0.05);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }

    #preview hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    #preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 14px;
    }
    #preview th {
      background: var(--surface2);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--accent-mid);
    }
    #preview td {
      padding: 8px 12px;
      border: 1px solid var(--border);
    }
    #preview tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    #preview img { max-width: 100%; border-radius: 8px; margin: 0.8em 0; }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 32px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .stats {
      display: flex;
      gap: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-label { color: var(--text-dim); }
    .stat-value { color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }

    .cursor-info { color: var(--text-dim); }

    /* ── Splitter ── */
    .splitter {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
      position: relative;
    }
    .splitter:hover, .splitter.dragging { background: var(--accent-mid); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all .2s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Scrollbar global ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">M</div>
      <span>Markdown<span class="accent">Pro</span></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-clear" title="새 문서">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        새 문서
      </button>
      <button class="btn btn-primary" id="btn-download">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        .md 다운로드
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-btn" data-action="bold" title="굵게 (Ctrl+B)">
      <strong>B</strong>
    </button>
    <button class="tool-btn" data-action="italic" title="기울임 (Ctrl+I)">
      <em>I</em>
    </button>
    <button class="tool-btn" data-action="strikethrough" title="취소선">

    <div class="toolbar-sep"></div>
    <button class="tool-btn" data-action="h1" title="제목 1">H1</button>
    <button class="tool-btn" data-action="h2" title="제목 2">H2</button>
    <button class="tool-btn" data-action="h3" title="제목 3">H3</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" data-action="link" title="링크 삽입">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      링크
    </button>
    <button class="tool-btn" data-action="code" title="인라인 코드">&lt;/&gt;</button>
    <button class="tool-btn" data-action="codeblock" title="코드 블록">

    <div class="toolbar-sep"></div>

      목록
    </button>
    <button class="tool-btn" data-action="ol" title="순서있는 목록">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
      번호목록
    </button>
    <button class="tool-btn" data-action="blockquote" title="인용">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
      인용
    </button>
    <button class="tool-btn" data-action="hr" title="구분선">─ 구분선</button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" data-action="table" title="표 삽입">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      표

  <!-- Main: editor + preview -->
  <div class="main">
    <div class="pane" id="editor-pane" style="flex: 1 1 50%;">
      <div class="pane-label">편집기</div>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>

    <div class="splitter" id="splitter"></div>

    <div class="pane" id="preview-pane" style="flex: 1 1 50%;">
      <div class="pane-label">미리보기</div>
      <div id="preview"></div>
    </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="stats">
      <div class="stat">
        <span class="stat-label">글자</span>

      </div>
      <div class="stat">
        <span class="stat-label">단어</span>
        <span class="stat-value" id="stat-words">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">줄</span>
        <span class="stat-value" id="stat-lines">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">단락</span>
        <span class="stat-value" id="stat-paras">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">읽기 시간</span>
        <span class="stat-value" id="stat-read">0분</span>
      </div>
    </div>
    <div class="cursor-info" id="cursor-info">줄 1, 열 1</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
// CUSTOM MARKDOWN PARSER
// ──────────────────────────────────────────────
function parseMarkdown(src) {
  if (!src) return '';

  let html = src;

  // Normalize line endings
  html = html.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  // Escape HTML entities in code blocks first (protect them)
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .trimEnd();
    const placeholder = `\x00CODEBLOCK${codeBlocks.length}\x00`;
    codeBlocks.push(`<pre data-lang="${lang || 'code'}"><code>${escaped}</code></pre>`);
    return placeholder;
  });

  // Inline code
  const inlineCodes = [];
  html = html.replace(/`([^`\n]+)`/g, (_, code) => {
    const escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const placeholder = `\x00INLINECODE${inlineCodes.length}\x00`;
    inlineCodes.push(`<code>${escaped}</code>`);
    return placeholder;
  });

  // Horizontal rule
  html = html.replace(/^(\-{3,}|\_{3,}|\*{3,})\s*$/gm, '<hr>');

  // Tables
  html = html.replace(/^(\|.+\|\n)(\|[\s\-:|]+\|\n)((?:\|.+\|\n?)*)/gm, (match, header, sep, body) => {
    const parseRow = (row) => row.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
    const headers = parseRow(header);
    const rows = body.trim().split('\n').filter(Boolean).map(parseRow);

    // Alignment from separator
    const aligns = parseRow(sep).map(cell => {
      if (/^:\-+:$/.test(cell.trim())) return 'center';
      if (/^\-+:$/.test(cell.trim())) return 'right';
      return 'left';
    });

    const ths = headers.map((h, i) => `<th style="text-align:${aligns[i]||'left'}">${inlineFormat(h)}</th>`).join('');
    const trs = rows.map(r =>
      '<tr>' + r.map((c, i) => `<td style="text-align:${aligns[i]||'left'}">${inlineFormat(c)}</td>`).join('') + '</tr>'
    ).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Blockquotes (support nesting)
  html = processBlockquotes(html);

  // Headings
  html = html.replace(/^(#{1,6})\s+(.+)$/gm, (_, hashes, text) => {
    const level = hashes.length;
    return `<h${level}>${inlineFormat(text.trim())}</h${level}>`;
  });

  // Setext-style headings
  html = html.replace(/^(.+)\n={3,}\s*$/gm, (_, text) => `<h1>${inlineFormat(text.trim())}</h1>`);
  html = html.replace(/^(.+)\n-{3,}\s*$/gm, (_, text) => `<h2>${inlineFormat(text.trim())}</h2>`);

  // Lists (ul + ol)
  html = processLists(html);

  // Paragraphs (blank-line separated)
  const blocks = html.split(/\n{2,}/);
  html = blocks.map(block => {
    block = block.trim();
    if (!block) return '';
    // Already block-level tags
    if (/^<(h[1-6]|ul|ol|li|blockquote|pre|hr|table|thead|tbody|tr|th|td)[\s>]/.test(block)) return block;
    if (/^\x00(CODEBLOCK|INLINECODE)/.test(block)) return block;
    // Convert single newlines to <br> within paragraph
    const content = block.replace(/\n/g, '<br>');
    return `<p>${inlineFormat(content)}</p>`;
  }).join('\n');

  // Restore inline codes
  inlineCodes.forEach((code, i) => {
    html = html.replace(`\x00INLINECODE${i}\x00`, code);
  });

  // Restore code blocks
  codeBlocks.forEach((block, i) => {
    html = html.replace(`\x00CODEBLOCK${i}\x00`, block);
  });

  return html;
}

function inlineFormat(text) {
  // Bold + italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Images (before links)
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Auto-links
  text = text.replace(/(?<![">])(https?:\/\/[^\s<>()]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return text;
}

function processBlockquotes(html) {
  // Multi-level blockquote support
  const lines = html.split('\n');
  const result = [];
  let bqBuffer = [];

  const flushBq = () => {
    if (!bqBuffer.length) return;
    const inner = bqBuffer.join('\n');
    // Recursively process one level
    const stripped = inner.replace(/^>\s?/gm, '');
    result.push(`<blockquote>${processBlockquotes(stripped)}</blockquote>`);
    bqBuffer = [];
  };

  for (const line of lines) {
    if (/^>\s?/.test(line)) {
      bqBuffer.push(line);
    } else {
      flushBq();
      result.push(line);
    }
  }
  flushBq();
  return result.join('\n');
}

function processLists(html) {
  // Unordered lists
  html = html.replace(/((?:^[ \t]*[\-\*\+] .+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => l.replace(/^[ \t]*[\-\*\+] /, '').trim());
    return '<ul>' + items.map(i => `<li>${inlineFormat(i)}</li>`).join('') + '</ul>';
  });

  // Ordered lists
  html = html.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => l.replace(/^[ \t]*\d+\. /, '').trim());
    return '<ol>' + items.map(i => `<li>${inlineFormat(i)}</li>`).join('') + '</ol>';
  });

  return html;
}

// ──────────────────────────────────────────────
// APP INIT
// ──────────────────────────────────────────────
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const toast = document.getElementById('toast');

let toastTimer = null;

function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

function updatePreview() {
  preview.innerHTML = parseMarkdown(editor.value);
}

function updateStats() {
  const val = editor.value;
  const chars = val.length;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  const lines = val ? val.split('\n').length : 0;
  const paras = val.trim() ? val.trim().split(/\n{2,}/).filter(Boolean).length : 0;
  const readMin = Math.max(1, Math.ceil(words / 200));

  document.getElementById('stat-chars').textContent = chars.toLocaleString();
  document.getElementById('stat-words').textContent = words.toLocaleString();
  document.getElementById('stat-lines').textContent = lines.toLocaleString();
  document.getElementById('stat-paras').textContent = paras.toLocaleString();
  document.getElementById('stat-read').textContent = readMin + '분';
}

function updateCursor() {
  const val = editor.value;
  const sel = editor.selectionStart;
  const lines = val.substring(0, sel).split('\n');
  const line = lines.length;
  const col = lines[lines.length - 1].length + 1;
  document.getElementById('cursor-info').textContent = `줄 ${line}, 열 ${col}`;
}

editor.addEventListener('input', () => { updatePreview(); updateStats(); });
editor.addEventListener('keyup', updateCursor);
editor.addEventListener('click', updateCursor);

// ──────────────────────────────────────────────
// TOOLBAR ACTIONS
// ──────────────────────────────────────────────
function wrapSelection(before, after, placeholder) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const sel = editor.value.substring(start, end) || placeholder || '';
  const newText = before + sel + after;
  editor.value = editor.value.substring(0, start) + newText + editor.value.substring(end);
  // Place cursor inside the wrap if placeholder was used
  if (!editor.value.substring(start, end)) {
    editor.selectionStart = start + before.length;
    editor.selectionEnd = start + before.length + sel.length;
  } else {
    editor.selectionStart = start + newText.length;
    editor.selectionEnd = start + newText.length;
  }
  editor.focus();
  updatePreview(); updateStats();
}

function insertAtLineStart(prefix) {
  const start = editor.selectionStart;
  const val = editor.value;
  const lineStart = val.lastIndexOf('\n', start - 1) + 1;
  editor.value = val.substring(0, lineStart) + prefix + val.substring(lineStart);
  editor.selectionStart = editor.selectionEnd = start + prefix.length;
  editor.focus();
  updatePreview(); updateStats();
}

function insertSnippet(text) {
  const start = editor.selectionStart;
  editor.value = editor.value.substring(0, start) + text + editor.value.substring(start);
  editor.selectionStart = editor.selectionEnd = start + text.length;
  editor.focus();
  updatePreview(); updateStats();
}

const actions = {
  bold:        () => wrapSelection('**', '**', '굵게'),
  italic:      () => wrapSelection('*', '*', '기울임'),
  strikethrough: () => wrapSelection('~~', '~~', '취소선'),
  h1:          () => insertAtLineStart('# '),
  h2:          () => insertAtLineStart('## '),
  h3:          () => insertAtLineStart('### '),
  link:        () => {
    const start = editor.selectionStart;
    const sel = editor.value.substring(start, editor.selectionEnd);
    if (sel) {
      wrapSelection('[', '](https://)', sel);
      // move cursor into URL
    } else {
      wrapSelection('[링크 텍스트](', ')', 'https://');
    }
  },
  code:        () => wrapSelection('`', '`', '코드'),
  codeblock:   () => {
    const start = editor.selectionStart;
    const sel = editor.value.substring(start, editor.selectionEnd);
    const snippet = '\n```javascript\n' + (sel || '// 코드를 여기에 입력하세요') + '\n```\n';
    insertSnippet(snippet);
  },
  ul:          () => insertAtLineStart('- '),
  ol:          () => insertAtLineStart('1. '),
  blockquote:  () => insertAtLineStart('> '),
  hr:          () => insertSnippet('\n\n---\n\n'),
  table:       () => insertSnippet('\n| 열 1 | 열 2 | 열 3 |\n|------|------|------|\n| 값 1 | 값 2 | 값 3 |\n| 값 4 | 값 5 | 값 6 |\n'),
};

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    if (actions[action]) actions[action]();
  });
});

// Keyboard shortcuts
editor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey)) {
    if (e.key === 'b') { e.preventDefault(); actions.bold(); }
    if (e.key === 'i') { e.preventDefault(); actions.italic(); }
    if (e.key === 'k') { e.preventDefault(); actions.link(); }
  }
  // Tab → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(start);
    editor.selectionStart = editor.selectionEnd = start + 2;
  }
});

// ──────────────────────────────────────────────
// DOWNLOAD
// ──────────────────────────────────────────────
document.getElementById('btn-download').addEventListener('click', () => {
  const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'document.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ document.md 파일 다운로드 완료!');
});

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  if (editor.value && !confirm('현재 내용을 모두 지우시겠습니까?')) return;
  editor.value = '';
  updatePreview(); updateStats(); updateCursor();
  editor.focus();
});

// ──────────────────────────────────────────────
// SPLITTER (drag to resize)
// ──────────────────────────────────────────────
const splitter = document.getElementById('splitter');
const editorPane = document.getElementById('editor-pane');
const previewPane = document.getElementById('preview-pane');
const mainEl = document.querySelector('.main');

let isDragging = false;
let startX = 0;
let startEditorWidth = 0;
let totalWidth = 0;

splitter.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX;
  startEditorWidth = editorPane.offsetWidth;
  totalWidth = mainEl.offsetWidth - splitter.offsetWidth;
  splitter.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const newEditorPct = Math.min(Math.max((startEditorWidth + dx) / totalWidth * 100, 20), 80);
  editorPane.style.flex = `0 0 ${newEditorPct}%`;
  previewPane.style.flex = `0 0 ${100 - newEditorPct}%`;
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  splitter.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ──────────────────────────────────────────────
// STARTUP
// ──────────────────────────────────────────────
editor.value = DEFAULT_MD;
updatePreview();
updateStats();
updateCursor();
editor.focus();
</script>
</body>
</html>
`;
