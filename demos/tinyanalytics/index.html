<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinyAnalytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #6366f1;
      --violet: #7c3aed;
      --indigo-light: #818cf8;
      --violet-light: #a78bfa;
      --bg: #0f0f14;
      --surface: #16161e;
      --surface2: #1e1e2a;
      --surface3: #252535;
      --border: #2a2a3d;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .site-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .site-pill span { color: var(--text); font-weight: 500; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* LAYOUT */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px 28px 60px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* KPI CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .kpi-card:hover {
      border-color: var(--indigo);
      transform: translateY(-2px);
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.04), transparent);
      pointer-events: none;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kpi-label svg { width: 14px; height: 14px; opacity: 0.7; }

    .kpi-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 10px;
    }

    .kpi-delta {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .kpi-delta.up { background: rgba(52,211,153,0.12); color: var(--green); }
    .kpi-delta.down { background: rgba(248,113,113,0.12); color: var(--red); }

    /* REALTIME CARD */
    .realtime-card {
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(124,58,237,0.12));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .rt-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }

    .rt-number {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -3px;
      background: linear-gradient(135deg, var(--indigo-light), var(--violet-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      transition: all 0.3s ease;
    }

    .rt-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

    .rt-divider { width: 1px; height: 60px; background: var(--border); }

    .rt-info { flex: 1; }
    .rt-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .rt-info p { font-size: 13px; color: var(--muted); }

    .rt-sparkline {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
    }

    .rt-bar {
      width: 6px;
      background: linear-gradient(180deg, var(--indigo-light), var(--violet));
      border-radius: 2px 2px 0 0;
      transition: height 0.5s ease;
    }

    /* CHART SECTION */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .chart-title { font-size: 15px; font-weight: 700; }
    .chart-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .period-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
    }

    .period-tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      user-select: none;
    }

    .period-tab.active {
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      color: #fff;
    }

    .period-tab:not(.active):hover { color: var(--text); background: var(--surface3); }

    .chart-wrapper { position: relative; width: 100%; height: 220px; }

    #pageviewChart {
      width: 100%;
      height: 100%;
    }

    .chart-tooltip {
      position: absolute;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 10;
    }

    .chart-tooltip.visible { opacity: 1; }
    .chart-tooltip strong { display: block; color: var(--indigo-light); font-size: 13px; }

    /* BOTTOM GRID */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .panel-title { font-size: 14px; font-weight: 700; }
    .panel-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* TOP PAGES TABLE */
    .pages-table { width: 100%; border-collapse: collapse; }

    .pages-table tr { border-bottom: 1px solid var(--border); }
    .pages-table tr:last-child { border-bottom: none; }
    .pages-table tr:hover td { background: var(--surface2); }

    .pages-table td {
      padding: 9px 6px;
      transition: background 0.15s;
    }

    .page-rank {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .page-rank.top { background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; }

    .page-name { font-size: 13px; font-weight: 500; padding-left: 10px; }
    .page-path { font-size: 11px; color: var(--muted); }

    .page-bar-wrap { width: 80px; padding-right: 6px; }

    .page-bar-bg {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }

    .page-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .page-count { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; min-width: 50px; }

    /* REFERRERS */
    .referrer-list { display: flex; flex-direction: column; gap: 10px; }

    .referrer-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .referrer-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .referrer-info { flex: 1; min-width: 0; }
    .referrer-name { font-size: 13px; font-weight: 600; }
    .referrer-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .referrer-progress {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .referrer-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .referrer-count { font-size: 13px; font-weight: 700; min-width: 44px; text-align: right; }
    .referrer-pct { font-size: 11px; color: var(--muted); min-width: 34px; text-align: right; }

    /* DEVICE / GEOGRAPHY PANEL */
    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 16px;
    }

    .donut-svg { flex-shrink: 0; }

    .donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label { flex: 1; color: var(--muted); }
    .legend-value { font-weight: 700; }
    .legend-pct { font-size: 11px; color: var(--muted); margin-left: 4px; }

    /* GEO TABLE */
    .geo-list { display: flex; flex-direction: column; gap: 9px; }

    .geo-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .geo-flag { font-size: 18px; }
    .geo-country { flex: 1; font-size: 13px; font-weight: 500; }
    .geo-bar-wrap { width: 70px; }

    .geo-bar-bg { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .geo-bar-fill { height: 100%; background: linear-gradient(90deg, var(--indigo-light), var(--violet-light)); border-radius: 2px; transition: width 0.6s ease; }
    .geo-count { font-size: 13px; font-weight: 700; min-width: 44px; text-align: right; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* GRADIENT LINE */
    .grad-line {
      height: 2px;
      background: linear-gradient(90deg, var(--indigo), var(--violet), transparent);
      border-radius: 1px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

function seedRand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

function generateDailyData(days, base, variance, seed = 42) {
  const rand = seedRand(seed);
  const data = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dayOfWeek = d.getDay();
    const weekendFactor = (dayOfWeek === 0 || dayOfWeek === 6) ? 0.65 : 1;
    const trend = 1 + (days - i) / days * 0.15;
    const noise = 0.8 + rand() * variance;
    const val = Math.round(base * weekendFactor * trend * noise);
    data.push({ date: d, value: val });
  }
  return data;
}

const DATA = {
  7:  generateDailyData(7,  820, 0.4, 11),
  30: generateDailyData(30, 640, 0.5, 22),
  90: generateDailyData(90, 500, 0.6, 33),
};

const TOP_PAGES = [
  { name: '홈',          path: '/',              views: 14320 },
  { name: '블로그',       path: '/blog',          views: 9870  },
  { name: '제품 소개',    path: '/products',      views: 7210  },
  { name: '가격 안내',    path: '/pricing',       views: 5430  },
  { name: '문의하기',     path: '/contact',       views: 3890  },
  { name: '로그인',       path: '/login',         views: 2760  },
];

  { name: 'Google',      url: 'google.com',      icon: '🔍', count: 12300, color: '#34d399'       },
  { name: 'Twitter/X',   url: 'twitter.com',     icon: '🐦', count: 6820,  color: '#38bdf8'       },
  { name: 'Naver',       url: 'naver.com',       icon: '🟢', count: 5150,  color: '#fbbf24'       },
  { name: 'GitHub',      url: 'github.com',      icon: '⚫', count: 3210,  color: '#94a3b8'       },

  { flag: '🇸🇬', country: '싱가포르', count: 2100  },
  { flag: '🇨🇦', country: '캐나다',   count: 1450  },
];

// ─── KPI COUNTER ──────────────────────────────────────────────────────────

function animateCount(el, target, format, duration = 1200) {
  const start = Date.now();
  const tick = () => {
    const p = Math.min((Date.now() - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = format(Math.round(ease * target));
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function fmtNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

function initKPIs() {
  animateCount(document.getElementById('kpiViews'),   43280, n => fmtNum(n));
  animateCount(document.getElementById('kpiUniq'),    18740, n => fmtNum(n));
  animateCount(document.getElementById('kpiSession'), 254,   n => {
    const m = Math.floor(n / 60);
    const s = n % 60;
    return m + ':' + String(s).padStart(2, '0');
  });
  animateCount(document.getElementById('kpiBounce'),  3820, n => (n / 100).toFixed(1) + '%');
}

// ─── REALTIME ─────────────────────────────────────────────────────────────

let rtHistory = [12,18,22,15,25,30,28,22,19,24,31,27,20];

function initSparkline() {
  const wrap = document.getElementById('rtSparkline');
  wrap.innerHTML = '';
  const maxV = Math.max(...rtHistory);
  rtHistory.forEach(v => {
    const bar = document.createElement('div');
    bar.className = 'rt-bar';
    bar.style.height = Math.max(4, Math.round((v / maxV) * 36)) + 'px';
    wrap.appendChild(bar);
  });
}

function updateRealtime() {
  const val = 18 + Math.floor(Math.random() * 22);
  document.getElementById('rtNumber').textContent = val;
  document.getElementById('rtStrong').textContent = val;
  document.getElementById('rtEvents').textContent = val * 3 + Math.floor(Math.random() * 10);

  rtHistory.push(val);
  if (rtHistory.length > 13) rtHistory.shift();
  initSparkline();
}

function initRealtime() {
  initSparkline();
  updateRealtime();
  setInterval(updateRealtime, 3000);
}

// ─── CHART ────────────────────────────────────────────────────────────────

let currentPeriod = 30;

function drawChart(period) {
  const svg = document.getElementById('pageviewChart');
  const tooltip = document.getElementById('chartTooltip');
  const W = svg.clientWidth || svg.parentElement.clientWidth;
  const H = 220;
  const PAD = { top: 20, right: 20, bottom: 36, left: 52 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  const data = DATA[period];
  const vals = data.map(d => d.value);
  const minV = Math.min(...vals) * 0.85;
  const maxV = Math.max(...vals) * 1.08;

  const xScale = i => PAD.left + (i / (data.length - 1)) * chartW;
  const yScale = v => PAD.top + chartH - ((v - minV) / (maxV - minV)) * chartH;

  // Y ticks
  const yTicks = 4;
  let yLines = '';
  let yLabels = '';
  for (let i = 0; i <= yTicks; i++) {
    const v = minV + (i / yTicks) * (maxV - minV);
    const y = yScale(v);
    yLines += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#2a2a3d" stroke-width="1"/>`;
    yLabels += `<text x="${PAD.left - 8}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="11">${fmtNum(Math.round(v))}</text>`;
  }

  // X ticks — show ~6-8 labels
  const stride = Math.max(1, Math.floor(data.length / 7));
  let xLabels = '';
  data.forEach((d, i) => {
    if (i % stride === 0 || i === data.length - 1) {
      const x = xScale(i);
      const label = period <= 7
        ? d.date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' })
        : d.date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
      xLabels += `<text x="${x}" y="${H - 8}" text-anchor="middle" fill="#64748b" font-size="11">${label}</text>`;
    }
  });

  // Path
  const pts = data.map((d, i) => `${xScale(i)},${yScale(d.value)}`);
  const linePath = 'M ' + pts.join(' L ');

  // Area fill
  const areaPath = `M ${xScale(0)},${PAD.top + chartH} L ` + pts.join(' L ') + ` L ${xScale(data.length - 1)},${PAD.top + chartH} Z`;

  // Dots for hover
  const dots = data.map((d, i) =>
    `<circle class="chart-dot" cx="${xScale(i)}" cy="${yScale(d.value)}" r="4" fill="var(--indigo)" stroke="var(--surface)" stroke-width="2" opacity="0" data-i="${i}" style="cursor:pointer;"/>`
  ).join('');

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = `
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.02"/>
      </linearGradient>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#818cf8"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient>
    </defs>
    ${yLines}
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <path d="${linePath}" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${yLabels}
    ${xLabels}
  `;

  // Hover interaction
  const svgRect = () => svg.getBoundingClientRect();

  svg.querySelectorAll('.chart-dot').forEach(dot => {
    dot.addEventListener('mouseenter', e => {
      dot.setAttribute('opacity', '1');
      const i = parseInt(dot.dataset.i);
      const d = data[i];
      const rect = svgRect();
      const cx = parseFloat(dot.getAttribute('cx'));
      const cy = parseFloat(dot.getAttribute('cy'));
      const scaleX = rect.width / W;
      const scaleY = rect.height / H;
      const x = cx * scaleX + rect.left - (svg.parentElement.getBoundingClientRect().left);
      const y = cy * scaleY;
      tooltip.innerHTML = `<strong>${d.value.toLocaleString()}회</strong>${d.date.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' })}`;
      tooltip.style.left = Math.min(x - 40, chartW + PAD.left - 90) + 'px';
      tooltip.style.top = (y - 56) + 'px';
      tooltip.classList.add('visible');
    });
    dot.addEventListener('mouseleave', () => {
      dot.setAttribute('opacity', '0');
      tooltip.classList.remove('visible');
    });
  });
}

function initChart() {
  drawChart(currentPeriod);

  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = parseInt(btn.dataset.period);
      const labels = { 7: '최근 7일간 일별 페이지뷰', 30: '최근 30일간 일별 페이지뷰', 90: '최근 90일간 일별 페이지뷰' };
      document.getElementById('chartSubtitle').textContent = labels[currentPeriod];
      drawChart(currentPeriod);
    });
  });

  window.addEventListener('resize', () => drawChart(currentPeriod));
}

// ─── TOP PAGES ────────────────────────────────────────────────────────────

function initTopPages() {
  const table = document.getElementById('pagesTable');
  const maxViews = TOP_PAGES[0].views;
  table.innerHTML = TOP_PAGES.map((p, i) => `
    <tr>
      <td><div class="page-rank ${i === 0 ? 'top' : ''}">${i + 1}</div></td>
      <td>
        <div class="page-name">${p.name}</div>
        <div class="page-path">${p.path}</div>
      </td>
      <td class="page-bar-wrap">
        <div class="page-bar-bg"><div class="page-bar-fill" style="width:${(p.views/maxViews*100).toFixed(1)}%"></div></div>
      </td>
      <td class="page-count">${p.views.toLocaleString()}</td>
    </tr>
  `).join('');
}

// ─── REFERRERS ────────────────────────────────────────────────────────────

function initReferrers() {
  const total = REFERRERS.reduce((s, r) => s + r.count, 0);
  document.getElementById('refTotal').textContent = total.toLocaleString() + '회';
  const list = document.getElementById('referrerList');
  list.innerHTML = REFERRERS.map(r => {
    const pct = (r.count / total * 100).toFixed(1);
    return `
      <div class="referrer-item">
        <div class="referrer-icon">${r.icon}</div>
        <div class="referrer-info">
          <div class="referrer-name">${r.name}</div>
          <div class="referrer-url">${r.url}</div>
          <div class="referrer-progress"><div class="referrer-fill" style="width:${pct}%;background:${r.color}"></div></div>
        </div>
        <div class="referrer-count">${r.count.toLocaleString()}</div>
        <div class="referrer-pct">${pct}%</div>
      </div>
    `;
  }).join('');
}

// ─── DONUT CHART ──────────────────────────────────────────────────────────

function initDonut() {
  const svg = document.getElementById('donutSvg');
  const cx = 45, cy = 45, r = 34, inner = 20;
  const total = DEVICES.reduce((s, d) => s + d.pct, 0);
  let angle = -Math.PI / 2;

  let paths = '';
  DEVICES.forEach(d => {
    const slice = (d.pct / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(angle + slice);
    const y2 = cy + r * Math.sin(angle + slice);
    const xi1 = cx + inner * Math.cos(angle);
    const yi1 = cy + inner * Math.sin(angle);
    const xi2 = cx + inner * Math.cos(angle + slice);
    const yi2 = cy + inner * Math.sin(angle + slice);
    const large = slice > Math.PI ? 1 : 0;
    paths += `<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${inner} ${inner} 0 ${large} 0 ${xi1} ${yi1}" fill="${d.color}" opacity="0.9"/>`;
    angle += slice;
  });

  svg.innerHTML = paths + `<circle cx="${cx}" cy="${cy}" r="${inner - 2}" fill="var(--surface)"/>`;

  const legend = document.getElementById('donutLegend');
  legend.innerHTML = DEVICES.map(d => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${d.color}"></div>
      <span class="legend-label">${d.name}</span>
      <span class="legend-value">${d.pct}%</span>
    </div>
  `).join('');
}

// ─── GEO ──────────────────────────────────────────────────────────────────

function initGeo() {
  const maxC = GEO[0].count;
  const list = document.getElementById('geoList');
  list.innerHTML = GEO.map(g => `
    <div class="geo-item">
      <span class="geo-flag">${g.flag}</span>
      <span class="geo-country">${g.country}</span>
      <div class="geo-bar-wrap">
        <div class="geo-bar-bg"><div class="geo-bar-fill" style="width:${(g.count/maxC*100).toFixed(1)}%"></div></div>
      </div>
      <span class="geo-count">${g.count.toLocaleString()}</span>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  initKPIs();
  initRealtime();
  initChart();
  initTopPages();
  initReferrers();
  initDonut();
  initGeo();
});
