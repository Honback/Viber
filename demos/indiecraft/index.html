<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndieCraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ec4899;
      --rose: #e11d48;
      --pink-light: #f9a8d4;
      --rose-dark: #9f1239;
      --bg: #0f0a14;
      --surface: #1a1025;
      --surface2: #231534;
      --text: #f5e6ff;
      --muted: #a78bca;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Background ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(236,72,153,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #app {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #f472b6, #fb7185, #e11d48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Score bar */
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 480px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid rgba(236,72,153,0.2);
      border-radius: 12px;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hud-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: center;
    }

    .hud-value.accent {
      background: linear-gradient(135deg, #f472b6, #e11d48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Canvas wrapper */
    #canvas-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(236,72,153,0.25);
      box-shadow:
        0 0 0 1px rgba(236,72,153,0.1),
        0 8px 32px rgba(0,0,0,0.5),
        0 0 60px rgba(236,72,153,0.08);
    }

    #gameCanvas {
      display: block;
    }

    /* Overlay screens (start / game over) */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(10, 5, 18, 0.88);
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-title {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f472b6, #e11d48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.2;
    }

    .overlay-subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .score-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 32px;
      background: rgba(236,72,153,0.08);
      border: 1px solid rgba(236,72,153,0.2);
      border-radius: 12px;
    }

    .score-display .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .score-display .value {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f472b6, #e11d48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .best-row {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .best-row span {
      color: #fbbf24;
      font-weight: 700;
    }

    /* Buttons */
    .btn {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      letter-spacing: 0.02em;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #e11d48);
      color: #fff;
      box-shadow: 0 4px 20px rgba(236,72,153,0.4);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 28px rgba(236,72,153,0.55);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(236,72,153,0.35);
      color: var(--pink-light);
    }

    .btn-secondary:hover {
      background: rgba(236,72,153,0.08);
      border-color: rgba(236,72,153,0.6);
    }

    /* Controls hint */
    #controls-hint {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      display: flex;
      gap: 16px;
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .key {
      display: inline-block;
      padding: 2px 8px;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      font-size: 0.68rem;
      color: var(--text);
      font-family: monospace;
    }

    /* Level badge */
    #level-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .level-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .level-pip.active { background: var(--pink); box-shadow: 0 0 6px var(--pink); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">IndieCraft</div>
      <div class="tagline">장애물을 피하고 살아남아라</div>
    </header>

    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span class="hud-value accent" id="score-display">0</span>
      </div>
      <div id="level-badge">
        <div class="level-pip" id="pip1"></div>
        <div class="level-pip" id="pip2"></div>
        <div class="level-pip" id="pip3"></div>
        <div class="level-pip" id="pip4"></div>
        <div class="level-pip" id="pip5"></div>
        <span style="margin-left:4px;" id="level-label">레벨 1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">최고 기록</span>
        <span class="hud-value" id="best-display">0</span>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="gameCanvas" width="480" height="420"></canvas>

      <!-- Start screen -->
      <div class="overlay" id="start-screen">
        <div class="overlay-title">IndieCraft</div>
        <div class="overlay-subtitle">
          하늘에서 쏟아지는 블록을 피해라!<br/>
          오래 버틸수록 속도가 빨라진다.
        </div>
        <button class="btn btn-primary" id="start-btn">게임 시작</button>
      </div>

      <!-- Game over screen -->
      <div class="overlay hidden" id="gameover-screen">
        <div class="overlay-title">게임 오버</div>
        <div class="score-display">
          <span class="label">최종 점수</span>
          <span class="value" id="final-score">0</span>
        </div>
        <div class="best-row" id="best-row">최고 기록: <span id="best-score-go">0</span></div>
        <button class="btn btn-primary" id="restart-btn">다시 시작</button>
      </div>
    </div>

    <div id="controls-hint">
      <span class="key-badge"><span class="key">←</span><span class="key">→</span> 이동</span>
      <span class="key-badge"><span class="key">A</span><span class="key">D</span> 이동</span>
      <span class="key-badge"><span class="key">Space</span> 시작/재시작</span>
    </div>
  </div>

<script>
// ──────────────────────────────────────────────
// Constants & Config
// ──────────────────────────────────────────────
const CANVAS_W = 480;
const CANVAS_H = 420;
const GROUND_Y = CANVAS_H - 50;

const PLAYER = {
  w: 32, h: 40,
  speed: 220,       // px/sec
  color1: '#ec4899',
  color2: '#e11d48',
};

const INITIAL_OBSTACLE_INTERVAL = 1100; // ms
const MIN_OBSTACLE_INTERVAL     = 310;
const INITIAL_FALL_SPEED        = 190;
const MAX_FALL_SPEED            = 520;
const SPEED_INCREMENT           = 18;   // per second
const INTERVAL_DECREMENT        = 12;   // ms per second

// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

let state = 'idle'; // idle | playing | dead
let score = 0;
let best  = parseInt(localStorage.getItem('indiecraft_best') || '0');
let level = 1;

let player = { x: CANVAS_W / 2 - PLAYER.w / 2, y: GROUND_Y - PLAYER.h, vx: 0 };
let obstacles = [];
let particles = [];
let stars = [];

let fallSpeed        = INITIAL_FALL_SPEED;
let obstacleInterval = INITIAL_OBSTACLE_INTERVAL;
let lastObstacleTime = 0;
let lastFrameTime    = 0;
let scoreAccum       = 0;
let shakeTime        = 0;

const keys = { left: false, right: false };

// Pre-generate star field
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * CANVAS_W,
    y: Math.random() * CANVAS_H,
    r: Math.random() * 1.5 + 0.3,
    alpha: Math.random() * 0.6 + 0.2,
    speed: Math.random() * 0.3 + 0.05,
  });
}

// Obstacle color palette
const OBS_COLORS = [
  ['#f472b6','#e11d48'],
  ['#a855f7','#7c3aed'],
  ['#fb923c','#dc2626'],
  ['#34d399','#059669'],
  ['#60a5fa','#2563eb'],
];

// ──────────────────────────────────────────────
// UI helpers
// ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent  = best;
  document.getElementById('level-label').textContent   = '레벨 ' + level;
  for (let i = 1; i <= 5; i++) {
    const pip = document.getElementById('pip' + i);
    pip.classList.toggle('active', i <= level);
  }
}

function showGameOver() {
  document.getElementById('final-score').textContent   = score;
  document.getElementById('best-score-go').textContent = best;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function hideGameOver() {
  document.getElementById('gameover-screen').classList.add('hidden');
}

function hideStartScreen() {
  document.getElementById('start-screen').classList.add('hidden');
}

// ──────────────────────────────────────────────
// Game logic
// ──────────────────────────────────────────────
function startGame() {
  state             = 'playing';
  score             = 0;
  level             = 1;
  fallSpeed         = INITIAL_FALL_SPEED;
  obstacleInterval  = INITIAL_OBSTACLE_INTERVAL;
  scoreAccum        = 0;
  shakeTime         = 0;
  obstacles         = [];
  particles         = [];
  player.x          = CANVAS_W / 2 - PLAYER.w / 2;
  player.y          = GROUND_Y - PLAYER.h;
  player.vx         = 0;
  lastObstacleTime  = performance.now();
  lastFrameTime     = performance.now();
  updateHUD();
  hideStartScreen();
  hideGameOver();
}

function spawnObstacle(now) {
  const minW = 24, maxW = 60;
  const minH = 18, maxH = 40;
  const w  = minW + Math.random() * (maxW - minW);
  const h  = minH + Math.random() * (maxH - minH);
  const x  = Math.random() * (CANVAS_W - w);
  const ci = Math.floor(Math.random() * OBS_COLORS.length);

  // occasionally spawn a wide "wave" obstacle
  const isWide = Math.random() < 0.08;

  obstacles.push({
    x, y: -h,
    w: isWide ? 100 + Math.random() * 80 : w,
    h,
    speed: fallSpeed * (0.85 + Math.random() * 0.35),
    colors: OBS_COLORS[ci],
    rotation: 0,
    rotSpeed: (Math.random() - 0.5) * 2.5,
  });

  lastObstacleTime = now;
}

function spawnParticles(x, y, w, h, colors) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: x + Math.random() * w,
      y: y + Math.random() * h,
      vx: (Math.random() - 0.5) * 260,
      vy: (Math.random() - 0.5) * 260 - 80,
      life: 1,
      decay: 0.7 + Math.random() * 0.5,
      r: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function collides(a, b) {
  const margin = 4; // slight forgiveness
  return (
    a.x + margin < b.x + b.w - margin &&
    a.x + a.w - margin > b.x + margin &&
    a.y + margin < b.y + b.h - margin &&
    a.y + a.h - margin > b.y + margin
  );
}

function updateLevel() {
  // level 1-5 based on score
  const newLevel = Math.min(5, 1 + Math.floor(score / 250));
  if (newLevel !== level) {
    level = newLevel;
    // brief flash effect
    shakeTime = 0.18;
  }
}

function update(dt, now) {
  if (state !== 'playing') return;

  // Difficulty ramp
  fallSpeed        = Math.min(MAX_FALL_SPEED, fallSpeed + SPEED_INCREMENT * dt);
  obstacleInterval = Math.max(MIN_OBSTACLE_INTERVAL, obstacleInterval - INTERVAL_DECREMENT * dt * 1000);

  // Score
  scoreAccum += dt * 28;
  if (scoreAccum >= 1) {
    score += Math.floor(scoreAccum);
    scoreAccum -= Math.floor(scoreAccum);
    updateLevel();
    document.getElementById('score-display').textContent = score;
  }

  // Player movement
  player.vx = 0;
  if (keys.left)  player.vx = -PLAYER.speed;
  if (keys.right) player.vx =  PLAYER.speed;
  player.x += player.vx * dt;
  player.x = Math.max(0, Math.min(CANVAS_W - PLAYER.w, player.x));

  // Spawn obstacles
  if (now - lastObstacleTime >= obstacleInterval) {
    spawnObstacle(now);
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y += o.speed * dt;
    o.rotation += o.rotSpeed * dt;

    // Check collision with player
    if (collides(player, o)) {
      // Death
      spawnParticles(player.x, player.y, PLAYER.w, PLAYER.h, [PLAYER.color1, PLAYER.color2, '#fff']);
      shakeTime = 0.45;
      state = 'dead';
      if (score > best) {
        best = score;
        localStorage.setItem('indiecraft_best', best);
        document.getElementById('best-display').textContent = best;
      }
      setTimeout(() => showGameOver(), 600);
      return;
    }

    // Remove if off screen – spawn particles at bottom
    if (o.y > CANVAS_H + 10) {
      spawnParticles(o.x, CANVAS_H - 10, o.w, 6, o.colors);
      obstacles.splice(i, 1);
      score += 5;
      document.getElementById('score-display').textContent = score;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 420 * dt; // gravity
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTime > 0) shakeTime -= dt;
}

// ──────────────────────────────────────────────
// Drawing
// ──────────────────────────────────────────────
function drawBackground() {
  // Deep space gradient
  const bg = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  bg.addColorStop(0, '#0a0514');
  bg.addColorStop(1, '#130b20');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > CANVAS_H) { s.y = 0; s.x = Math.random() * CANVAS_W; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  }

  // Ground line
  const grd = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
  grd.addColorStop(0, 'rgba(236,72,153,0.18)');
  grd.addColorStop(1, 'rgba(225,29,72,0.04)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  // Ground glow line
  ctx.save();
  ctx.shadowColor = '#ec4899';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(236,72,153,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();
  ctx.restore();

  // Grid lines on ground
  ctx.save();
  ctx.strokeStyle = 'rgba(236,72,153,0.07)';
  ctx.lineWidth = 1;
  const perspective = 160;
  const vanishX = CANVAS_W / 2;
  const vanishY = GROUND_Y;
  const cols = 10;
  for (let i = 0; i <= cols; i++) {
    const xBottom = (i / cols) * CANVAS_W;
    ctx.beginPath();
    ctx.moveTo(vanishX + (xBottom - vanishX) * 0.01, vanishY);
    ctx.lineTo(xBottom, CANVAS_H);
    ctx.stroke();
  }
  for (let row = 0; row < 5; row++) {
    const t = (row + 1) / 5;
    const y = GROUND_Y + t * (CANVAS_H - GROUND_Y);
    ctx.globalAlpha = 1 - t * 0.7;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CANVAS_W, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPlayer() {
  const { x, y, w, h } = { x: player.x, y: player.y, w: PLAYER.w, h: PLAYER.h };
  if (state === 'dead') return;

  ctx.save();

  // Glow
  ctx.shadowColor = PLAYER.color1;
  ctx.shadowBlur = 18;

  // Body gradient
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, PLAYER.color1);
  grad.addColorStop(1, PLAYER.color2);
  ctx.fillStyle = grad;

  // Rounded rect body
  roundRect(ctx, x, y + h * 0.2, w, h * 0.8, 6);
  ctx.fill();

  // Head
  ctx.shadowBlur = 10;
  ctx.fillStyle = PLAYER.color1;
  roundRect(ctx, x + w * 0.1, y, w * 0.8, h * 0.35, 8);
  ctx.fill();

  // Eyes
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + w * 0.3, y + h * 0.12, 4, 0, Math.PI * 2);
  ctx.arc(x + w * 0.7, y + h * 0.12, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#1a0a2e';
  ctx.beginPath();
  ctx.arc(x + w * 0.3 + (keys.right ? 1 : keys.left ? -1 : 0), y + h * 0.13, 2, 0, Math.PI * 2);
  ctx.arc(x + w * 0.7 + (keys.right ? 1 : keys.left ? -1 : 0), y + h * 0.13, 2, 0, Math.PI * 2);
  ctx.fill();

  // Legs (simple animated)
  const legPhase = Date.now() / 150;
  const legSwing = (keys.left || keys.right) ? Math.sin(legPhase) * 4 : 0;
  ctx.fillStyle = PLAYER.color2;
  roundRect(ctx, x + 4, y + h - 10 + legSwing,   10, 10, 3); ctx.fill();
  roundRect(ctx, x + w - 14, y + h - 10 - legSwing, 10, 10, 3); ctx.fill();

  ctx.restore();
}

function drawObstacles() {
  for (const o of obstacles) {
    ctx.save();
    ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
    ctx.rotate(o.rotation);

    ctx.shadowColor = o.colors[0];
    ctx.shadowBlur = 14;

    const grad = ctx.createLinearGradient(-o.w/2, -o.h/2, o.w/2, o.h/2);
    grad.addColorStop(0, o.colors[0]);
    grad.addColorStop(1, o.colors[1]);
    ctx.fillStyle = grad;

    roundRect(ctx, -o.w/2, -o.h/2, o.w, o.h, 6);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    roundRect(ctx, -o.w/2 + 4, -o.h/2 + 3, o.w/2, o.h * 0.4, 4);
    ctx.fill();

    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawIdleScreen() {
  // Gently float a preview character
  const t   = Date.now() / 1000;
  const cy  = GROUND_Y - PLAYER.h - Math.sin(t * 1.8) * 8;
  const cx  = CANVAS_W / 2 - PLAYER.w / 2;

  // Shadow under character
  ctx.save();
  ctx.fillStyle = 'rgba(236,72,153,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx + PLAYER.w/2, GROUND_Y + 4, PLAYER.w * 0.5, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  const saved = { ...player };
  player.x = cx; player.y = cy;
  drawPlayer();
  Object.assign(player, saved);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  // Screen shake
  ctx.save();
  if (shakeTime > 0) {
    const s = Math.min(shakeTime, 0.1) * 80;
    ctx.translate(
      (Math.random() - 0.5) * s,
      (Math.random() - 0.5) * s
    );
  }

  drawBackground();

  if (state === 'idle') {
    drawIdleScreen();
  } else {
    // Player shadow
    ctx.save();
    ctx.fillStyle = 'rgba(236,72,153,0.15)';
    ctx.beginPath();
    ctx.ellipse(
      player.x + PLAYER.w/2, GROUND_Y + 4,
      PLAYER.w * 0.5 * (1 - Math.max(0,(GROUND_Y - player.y - PLAYER.h)/200)),
      5, 0, 0, Math.PI*2
    );
    ctx.fill();
    ctx.restore();

    drawObstacles();
    drawParticles();
    drawPlayer();
  }

  ctx.restore();
}

// ──────────────────────────────────────────────
// Game loop
// ──────────────────────────────────────────────
function loop(now) {
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  update(dt, now);
  draw();

  requestAnimationFrame(loop);
}

// ──────────────────────────────────────────────
// Input
// ──────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') startGame();
  }
});

window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

// Touch / mobile
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  if (state !== 'playing') startGame();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStartX) return;
  const dx = e.touches[0].clientX - touchStartX;
  keys.left  = dx < -10;
  keys.right = dx >  10;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys.left  = false;
  keys.right = false;
  touchStartX = null;
}, { passive: false });

// Buttons
document.getElementById('start-btn').addEventListener('click',   () => startGame());
document.getElementById('restart-btn').addEventListener('click', () => startGame());

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
updateHUD();
lastFrameTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
