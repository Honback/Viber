<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeAI — AI 페어 프로그래머</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #0a0a0f;
      --bg-surface: #12121a;
      --bg-elevated: #1a1a26;
      --bg-input: #1e1e2e;
      --border: #2a2a3e;
      --border-glow: rgba(139, 92, 246, 0.35);
      --purple: #8b5cf6;
      --indigo: #6366f1;
      --purple-light: #a78bfa;
      --text-primary: #e8e8f0;
      --text-secondary: #9090b0;
      --text-muted: #5a5a78;
      --accent-gradient: linear-gradient(135deg, #8b5cf6, #6366f1);
      --code-bg: #0d0d16;
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.4);
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--purple-light);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Language tabs */
    .lang-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .lang-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s;
      white-space: nowrap;
    }

    .lang-tab:hover {
      border-color: var(--purple);
      color: var(--purple-light);
    }

    .lang-tab.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
      padding: 40px 20px;
    }

    .welcome-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.35);
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .welcome p {
      color: var(--text-secondary);
      max-width: 400px;
      font-size: 14px;
    }

    .welcome-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      max-width: 560px;
    }

    .example-chip {
      padding: 8px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-chip:hover {
      border-color: var(--purple);
      color: var(--purple-light);
      background: rgba(139, 92, 246, 0.08);
    }

    /* Messages */
    .message {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user {
      align-self: flex-end;
      max-width: 75%;
    }

    .msg-user .bubble {
      background: var(--accent-gradient);
      color: #fff;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 16px rgba(139, 92, 246, 0.25);
    }

    .msg-ai {
      align-self: flex-start;
      max-width: 100%;
      width: 100%;
    }

    .msg-ai-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .ai-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .ai-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--purple-light);
    }

    .ai-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .msg-ai-body {
      margin-left: 36px;
    }

    .ai-text {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* Code block */
    .code-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }

    .code-lang {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .code-dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #28ca41; }

    .lang-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--purple);
      color: var(--purple-light);
    }

    .copy-btn.copied {
      border-color: #22c55e;
      color: #22c55e;
    }

    .code-scroll {
      overflow-x: auto;
    }

    pre {
      padding: 20px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #c9d1d9;
    }

    /* Syntax highlighting */
    .kw { color: #c792ea; font-weight: 600; }      /* keyword */
    .fn { color: #82aaff; }                          /* function */
    .str { color: #c3e88d; }                         /* string */
    .cmt { color: #546e7a; font-style: italic; }    /* comment */
    .num { color: #f78c6c; }                         /* number */
    .cls { color: #ffcb6b; }                         /* class */
    .attr { color: #89ddff; }                        /* attribute */
    .tag { color: #f07178; }                         /* html tag */
    .pun { color: #89ddff; }                         /* punctuation */
    .typ { color: #ffcb6b; }                         /* type */
    .dec { color: #82aaff; }                         /* decorator */
    .imp { color: #c792ea; }                         /* import */

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0;
      margin-left: 36px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--purple);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .typing-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #user-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-gradient);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
    }

    .send-btn:active { transform: translateY(0); }

    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 4px;
    }

    .input-hint-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    .input-hint-keys {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    kbd {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 10px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .lang-tabs { padding: 10px 16px; }
      .chat-area { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
      .msg-user { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">⚡</div>
        <div>
          <div class="header-title">VibeAI</div>
          <div class="header-subtitle">AI 페어 프로그래머</div>
        </div>
      </div>
      <div class="header-badge">
        <span class="badge-dot"></span>
        온라인
      </div>
    </header>

    <!-- Language filter tabs -->
    <div class="lang-tabs">
      <button class="lang-tab active" data-lang="all">전체</button>
      <button class="lang-tab" data-lang="react">React</button>
      <button class="lang-tab" data-lang="typescript">TypeScript</button>
      <button class="lang-tab" data-lang="javascript">JavaScript</button>
      <button class="lang-tab" data-lang="python">Python</button>
      <button class="lang-tab" data-lang="css">CSS</button>
    </div>

    <!-- Chat messages -->
    <div class="chat-area" id="chat-area">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">⚡</div>
        <h2>VibeAI에 오신 걸 환영해요</h2>
        <p>자연어로 설명하면 즉시 코드를 생성해드립니다. React, Python, TypeScript, JavaScript, CSS를 지원합니다.</p>
        <div class="welcome-examples">
          <span class="example-chip" onclick="sendExample('로그인 폼 만들어줘')">🔐 로그인 폼 만들어줘</span>
          <span class="example-chip" onclick="sendExample('파이썬 웹 크롤러')">🕷️ 파이썬 웹 크롤러</span>
          <span class="example-chip" onclick="sendExample('다크모드 토글 버튼')">🌙 다크모드 토글 버튼</span>
          <span class="example-chip" onclick="sendExample('타입스크립트 API 훅')">🪝 타입스크립트 API 훅</span>
          <span class="example-chip" onclick="sendExample('애니메이션 카드 컴포넌트')">✨ 애니메이션 카드 컴포넌트</span>
          <span class="example-chip" onclick="sendExample('파이썬 FastAPI 서버')">🚀 파이썬 FastAPI 서버</span>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          rows="1"
          placeholder="코드로 만들고 싶은 것을 설명해보세요..."
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">
        <span class="input-hint-text">✨ AI가 최적의 코드를 생성합니다</span>
        <div class="input-hint-keys">
          <kbd>Enter</kbd> 전송 &nbsp;·&nbsp; <kbd>Shift</kbd>+<kbd>Enter</kbd> 줄바꿈
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Pre-defined responses ───────────────────────────────────────────────

    const responses = [
      {
        keywords: ['로그인', '로그인 폼', 'login', '인증', '사인인'],
        lang: 'react',
        intro: '로그인 폼 컴포넌트를 생성했습니다. 유효성 검사와 로딩 상태를 포함한 완전한 구현입니다.',
        code: `<span class="imp">import</span> <span class="pun">{</span> useState <span class="pun">}</span> <span class="imp">from</span> <span class="str">'react'</span><span class="pun">;</span>

<span class="kw">export default function</span> <span class="fn">LoginForm</span><span class="pun">() {</span>
  <span class="kw">const</span> <span class="pun">[</span>email<span class="pun">,</span> setEmail<span class="pun">]</span> <span class="pun">=</span> <span class="fn">useState</span><span class="pun">(</span><span class="str">''</span><span class="pun">);</span>
  <span class="kw">const</span> <span class="pun">[</span>password<span class="pun">,</span> setPassword<span class="pun">]</span> <span class="pun">=</span> <span class="fn">useState</span><span class="pun">(</span><span class="str">''</span><span class="pun">);</span>
  <span class="kw">const</span> <span class="pun">[</span>loading<span class="pun">,</span> setLoading<span class="pun">]</span> <span class="pun">=</span> <span class="fn">useState</span><span class="pun">(</span><span class="kw">false</span><span class="pun">);</span>
  <span class="kw">const</span> <span class="pun">[</span>error<span class="pun">,</span> setError<span class="pun">]</span> <span class="pun">=</span> <span class="fn">useState</span><span class="pun">(</span><span class="str">''</span><span class="pun">);</span>

  <span class="kw">const</span> <span class="fn">handleSubmit</span> <span class="pun">=</span> <span class="kw">async</span> <span class="pun">(</span>e<span class="pun">) => {</span>
    e<span class="pun">.</span><span class="fn">preventDefault</span><span class="pun">();</span>
    <span class="kw">if</span> <span class="pun">(!</span>email <span class="pun">||</span> <span class="pun">!</span>password<span class="pun">) {</span>
      <span class="fn">setError</span><span class="pun">(</span><span class="str">'이메일과 비밀번호를 입력해주세요.'</span><span class="pun">);</span>
      <span class="kw">return</span><span class="pun">;</span>
    <span class="pun">}</span>
    <span class="fn">setLoading</span><span class="pun">(</span><span class="kw">true</span><span class="pun">);</span>
    <span class="fn">setError</span><span class="pun">(</span><span class="str">''</span><span class="pun">);</span>
    <span class="kw">try</span> <span class="pun">{</span>
      <span class="kw">await</span> <span class="fn">login</span><span class="pun">({</span> email<span class="pun">,</span> password <span class="pun">});</span>
    <span class="pun">}</span> <span class="kw">catch</span> <span class="pun">(</span>err<span class="pun">) {</span>
      <span class="fn">setError</span><span class="pun">(</span><span class="str">'로그인에 실패했습니다.'</span><span class="pun">);</span>
    <span class="pun">}</span> <span class="kw">finally</span> <span class="pun">{</span>
      <span class="fn">setLoading</span><span class="pun">(</span><span class="kw">false</span><span class="pun">);</span>
    <span class="pun">}</span>
  <span class="pun">};</span>

  <span class="kw">return</span> <span class="pun">(</span>
    <span class="tag">&lt;div</span> <span class="attr">className</span><span class="pun">=</span><span class="str">"min-h-screen flex items-center justify-center bg-gray-50"</span><span class="tag">&gt;</span>
      <span class="tag">&lt;form</span> <span class="attr">onSubmit</span><span class="pun">={</span>handleSubmit<span class="pun">}</span> <span class="attr">className</span><span class="pun">=</span><span class="str">"bg-white p-8 rounded-xl shadow-lg w-full max-w-md"</span><span class="tag">&gt;</span>
        <span class="tag">&lt;h2</span> <span class="attr">className</span><span class="pun">=</span><span class="str">"text-2xl font-bold mb-6 text-gray-800"</span><span class="tag">&gt;</span>로그인<span class="tag">&lt;/h2&gt;</span>
        <span class="pun">{</span>error <span class="pun">&amp;&amp;</span> <span class="tag">&lt;p</span> <span class="attr">className</span><span class="pun">=</span><span class="str">"text-red-500 text-sm mb-4"</span><span class="tag">&gt;{</span>error<span class="tag">}&lt;/p&gt;}</span>
        <span class="tag">&lt;div</span> <span class="attr">className</span><span class="pun">=</span><span class="str">"space-y-4"</span><span class="tag">&gt;</span>
          <span class="tag">&lt;input</span>
            <span class="attr">type</span><span class="pun">=</span><span class="str">"email"</span>
            <span class="attr">placeholder</span><span class="pun">=</span><span class="str">"이메일"</span>
            <span class="attr">value</span><span class="pun">={</span>email<span class="pun">}</span>
            <span class="attr">onChange</span><span class="pun">={(</span>e<span class="pun">) =></span> <span class="fn">setEmail</span><span class="pun">(</span>e<span class="pun">.</span>target<span class="pun">.</span>value<span class="pun">)}</span>
            <span class="attr">className</span><span class="pun">=</span><span class="str">"w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"</span>
          <span class="tag">/&gt;</span>
          <span class="tag">&lt;input</span>
            <span class="attr">type</span><span class="pun">=</span><span class="str">"password"</span>

        self.base_url = base_url
        self.delay = delay
        self.session = requests.Session()

    def fetch_page(self, url: str, retries: int = 3) -> Optional[str]:
        for attempt in range(retries):
            try:

                return res.text
            except requests.RequestException as e:

export function useDarkMode() {
  const [isDark, setIsDark] = useState(() => {
    const saved = localStorage.getItem('theme');
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  useEffect(() => {
    const root = document.documentElement;
    if (isDark) {
      root.classList.add('dark');

    } else {
      root.classList.remove('dark');
      localStorage.setItem('theme', 'light');
    }
  }, [isDark]);

  return [isDark, () => setIsDark(v => !v)];
}`

interface FetchState<T> {
  data: T | null;
  loading: boolean;
  error: string | null;
  refetch: () => void;
}

export function useFetch<T>(url: string, options?: RequestInit): FetchState<T> {
  const [data, setData] = useState<T | null>(null);
  const [loading, setLoading] = useState<boolean>(true);
  const [error, setError] = useState<string | null>(null);
  const [trigger, setTrigger] = useState(0);

  const refetch = useCallback(() => setTrigger(n => n + 1), []);

  useEffect(() => {
    const controller = new AbortController();
    let cancelled = false;
    const fetchData = async () => {
      setLoading(true);
      setError(null);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
        const json = await res.json();
        if (!cancelled) setData(json as T);
      } catch (err) {
        if (!cancelled) setError((err as Error).message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    };
    fetchData();
    return () => { cancelled = true; controller.abort(); };
  }, [url, trigger]);

  return { data, loading, error, refetch };
}`

    <span class="pun">}</span> <span class="kw">catch</span> <span class="pun">(</span>err<span class="pun">) {</span>
      console<span class="pun">.</span><span class="fn">error</span><span class="pun">(</span><span class="str">'[VibeModule] 초기화 실패:'</span><span class="pun">,</span> err<span class="pun">);</span>
      <span class="kw">throw</span> err<span class="pun">;</span>
    <span class="pun">}</span>
    <span class="kw">return</span> this<span class="pun">;</span>
  <span class="pun">}</span>

  <span class="kw">async</span> <span class="fn">setup</span><span class="pun">() {</span>
    <span class="cmt">// TODO: 초기화 로직 구현</span>
    <span class="kw">return</span> <span class="kw">new</span> <span class="fn">Promise</span><span class="pun">(</span>res <span class="pun">=></span> <span class="fn">setTimeout</span><span class="pun">(</span>res<span class="pun">,</span> <span class="num">100</span><span class="pun">));</span>
  <span class="pun">}</span>

  <span class="fn">destroy</span><span class="pun">() {</span>
    this<span class="pun">.</span>initialized <span class="pun">=</span> <span class="kw">false</span><span class="pun">;</span>
    <span class="cmt">// TODO: 정리 로직 구현</span>
  <span class="pun">}</span>
<span class="pun">}</span>

<span class="kw">export default</span> VibeModule<span class="pun">;</span>

<span class="cmt">// 사용 예시</span>
<span class="kw">const</span> mod <span class="pun">=</span> <span class="kw">new</span> <span class="fn">VibeModule</span><span class="pun">({</span> debug<span class="pun">:</span> <span class="kw">true</span> <span class="pun">});</span>
<span class="kw">await</span> mod<span class="pun">.</span><span class="fn">init</span><span class="pun">();</span>`,
      rawCode: `class VibeModule {
  constructor(config = {}) {
    this.config = { debug: false, timeout: 5000, ...config };
    this.initialized = false;
  }
  async init() {
    await this.setup();
    this.initialized = true;
    return this;
  }

export default VibeModule;`
    };

    // ─── State ───────────────────────────────────────────────────────────────
    let isTyping = false;
    let messageCount = 0;
    const chatArea = document.getElementById('chat-area');
    const welcomeScreen = document.getElementById('welcome-screen');
    const inputEl = document.getElementById('user-input');

    // Language tab filter
    let activeLang = 'all';
    document.querySelectorAll('.lang-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeLang = tab.dataset.lang;

        // Pre-fill input with example query
        const langExamples = {
          react: '로그인 폼 만들어줘',
          typescript: '타입스크립트 API 훅',
          javascript: '자바스크립트 모듈 만들어줘',
          python: '파이썬 크롤러',
          css: '애니메이션 카드 컴포넌트'
        };
        if (activeLang !== 'all' && langExamples[activeLang]) {
          inputEl.value = langExamples[activeLang];
          autoResize(inputEl);
          inputEl.focus();
        }
      });
    });

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendExample(text) {
      inputEl.value = text;
      autoResize(inputEl);
      sendMessage();
    }

    function getTimestamp() {
      return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      });
    }

    function findResponse(query) {
      const q = query.toLowerCase();
      for (const res of responses) {
        if (res.keywords.some(k => q.includes(k.toLowerCase()))) {
          return res;
        }
      }
      return defaultResponse;
    }

    function getLangLabel(lang) {
      const labels = {
        react: 'React JSX',
        python: 'Python',
        typescript: 'TypeScript',
        javascript: 'JavaScript',
        css: 'CSS'
      };
      return labels[lang] || lang.toUpperCase();
    }

    // ─── Render functions ─────────────────────────────────────────────────────
    function appendUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message msg-user';
      div.innerHTML = `<div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function appendTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message msg-ai';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="msg-ai-header">
          <div class="ai-avatar">⚡</div>
          <span class="ai-name">VibeAI</span>
        </div>
        <div class="typing-indicator">
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
          <span class="typing-text">코드 생성 중...</span>
        </div>`;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function appendAIMessage(response) {
      const div = document.createElement('div');
      div.className = 'message msg-ai';
      const id = 'code-' + (++messageCount);
      div.innerHTML = `
        <div class="msg-ai-header">
          <div class="ai-avatar">⚡</div>
          <span class="ai-name">VibeAI</span>
          <span class="ai-time">${getTimestamp()}</span>
        </div>
        <div class="msg-ai-body">
          <p class="ai-text">${response.intro}</p>
          <div class="code-block">
            <div class="code-header">
              <div class="code-lang">
                <div class="code-dots">
                  <div class="dot dot-red"></div>
                  <div class="dot dot-yellow"></div>
                  <div class="dot dot-green"></div>
                </div>
                <span class="lang-label">${getLangLabel(response.lang)}</span>
              </div>
              <button class="copy-btn" id="copy-${id}" onclick="copyCode('${id}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
                </svg>
                복사
              </button>
            </div>
            <div class="code-scroll">
              <pre id="${id}">${response.code}</pre>
            </div>
          </div>
        </div>`;
      chatArea.appendChild(div);

      // Store raw code for copying
      document.getElementById(id).dataset.raw = response.rawCode || '';

      scrollToBottom();
    }

    function copyCode(id) {
      const pre = document.getElementById(id);
      const rawCode = pre.dataset.raw || pre.innerText;
      const btn = document.getElementById('copy-' + id);

      navigator.clipboard.writeText(rawCode).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          복사됨!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
            </svg>
            복사`;
        }, 2000);
      }).catch(() => {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = rawCode;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        btn.classList.add('copied');
        btn.textContent = '복사됨!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.textContent = '복사';
        }, 2000);
      });
    }

    // ─── Send logic ───────────────────────────────────────────────────────────
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isTyping) return;

      // Hide welcome screen
      if (welcomeScreen) welcomeScreen.style.display = 'none';

      inputEl.value = '';
      autoResize(inputEl);
      isTyping = true;

      appendUserMessage(text);
      appendTypingIndicator();

      // Simulate AI thinking time
      const delay = 800 + Math.random() * 600;
      setTimeout(() => {
        removeTypingIndicator();
        const response = findResponse(text);
        appendAIMessage(response);
        isTyping = false;
      }, delay);
    }
  </script>
</body>
